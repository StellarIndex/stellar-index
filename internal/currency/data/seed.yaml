  # ─── Fiat currencies ─────────────────────────────────────────────
  #
  # Sovereign currencies. `class: fiat` routes to a fiat-flavored
  # GlobalAssetView (no on-chain networks; price_usd from FX feeds,
  # market_cap_usd computed from circulating_supply × price_usd).
  #
  # **Circulating supply uses M2** (broad money: physical cash +
  # checkable deposits + savings + money-market funds). M2 is the
  # closest comparable analog to crypto's "circulating supply"
  # concept because both measure the total nominal claim outstanding
  # — narrower M0 would only capture physical cash, missing the bulk
  # of what's actually in circulation as money.
  #
  # Figures are operator-curated and approximate; refresh quarterly
  # from each issuing central bank's published M2 series:
  #   USD: federalreserve.gov/releases/h6/
  #   EUR: ecb.europa.eu/stats/monetary
  #   CNY: pbc.gov.cn (statistics → monetary)
  #   JPY: boj.or.jp/en/statistics/
  #   GBP: bankofengland.co.uk/statistics
  #   INR: rbi.org.in (database on indian economy → money)
  #   etc.
  #
  # Slugs follow the friendly-name convention so URLs are readable
  # (/assets/us-dollar rather than /assets/usd). The all-caps ticker
  # remains the canonical identifier for FX lookups + display.

  - ticker: USD
