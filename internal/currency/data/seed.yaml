# Verified-currency catalogue — seed.
#
# Source of truth for "what is the canonical cross-chain currency
# behind ticker X". Phase 1.1 of the multi-network assets migration
# (R-018; docs/architecture/multi-network-assets-migration.md).
#
# This file is embedded into the stellarindex-api binary at build
# time via `//go:embed`. Changing the catalogue requires a code
# change + redeploy — that's intentional, the catalogue is part of
# the trust surface. Phase 1.2 will add runtime CoinGecko / CMC
# augmentation on top.
#
# Per entry:
#   ticker:                Display ticker (e.g. "USDC"). Case-folded
#                          for lookup.
#   slug:                  URL slug (lowercase, hyphen-separated).
#   name:                  Human-readable currency name.
#   description:           One-sentence summary.
#   coingecko_id:          Optional — CG's `/coins/{id}` slug.
#   coinmarketcap_id:      Optional — CMC's integer id.
#   reference_only:        Optional bool. Marks a non-Stellar entry
#                          that exists SOLELY as a pricing cross-check
#                          reference (its coingecko_id / coinmarketcap_id
#                          feed the divergence/aggregator pair set), NOT
#                          as a browseable Stellar asset. reference_only
#                          entries are excluded from the /v1/assets
#                          browse listings + /v1/assets/verified, but
#                          remain in CoinGeckoIDs()/CoinMarketCapIDs()
#                          so the protected reference-price pipeline is
#                          unaffected. Used for BTC/ETH/... — non-Stellar
#                          coins kept only for the proposal-scoped price
#                          cross-check. (Stellar-focus refactor.)
#   verified_issuer_label: Optional — short attribution string
#                          shown on the unverified-collision warning
#                          banner. Free-form (e.g. "Circle (centre.io)").
#                          For non-Stellar-native currencies leave
#                          empty.
#   networks:              Per-network identities. At least one entry.
#                          Each entry has:
#                              network:        "stellar", "ethereum",
#                                              "solana", "bitcoin", ...
#                              code:           classic asset code (Stellar)
#                              issuer:         G-strkey (Stellar classic)
#                              contract:       contract address (non-Stellar)
#                              asset_id:       precomputed canonical
#                                              asset_id (Stellar; lets
#                                              consumers skip parsing).
#                              external_link:  optional override for
#                                              the explorer drill-out
#                                              link.

