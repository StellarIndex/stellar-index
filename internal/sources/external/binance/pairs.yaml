# Binance default pair map — the built-in set we stream when the
# operator enables Binance in config without specifying a pair list.
# Embedded into the binary via //go:embed (see pairs.go); editing this
# file still requires a rebuild + redeploy — it is NOT a runtime
# config surface. What the YAML buys is a declarative, reviewable
# venue-pair table (the pattern for other venues, per 45b): adding a
# pair is a data edit here, not Go plumbing.
#
# Shape: symbol is the Binance wire symbol (uppercase, no separator);
# base/quote carry the canonical asset code + class (crypto | fiat).
#
# Pair rationale:
#   - XLMUSDT — largest XLM market globally; canonical "XLM/USD" proxy
#     once the aggregator's stablecoin-fiat table maps USDT→USD.
#   - XLMBTC  — deep BTC-pair liquidity; triangulates for pairs we
#     don't have direct routes to.
#   - BTCUSDT — anchor for every crypto-derived rate in our
#     triangulation graph.
#   - ETHUSDT — second crypto anchor; needed for any ETH-quoted
#     Soroban DEX pair.
#   - BTC/ETH × EUR/GBP (2026-05-14): Binance supports these natively;
#     added so multi-source VWAP works on the most-asked-for fiat
#     conversions (the only pre-fix venue publishing BTC/EUR was
#     Bitstamp).
#   - <major>USDT — top-cap globals for cross-venue VWAP coverage.
#     All verified TRADING on Binance via /exchangeInfo 2026-05-05.
pairs:
  - symbol: XLMUSDT
    base: { code: XLM, class: crypto }
    quote: { code: USDT, class: crypto }
  - symbol: XLMBTC
    base: { code: XLM, class: crypto }
    quote: { code: BTC, class: crypto }
  - symbol: BTCUSDT
    base: { code: BTC, class: crypto }
    quote: { code: USDT, class: crypto }
  - symbol: BTCEUR
    base: { code: BTC, class: crypto }
    quote: { code: EUR, class: fiat }
  - symbol: BTCGBP
    base: { code: BTC, class: crypto }
    quote: { code: GBP, class: fiat }
  - symbol: ETHUSDT
    base: { code: ETH, class: crypto }
    quote: { code: USDT, class: crypto }
