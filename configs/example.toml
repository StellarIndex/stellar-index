# Stellar Index — example configuration.
#
# Copy this file, edit the fields you care about, point a binary at
# it with `-config path/to/your.toml`. Any field omitted here falls
# back to the default baked into internal/config/config.go.
#
# Secrets (passwords, access keys) NEVER belong in this file. The
# fields below reference env-var names that hold the actual secret
# at runtime. Set those envs via your secret manager (Vault, AWS
# Secrets Manager, etc.) before starting the binary.
#
# Generated reference: docs/reference/config/README.md.
# Operator runbook for deploying: docs/operations/runbooks/
# bootstrap-archival-node.md.

# ──────────────────────────────────────────────────────────────────
# Region — who am I in the multi-region topology?
# ──────────────────────────────────────────────────────────────────
[region]
id          = "r1"
name        = "London"
home_domain = "stellarindex.io"

# ──────────────────────────────────────────────────────────────────
# Stellar — where does my ledger data come from?
#
# Production ingest reads Galexie's MinIO output directly via
# go-stellar-sdk/ingest.ApplyLedgerMetadata (ADR-0001 / CLAUDE.md
# invariant #6); the fields below are for the diagnostic + bootstrap
# paths that still talk to a stellar-rpc node.
#
# The localhost defaults assume a Phase-3 archival/validator host
# running both stellar-core and stellar-rpc locally
# (run_stellar_core / run_stellar_rpc = true in the ansible role).
# r1 today does NOT run those daemons (removed 2026-04-23 — see
# docs/operations/r1-deployment-state.md), so r1 operators should
# point rpc_endpoints at a public stellar-rpc such as
# https://mainnet.sorobanrpc.com and leave core_http_endpoint as a
# best-effort no-op (the daemons that consume it tolerate a
# refused connection on r1).
# ──────────────────────────────────────────────────────────────────
[stellar]
network             = "pubnet"                                    # pubnet | testnet | futurenet
core_http_endpoint  = "http://127.0.0.1:11626"                    # stellar-core admin (Phase-3 only — refused on r1)
rpc_endpoints       = ["http://127.0.0.1:8000"]                   # tried in order on failure; on r1 use ["https://mainnet.sorobanrpc.com"] or another public endpoint
history_archive_url = "https://history.stellar.org/prd/core-live/core_live_001"

# ──────────────────────────────────────────────────────────────────
# Storage — Postgres/Timescale, Redis, MinIO / S3.
# Secrets come from env vars named in the *_env fields.
# ──────────────────────────────────────────────────────────────────
[storage]
# DSN — override the password at runtime via STELLARINDEX_POSTGRES_DSN.
postgres_dsn       = "postgres://stellarindex@127.0.0.1:5432/stellarindex?sslmode=disable"

redis_addr         = "127.0.0.1:6379"
# redis_password_env = "STELLARINDEX_REDIS_PASSWORD"   # uncomment + set env
#
# redis_username (F-1213, codex audit-2026-05-12). Empty (default)
# AUTHs as Redis's legacy 'default' user. Set to 'stellarindex' (or
# the operator's per-component user) when `redis_acl_lockdown` is
# enabled in the ansible role — without a username the broker-side
# ACL rejects the connection, so the two settings must be flipped
# together. The Ansible template at
# `configs/ansible/roles/archival-node/templates/stellarindex.toml.j2`
# already renders this when the lockdown variable is set.
# redis_username     = "stellarindex"

# Production: enable Sentinel mode per ADR-0024. When
# redis_sentinel_addrs is non-empty the binary uses
# go-redis FailoverClient and asks Sentinel for the current
# primary; redis_addr is ignored. Leave empty for dev / single-node.
# redis_sentinel_addrs = ["cache-01.internal:26379", "cache-02.internal:26379", "cache-03.internal:26379"]
# redis_master_name    = "stellarindex-r1-cache"

s3_endpoint        = "http://127.0.0.1:9000"
s3_region          = "r1"
s3_bucket_archive  = "galexie-archive"
s3_bucket_live     = "galexie-live"
s3_access_key_env  = "STELLARINDEX_S3_ACCESS_KEY"
s3_secret_key_env  = "STELLARINDEX_S3_SECRET_KEY"

# ──────────────────────────────────────────────────────────────────
# Ingestion — which on-chain source connectors to run on this
# indexer replica. Each name must exist in internal/sources/<name>/
# and appear in internal/config/validate.go's KnownSources whitelist.
#
# Off-chain venues (CEX / FX / aggregator pollers) are gated
# independently via per-venue [external.<venue>].enabled flags
# below, NOT through this list.
# ──────────────────────────────────────────────────────────────────
[ingestion]
enabled_sources       = ["soroswap"]    # expand as connectors land
backfill_from_ledger  = 0                # 0 = resume from persisted cursor
backfill_batch_size   = 64
cursor_store_scheme   = "postgres"

# Enable reflector-dex / reflector-cex / reflector-fx by adding
# them to enabled_sources. Each requires its contract address set
# under [oracle.reflector] below — the indexer fails at startup if
# you enable a variant without setting its address.

# ──────────────────────────────────────────────────────────────────
# Oracle — on-chain oracle contract addresses.
# Mainnet Reflector addresses are public (DEX/CEX/FX variants).
# Verify via stellar.expert before pasting; the DAO can rotate
# addresses on a v4 spawn.
# ──────────────────────────────────────────────────────────────────
[oracle.reflector]
# dex_contract = "C…"   # set when enabling reflector-dex
# cex_contract = "C…"   # set when enabling reflector-cex
# fx_contract  = "C…"   # set when enabling reflector-fx

# ──────────────────────────────────────────────────────────────────
# External — off-chain connectors (CEX / FX / aggregator pollers).
# Each venue runs on its own goroutine and emits canonical.Trade /
# canonical.OracleUpdate parallel to the on-chain dispatcher path.
# Every venue defaults to enabled=false; opt in per venue here.
#
# Class semantics drive whether a venue's output folds into VWAP:
#   ClassExchange (CEX + interbank-grade FX)  → contributes to VWAP
#   ClassAggregator (CoinGecko/CMC/CryptoCmp) → divergence signal only
#   ClassAuthoritySanity (ECB)                → daily anchor only
# Class is registry-controlled (internal/sources/external/registry.go),
# not a per-deployment toggle.
#
# Connector docs: internal/sources/external/README.md.
# ──────────────────────────────────────────────────────────────────
[external]

  # ClassExchange — CEX trade streams. No auth, no API keys.
  # Default pair sets cover the highest-liquidity XLM + BTC + ETH
  # markets; per-venue pair overrides are a future config surface.
  [external.binance]
  enabled = false   # WS aggTrade — XLMUSDT / BTCUSDT / ETHUSDT / XLMBTC

  [external.kraken]
  enabled = false   # WS v2 trade — XLM in 6 fiats + BTC/USD + ETH/USD

  [external.bitstamp]
  enabled = false   # WS live_trades — XLM/{USD,EUR,GBP,BTC} + BTC/{USD,EUR} + ETH/USD

  [external.coinbase]
  enabled = false   # WS matches (Exchange API) — XLM-USD, BTC-USD, ETH-USD

  # ClassExchange — interbank FX feeds. Both require paid API keys
  # (see env-var override path in internal/config/load.go).
  [external.exchangeratesapi]
  enabled = false
  # api_key = ""    # prefer env: EXCHANGERATESAPI_KEY
  # base    = "USD"

  [external.polygon_forex]
  enabled = false
  # api_key = ""    # prefer env: POLYGON_API_KEY
  # base    = "USD"

  # ClassAggregator — divergence signal only, excluded from VWAP.
  #
  # CoinGecko tightened the unauthenticated-tier throttling in late
  # 2024 (anonymous calls now hit ~30/day per IP, then 429s). For a
  # free signup that bumps the quota to ~30/min, register at
  # https://www.coingecko.com/en/developers/dashboard and pass the
  # demo key via env (preferred over toml so secrets don't land in
  # the file):
  #
  #   COINGECKO_DEMO_API_KEY=cg-demo-... systemctl restart stellarindex-indexer
  #
  # For a Pro key, set COINGECKO_API_KEY instead — Pro wins when
  # both are configured. Anonymous polling still works (the poller
  # backs off on 429 instead of hammering the venue) but produces
  # no data; the divergence signal stays empty until a key is
  # provisioned.
  #
  # poll_interval overrides the connector's built-in default cadence.
  # The default is 300s (5 min) — at one batched /simple/price call
  # per tick × 288 ticks/day this burns ~288 calls/day, well below
  # the demo tier's 10,000-call/day ceiling (F-0030). Bump higher
  # when sharing the IP cap with other CG consumers; the divergence
  # signal tolerates 5-min-old references gracefully because the
  # service caches reference quotes between polls.
  [external.coingecko]
  enabled = false   # /simple/price — needs COINGECKO_DEMO_API_KEY env (post-2024)
  # poll_interval = "300s"   # default; demo-tier-safe

  [external.coinmarketcap]
  enabled = false
  # api_key = ""    # prefer env: COINMARKETCAP_API_KEY ($79/mo Standard tier)

  [external.cryptocompare]
  enabled = false
  # api_key = ""    # prefer env: CRYPTOCOMPARE_API_KEY (free tier works without)

  # ClassAuthoritySanity — daily anchor (alert-on-drift, not VWAP).
  [external.ecb]
  enabled = false   # daily TARGET-business-day fix — free, no auth

# ──────────────────────────────────────────────────────────────────
# Aggregate — VWAP/TWAP windows + filters (aggregator binary only).
# ──────────────────────────────────────────────────────────────────
[aggregate]
vwap_window_seconds          = 300
twap_window_seconds          = 300
min_usd_volume               = 10000.0
outlier_sigma_threshold      = 4.0
triangulation_enabled        = true
interval_seconds             = 30
max_trades_per_window        = 10000
disable_class_filter         = false   # default: only ClassExchange sources contribute to VWAP
enable_stablecoin_fiat_proxy = false   # opt-in: expand XLM/fiat:USD to also pull XLM/USDT/USDC/DAI/PYUSD/USDP and collapse onto the target
# Operator-override coverage set. Empty = built-in default (XLM/BTC/ETH × USD/EUR/GBP).
# Format: "<base>/<quote>" using the canonical asset wire form
# ("native", "<code>-<issuer>", "C…", "fiat:<ISO>", "crypto:<TICKER>").
pairs = [
  # "native/fiat:USD",
  # "crypto:XLM/fiat:USD",
  # "crypto:BTC/fiat:USD",
]
# Operator-override window set. Empty = built-in default ([5m, 1h, 24h]).
# Format: Go time.Duration strings ("5m", "1h", "24h").
windows = [
  # "5m",
  # "1h",
  # "24h",
]

# ──────────────────────────────────────────────────────────────────
# API — public serving plane (api binary only).
# ──────────────────────────────────────────────────────────────────
[api]
listen_addr              = "0.0.0.0:3000"
external_base_url        = "https://api.stellarindex.io/v1"
auth_mode                = "none"            # none | apikey | sep10
anon_rate_limit_per_min  = 60
key_rate_limit_per_min   = 1000
cdn_enabled              = true
# archive_report_path — where GET /v1/diagnostics/archive reads the
# archive-completeness daemon's latest JSON report (ADR-0017). The
# default matches the archive-completeness.service REPORT_OUTPUT
# path; the endpoint 404s while the file doesn't exist yet, so the
# default is harmless on hosts without the daemon. Empty disables
# the endpoint (503).
archive_report_path      = "/var/lib/galexie/last-completeness-report.json"
# allowed_origins — CORS allow-list for browser clients.
#
# Recommended: leave at the default ["*"] for any deployment that
# offers Stellar Index as a public Stellar pricing API. The
# product's read tier is no-auth, used from customer wallets,
# embed widgets, dashboards, and SDK consumers running in
# arbitrary browsers — narrowing this to your own hostname
# silently breaks every cross-origin caller (the browser blocks
# the response without an explicit `Access-Control-Allow-Origin`
# match).
#
# When narrowing makes sense: deployments that ALSO use session-
# cookie auth on the same hostname (the magic-link / dashboard
# flow at /v1/auth/login + /v1/dashboard/*) — wildcard CORS plus
# session cookies is a CSRF foothold. The credentialed surface
# is path-narrow; the public read surface (/v1/price, /v1/assets,
# /v1/markets, /v1/observations, /v1/oracle/*, etc.) does not
# accept session cookies and is safe under wildcard CORS.
#
# If you DO narrow this, also expect:
#   - The /embed/* widget surface to stop functioning in customer
#     iframes (their JS can't fetch live data from this API).
#   - Third-party SDK consumers calling from browser JS to fail
#     with CORS errors.
#   - The Postman + curl examples to keep working (they bypass
#     browser-enforced CORS).
allowed_origins          = ["*"]
# trusted_proxy_cidrs — empty (default) = ignore X-Forwarded-For
# entirely and use the direct TCP peer as the client IP. Set this to
# the CIDR(s) of YOUR reverse proxy / load-balancer tier (the hops
# between the internet and this server) so XFF is honoured, e.g.
# ["10.0.0.0/8"].
#
# SECURITY (F-1338): X-Forwarded-For is walked RIGHT-TO-LEFT and the
# first entry NOT inside any CIDR here is taken as the client IP (the
# closest untrusted hop). This is safe even when your proxy APPENDS
# to XFF (nginx `proxy_add_x_forwarded_for`, AWS ALB, Cloudflare,
# Caddy — most L7 proxies do), because a client-forged leftmost value
# is to the LEFT of your trusted hops and is ignored. List EVERY hop
# in your proxy chain here; if you under-list, the rightmost-untrusted
# walk will stop at your own un-listed proxy instead of the real
# client. Leaving this empty is the safe default behind no proxy —
# do NOT set it to your proxy CIDR unless requests actually transit
# that proxy, or a direct attacker can spoof XFF.
trusted_proxy_cidrs      = []

# signup_require_email_verification (F-1218, codex audit-2026-05-13).
# Default true (post-2026-05-13): /v1/signup-minted API keys cannot
# authenticate until the verification link emailed at signup is
# clicked. Pre-launch we have no consumer traffic, so the safe
# default is to require ownership proof — operators who want to
# allow unverified signup (dev sandbox / migration window) must
# opt in explicitly by setting this to false.
#
# Independent of `auth_mode` (the gate runs against API-key
# Subjects regardless of whether other auth modes are enabled
# alongside) — but only meaningful when /v1/signup is reachable
# (i.e. when sep10/apikey is the auth mode and signup is wired).
# signup_require_email_verification = true

# Closed-bucket SSE fanout — pairs the API binary republishes to
# the streaming Hub on every new closed prices_1m bucket. Empty
# `pairs` leaves the producer disabled (subscribers connect and
# see heartbeats only); each entry is a [base, quote] two-element
# array using canonical asset strings.
[api.streaming]
poll_interval = "5s"
pairs = []
# Example — XLM/USD + USDC/USD broadcast on /v1/price/stream:
# pairs = [
#   ["native", "fiat:USD"],
#   ["credit:USDC:GA5ZSEJYB37JRC5AVCIA5MOP4RHTM335X2KGX3IHOJAPP5RE34K4KZVN", "fiat:USD"],
# ]

# ──────────────────────────────────────────────────────────────────
# Divergence — cross-check references for the divergence service.
# CoinGecko on by default (free tier); Chainlink opt-in via FeedMap.
# ──────────────────────────────────────────────────────────────────
[divergence]
threshold_pct                  = 5.0
min_sources_for_warning        = 2
per_reference_timeout_seconds  = 5

[divergence.coingecko]
enabled  = true
# id_map maps canonical asset_id → CoinGecko slug. Empty falls back
# to the built-in default covering XLM + major stables.
# Example:
# [divergence.coingecko.id_map]
# native       = "stellar"
# CIRCLE-USDC  = "usd-coin"

[divergence.chainlink]
enabled  = false
# rpc_url defaults to https://cloudflare-eth.com when empty.
# rpc_url  = "https://eth.llamarpc.com"
# Mainnet AggregatorV3 feeds for the pairs you want cross-checked.
# Pair-string format: "<base>/<quote>" (canonical.Pair.String()).
#
# IMPORTANT: divergence cross-check only fires for pairs that ALSO
# appear in [aggregate].pairs (or the built-in default of XLM / BTC /
# ETH × USD / EUR / GBP). Configuring a Chainlink feed for a pair the
# aggregator doesn't compute is a no-op — the worker has no
# "our price" to compare against. If you want FX-pair cross-checks,
# add the FX pairs to [aggregate].pairs first AND configure how the
# aggregator should derive their "our price" (today's pipeline
# computes VWAP from trades, which doesn't apply to fiat-fiat pairs;
# fiat-fiat divergence cross-check needs the FX-shim integration that
# isn't wired yet — flagged on the operator queue).
#
# Crypto-side feeds the aggregator's default coverage already
# matches (these are the ones that actually populate
# divergence_observations on a stock deployment):
#
# [divergence.chainlink.feeds."crypto:BTC/fiat:USD"]
# address  = "0xF4030086522a5bEEa4988F8cA5B36dbC97BeE88c"
# decimals = 8
#
# [divergence.chainlink.feeds."crypto:ETH/fiat:USD"]
# address  = "0x5f4eC3Df9cbd43714FE2740f5E3616155c5b8419"
# decimals = 8
#
# [divergence.chainlink.feeds."crypto:LINK/fiat:USD"]
# address  = "0x2c1d072e956AFFC0D435Cb7AC38EF18d24d9127c"
# decimals = 8
#
# FX-side feeds (only useful once the aggregator has fiat-fiat
# coverage; documented for future operator reference):
#
# [divergence.chainlink.feeds."fiat:EUR/fiat:USD"]
# address  = "0xb49f677943BC038e9857d61E7d053CaA2C1734C1"
# decimals = 8
# invert   = false
#
# [divergence.chainlink.feeds."fiat:GBP/fiat:USD"]
# address  = "0x5c0Ab2d9b5a7ed9f470386e82BB36A3613cDd4b5"
# decimals = 8
#
# [divergence.chainlink.feeds."fiat:JPY/fiat:USD"]
# address  = "0xBcE206caE7f0ec07b545EddE332A47C2F75bbeb3"
# decimals = 8

# On-chain oracle references — read our OWN ingested oracle_updates
# rows (Reflector as three references: reflector-dex/cex/fx;
# Redstone; Band) and compare the oracle's latest value against our
# VWAP for pairs both sides cover. On by default: no external quota,
# and a no-op per pair until the feed tables hold data. max_age_minutes
# is the staleness ceiling (frozen feed ⇒ reference-unavailable, never
# agreement/divergence); 0 = per-oracle default (Reflector 30m,
# Redstone/Band 26h).
[divergence.reflector]
enabled = true
# max_age_minutes = 0

[divergence.redstone]
enabled = true
# max_age_minutes = 0

[divergence.band]
enabled = true
# max_age_minutes = 0

# Supply cross-check — compares OUR served circulating_supply against an
# external authoritative reference (the Stellar Network Dashboard for
# XLM; CoinGecko when a Pro key is set). This automates the manual "is
# our supply right?" check and catches a stale SDF-reserve exclusion
# account list (docs/methodology/xlm-circulating-supply.md). Off by
# default (it makes outbound HTTP calls); flip enabled = true on r1 via
# ansible to arm it. The 1% threshold sits well above the ~0.03% XLM
# Fee-Pool noise floor, so it fires only on a REAL drift; when a
# reference is dark the worker degrades to a no_reference outcome (not a
# false alert).
[divergence.supply]
enabled                       = false
refresh_interval_seconds      = 900    # supply moves slowly; 15 min is fine
threshold_pct                 = 1.0    # > 0.03% XLM noise floor, fires only on real drift
per_reference_timeout_seconds = 10

# Stellar Network Dashboard reference — authoritative XLM circulating
# supply, free, no auth. On by default WITHIN this block (only runs once
# the parent enabled = true above).
[divergence.supply.dashboard]
enabled  = true
# base_url defaults to https://dashboard.stellar.org/api/v3 when empty.
# base_url = "https://dashboard.stellar.org/api/v3"

# CoinGecko /coins/{id} market_data.circulating_supply reference. Off by
# default — the free tier has been 429-throttled since 2026-06-19; set a
# Pro key (prefer the COINGECKO_API_KEY env var) and enable it.
[divergence.supply.coingecko]
enabled = false
# api_key = ""   # prefer env COINGECKO_API_KEY
# base_url defaults to https://api.coingecko.com/api/v3 when empty.
# id_map maps canonical asset_id → CoinGecko coin id; empty falls back
# to the built-in default (native / crypto:XLM → stellar).
# [divergence.supply.coingecko.id_map]
# native = "stellar"

# ──────────────────────────────────────────────────────────────────
# Supply — circulating-supply pipeline (ADR-0011 / -0021 / -0022 /
# -0023). Each block opts the indexer into the corresponding
# observer and the aggregator into per-asset snapshots:
#
#   - sdf_reserve_accounts        → enables the accounts observer
#                                    (Algorithm 1 XLM circulating).
#   - reserve_balances_stroops    → static fallback when the
#                                    AccountEntry observer hasn't
#                                    backfilled yet.
#   - watched_classic_assets      → enables the trustlines +
#                                    claimable_balances + liquidity_pools
#                                    observers (Algorithm 2).
#   - sac_wrappers (sub-block)    → enables the sac_balances observer
#                                    (Algorithm 2 SAC component +
#                                    Algorithm 3 locked-set lookups).
#   - watched_sep41_contracts     → enables the sep41_supply
#                                    event-stream decoder (Algorithm 3).
#   - aggregator_refresh_enabled  → in-aggregator goroutine path;
#                                    leave false to drive snapshots
#                                    via deploy/systemd/supply-snapshot.timer.
#
# Empty per-knob default → that observer stays unregistered + the
# aggregator skips that asset class. The example below is the
# minimum to activate XLM circulating supply only.
# ──────────────────────────────────────────────────────────────────
[supply]
# sdf_reserve_accounts = ["GA…", "GB…"]
# [supply.reserve_balances_stroops]
# "GA…" = "12345678901234"
# watched_classic_assets    = []
# watched_sep41_contracts   = []
# aggregator_refresh_enabled = false
# aggregator_refresh_cadence = "5m"
# [supply.sac_wrappers]
# "C…SAC-CONTRACT" = "USDC:GA…"
#
# strict_freshness_required (F-1236, codex audit-2026-05-13).
# Default false — preserves the legacy permissive interpretation
# of `MinComponentLedger == 0` ("no freshness signal — let it
# through"). Snapshots arriving without a freshness anchor
# (typically the static-XLM fallback path or a transiently-
# failing freshness producer) are still published and the
# resulting market-cap / circulating-supply rows will be stamped
# at the freshest cursor ledger even when they're not
# anchored to a real component observation.
#
# Flip to true once every freshness producer is wired AND every
# reader is shown to never fail-open under steady-state load —
# typically post-launch, after a few weeks of green snapshot
# timers. When true, freshness-less snapshots are rejected with
# `OutcomeKindMissingFreshness` instead of published.
# strict_freshness_required = false

# ──────────────────────────────────────────────────────────────────
# Trades — trade-insert policy. Per launch-readiness L2.2 phase 1,
# operators declare which classic credits they trust as USD-pegged
# stablecoins so on-chain DEX trades quoted in those assets populate
# `trades.usd_volume` at insert time. SAC-wrapped versions are
# recognised transitively via [supply.sac_wrappers] above.
#
# **Reused by the aggregator's stablecoin-fiat proxy expansion**
# (`[aggregate].enable_stablecoin_fiat_proxy = true`): each entry is
# treated as a classic-form USD peg, so XLM/fiat:USD VWAPs pull
# trades quoted in classic USDC alongside the abstract `crypto:USDC`
# ticker. Without this list the aggregator queries only the abstract
# stablecoin map; on Stellar mainnet (where the dominant DEX volume
# is in classic USDC-GA5Z…) that produces an empty XLM/USD VWAP.
#
# Empty list preserves the off-chain-only default: only CEX/FX
# trades populate usd_volume; on-chain trades store NULL and the
# `volume_24h_usd` API field reflects only off-chain volume.
# ──────────────────────────────────────────────────────────────────
[trades]
# usd_pegged_classic_assets = [
#   "USDC-GA5ZSEJYB37JRC5AVCIA5MOP4RHTM335X2KGX3IHOJAPP5RE34K4KZVN",  # Circle USDC
# ]

# ──────────────────────────────────────────────────────────────────
# Obs — metrics, logs, traces.
# ──────────────────────────────────────────────────────────────────
[obs]
metrics_listen  = "127.0.0.1:9464"
log_level       = "info"          # debug | info | warn | error
log_format      = "json"          # json | text
trace_exporter  = "none"          # only "none" is wired in this build;
                                  # "otlp" is reserved for the future
                                  # tracing rollout and Validate() rejects
                                  # it until an exporter is implemented.
trace_sample    = 0.1             # 0.0 – 1.0; ignored in this build,
                                  # read by the future tracing rollout.
