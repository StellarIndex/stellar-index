---
# API serving-plane alerts — SLA enforcement per Freighter RFP.

groups:
  - name: ratesengine.api
    interval: 30s
    rules:

      - alert: ratesengine_api_down
        expr: sum(up{job="ratesengine-api"}) == 0
        for: 60s
        labels:
          severity: page
          team: ratesengine
          component: api
          runbook_url: https://github.com/RatesEngine/rates-engine/blob/main/docs/operations/runbooks/api-down.md
        annotations:
          summary: "Every API pod is down (SEV-1)"
          description: |
            No API instance is scrape-reachable across the fleet. This is a
            full public outage — customers see connection errors. Follow the
            api-down runbook immediately.

      - alert: ratesengine_api_latency_p95_high
        expr: |
          histogram_quantile(0.95,
            sum by (le) (rate(http_request_duration_seconds_bucket{job="ratesengine-api"}[5m]))
          ) > 0.5
        for: 2m
        labels:
          severity: ticket
          team: ratesengine
          component: api
          runbook_url: https://github.com/RatesEngine/rates-engine/blob/main/docs/operations/runbooks/api-latency.md
        annotations:
          summary: "API p95 {{ $value | humanizeDuration }} > 500ms"
          description: |
            Freighter SLA is p95 ≤ 200 ms; we alarm at > 500 ms (≥ 2.5×
            target). Typical root cause: Redis cache miss storm → Timescale
            saturation. Check Redis eviction rate + Postgres connection pool.

      - alert: ratesengine_api_latency_p99_high
        expr: |
          histogram_quantile(0.99,
            sum by (le) (rate(http_request_duration_seconds_bucket{job="ratesengine-api"}[5m]))
          ) > 2
        for: 2m
        labels:
          severity: ticket
          team: ratesengine
          component: api
          runbook_url: https://github.com/RatesEngine/rates-engine/blob/main/docs/operations/runbooks/api-latency.md
        annotations:
          summary: "API p99 {{ $value | humanizeDuration }} > 2s"
          description: |
            Freighter SLA is p99 ≤ 500 ms; we alarm at > 2 s (≥ 4× target).
            Tail latency is usually a specific slow endpoint — check the
            per-endpoint breakdown.

      - alert: ratesengine_api_error_rate_high
        expr: |
          sum(rate(http_requests_total{job="ratesengine-api",status=~"5.."}[5m]))
            / sum(rate(http_requests_total{job="ratesengine-api"}[5m])) > 0.01
        for: 2m
        labels:
          severity: ticket
          team: ratesengine
          component: api
          runbook_url: https://github.com/RatesEngine/rates-engine/blob/main/docs/operations/runbooks/api-5xx.md
        annotations:
          summary: "API 5xx rate {{ $value | humanizePercentage }}"
          description: |
            Sustained > 1 % 5xx responses. At 5 % we escalate to SEV-1 via
            the critical variant.

      - alert: ratesengine_api_error_rate_critical
        expr: |
          sum(rate(http_requests_total{job="ratesengine-api",status=~"5.."}[5m]))
            / sum(rate(http_requests_total{job="ratesengine-api"}[5m])) > 0.05
        for: 2m
        labels:
          severity: page
          team: ratesengine
          component: api
          runbook_url: https://github.com/RatesEngine/rates-engine/blob/main/docs/operations/runbooks/api-5xx.md
        annotations:
          summary: "API 5xx rate {{ $value | humanizePercentage }} (SEV-1)"
          description: |
            > 5 % of requests returning 5xx. Customers are broken; declare
            SEV-1 and follow the api-5xx runbook.

      - alert: ratesengine_api_price_stale
        expr: ratesengine_price_staleness_seconds > 120
        for: 5m
        labels:
          severity: ticket
          team: ratesengine
          component: api
          runbook_url: https://github.com/RatesEngine/rates-engine/blob/main/docs/operations/runbooks/price-stale.md
        annotations:
          summary: "Price for {{ $labels.asset }} is {{ $value }}s stale"
          description: |
            The most recent aggregated price observation is older than 2 min
            (Freighter SLA is 30 s freshness; we alarm at 4× SLA). Usually
            means the source for this asset has stopped or the aggregator
            isn't writing.

      # Per-(cache, op) miss rate. Set this against the in-memory
      # cache wrappers (`v1.CachedMarketsReader`, etc) — when miss
      # rate stays > 50 % for 10 min on a hot op, the prewarm key
      # has drifted from what the handler looks up. We've shipped
      # three of these bugs in 24 h (#1185 / #1194 / #1195); the
      # alert is the cheapest detector. Deliberate that we
      # threshold on RATIO not absolute miss count: a cache that
      # serves 1 req/s with 100 % miss is fine, a cache that
      # serves 1000 req/s with 50 % miss is a phantom-key drift.
      - alert: ratesengine_api_cache_miss_rate_high
        expr: |
          (
            sum by (cache, op) (rate(ratesengine_api_cache_ops_total{result="miss"}[5m]))
            /
            sum by (cache, op) (rate(ratesengine_api_cache_ops_total[5m]))
          ) > 0.5
          and
          sum by (cache, op) (rate(ratesengine_api_cache_ops_total[5m])) > 0.1
        for: 10m
        labels:
          severity: ticket
          team: ratesengine
          component: api
          runbook_url: https://github.com/RatesEngine/rates-engine/blob/main/docs/operations/runbooks/cache-miss-rate-high.md
        annotations:
          summary: "API cache {{ $labels.cache }}/{{ $labels.op }} miss rate {{ $value | humanizePercentage }}"
          description: |
            Sustained > 50 % miss rate on the v1.Cached* wrapper for
            {{ $labels.cache }}/{{ $labels.op }}. The prewarm goroutine
            should keep hot ops > 90 % hit. Likely cause: the prewarm
            is calling the cached reader with a slightly-different
            argument tuple than the handler does (see
            cmd/ratesengine-api/main.go prewarmOnce + the handler at
            internal/api/v1/{markets,coins}.go). Cache key is a
            stringified tuple of all args; one drifted dimension
            (Order, Sources, Limit, …) means a phantom warmed slot.
            Follow the cache-miss-rate-high runbook.

      # Customer-webhook delivery health (F-1270 audit-2026-05-12).
      - alert: ratesengine_customer_webhook_delivery_failing
        expr: |
          sum(rate(ratesengine_customer_webhook_delivery_attempts_total{outcome=~"server_error|network_error"}[5m])) > 0.1
        for: 15m
        labels:
          severity: ticket
          team: ratesengine
          component: api
          runbook_url: https://github.com/RatesEngine/rates-engine/blob/main/docs/operations/runbooks/customer-webhook-delivery-failing.md
        annotations:
          summary: "Customer webhook delivery failing at {{ $value | humanize }}/s"
          description: |
            The customer-webhook delivery worker has been failing
            (5xx + network errors) at > 0.1 attempts/s for 15+ min.
            One customer's endpoint is likely sustained-down.

      - alert: ratesengine_customer_webhook_delivery_exhausted
        expr: |
          sum(rate(ratesengine_customer_webhook_delivery_attempts_total{outcome="exhausted"}[1h])) > 0
        for: 1h
        labels:
          severity: informational
          team: ratesengine
          component: api
          runbook_url: https://github.com/RatesEngine/rates-engine/blob/main/docs/operations/runbooks/customer-webhook-delivery-failing.md
        annotations:
          summary: "Customer webhook deliveries permanently failed (budget exhausted)"
          description: |
            A delivery hit the 15-attempt retry budget (72h) and
            was marked terminally failed.

      # Stripe platform-bridge sync errors (F-1219 follow-up,
      # 2026-05-13). Counter increments per failed platform-store
      # side effect inside the Stripe webhook path. Webhook
      # deliberately does NOT 5xx on these (Stripe retries would
      # not heal Postgres), so this metric is the operator-visible
      # signal that customer dashboard / Postgres key state is
      # drifting from Stripe billing state.
      - alert: ratesengine_stripe_platform_sync_errors
        expr: |
          sum(rate(ratesengine_stripe_platform_sync_errors_total[15m])) > 0
        for: 15m
        labels:
          severity: ticket
          team: ratesengine
          component: api
          runbook_url: https://github.com/RatesEngine/rates-engine/blob/main/docs/operations/runbooks/stripe-platform-sync-errors.md
        annotations:
          summary: "Stripe platform bridge degraded: {{ $value | humanize }} errors/s"
          description: |
            Stripe webhook → platform-store side effects failing.
            Per-`operation` label isolates the failing layer
            (get_account / upsert_subscription / account_update /
            list_keys / key_update). Follow the runbook.

      # F-0051 (audit-2026-05-26). Mirror of the rule in
      # deploy/monitoring/rules/api.yml; wave-96 pair lint
      # requires both copies to stay in sync.
      - alert: ratesengine_tls_cert_expiring_soon
        expr: |
          ratesengine_tls_cert_not_after_unix - time() < 14 * 24 * 3600
          and ratesengine_tls_cert_not_after_unix > 0
        for: 1h
        labels:
          severity: ticket
          team: ratesengine
          component: api
          runbook_url: https://github.com/RatesEngine/rates-engine/blob/main/docs/operations/runbooks/tls-cert-expiring-soon.md
        annotations:
          summary: "TLS cert for {{ $labels.host }} expires in <14 days"
          description: |
            The leaf certificate for {{ $labels.host }} expires at
            {{ $value | humanizeTimestamp }}. Caddy's Let's Encrypt
            auto-renewal normally triggers 30 days before expiry;
            this alert firing means the renewal hasn't happened
            (rate limit, DNS issue, ACME quota, Caddy stuck).

            Runbook: https://github.com/RatesEngine/rates-engine/blob/main/docs/operations/runbooks/tls-cert-expiring-soon.md
