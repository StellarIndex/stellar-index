---
# Supply-refresh alerts. Pair with the aggregator-resident supply
# refresher in cmd/stellarindex-aggregator (Task #57 + #66 + #70).
#
# Scrape source: the aggregator's Prometheus /metrics endpoint
# emits stellarindex_aggregator_supply_refresh_total{outcome=…},
# defined in internal/obs/metrics.go and incremented by
# runSupplyRefresh on every tick.
#
# Distinct from the systemd-timer-path alerts in
# deploy/monitoring/rules/supply-snapshot.yml — those consume the
# textfile metrics emitted by internal/supply/textfile.go and only
# fire when operators run the timer-driven path. These alerts fire
# on the goroutine path operators use when
# `[supply] aggregator_refresh_enabled = true`.
#
# Alert family:
#
#   - `stellarindex_aggregator_supply_refresh_stalled` — the
#     refresher hasn't recorded a successful tick in ≥ 30 min.
#     With the default 5-min cadence that's 6 missed ticks.
#     Either the goroutine is wedged (aggregator deadlock) or
#     every recent tick has failed.
#
#   - `stellarindex_aggregator_supply_refresh_error_dominant` —
#     for ≥ 30 min, the rate of error outcomes (no_ledger /
#     no_observation / compute_error / write_error) exceeds the
#     rate of `ok` outcomes. Indicates the refresher is running
#     but consistently producing wrong results — operator config
#     drift, observer not backfilled, or storage layer broken.

groups:
  - name: stellarindex.supply_refresh
    interval: 60s
    rules:

      - alert: stellarindex_aggregator_supply_refresh_stalled
        expr: |
          (
            time()
            - max(timestamp(stellarindex_aggregator_supply_refresh_total{outcome="ok"}))
          ) > (30 * 60)
        for: 5m
        labels:
          severity: page
          team: stellarindex
          component: supply
          runbook_url: https://github.com/StellarIndex/stellar-index/blob/main/docs/operations/runbooks/supply-refresh-stalled.md
        annotations:
          summary: "supply refresher hasn't recorded a successful tick in {{ $value | humanizeDuration }} (cadence 5m, threshold 30m)"
          description: |
            The aggregator-resident supply refresher emits
            stellarindex_aggregator_supply_refresh_total{outcome="ok"}
            on every successful per-asset tick. No `ok` increments
            in 30+ minutes means either the goroutine is wedged
            (aggregator deadlock), the orchestrator hasn't started,
            or every recent tick across every watched asset has
            failed. /v1/assets/{id}'s F2 fields go increasingly
            stale. Runbook: check aggregator process health first;
            inspect logs for recurring outcome labels; route to the
            error_dominant runbook if every tick is genuinely
            failing.

      # Same blind spot as supply-snapshot's `_stale`: when no
      # `outcome="ok"` increment has ever happened (aggregator
      # running but `[supply] aggregator_refresh_enabled = false`,
      # or the orchestrator hasn't started any supply tick yet),
      # the metric series doesn't appear in /metrics — Prometheus
      # counters with no increments are absent, not zero — so
      # `_stalled` evaluates to "no data" and never fires.
      #
      # 36 h matches the cushion used in supply-snapshot's
      # `_never_initialized`: a brand-new aggregator deployment has
      # plenty of time to fire its first tick; a deployment that's
      # been up for over a day without one is genuinely uninitialized.
      - alert: stellarindex_aggregator_supply_refresh_never_initialized
        expr: |
          absent_over_time(stellarindex_aggregator_supply_refresh_total{outcome="ok"}[36h]) == 1
        for: 5m
        labels:
          severity: ticket
          team: stellarindex
          component: supply
          runbook_url: https://github.com/StellarIndex/stellar-index/blob/main/docs/operations/runbooks/supply-snapshot-never-initialized.md
        annotations:
          summary: "supply refresher (goroutine path) has never recorded a successful tick"
          description: |
            stellarindex_aggregator_supply_refresh_total{outcome="ok"}
            has been absent for ≥ 36 h. Either
            `[supply] aggregator_refresh_enabled = false` (the
            default — operator hasn't opted into the goroutine
            path), or the orchestrator hasn't fired its first tick.
            Distinct from `_stalled` (which requires the metric to
            have existed at some point); together they cover both
            "was working, stopped" and "never worked." Routes to
            the same runbook as the timer-path equivalent
            (`supply-snapshot-never-initialized`) since the fix is
            symmetric: pick Path A or Path B.

      - alert: stellarindex_aggregator_supply_refresh_error_dominant
        # F-1320: aggregate PER ASSET (`by (asset_key)`), not fleet-wide —
        # a single asset failing 100% of its ticks could never push the
        # fleet-wide fraction past 50% while healthy siblings diluted it,
        # so a permanently-stale asset was un-alertable. Also exclude the
        # benign `dormant` outcome (a dormant asset's last observation IS
        # current — accepted, not an error) and `missing_baseline`
        # (incident 2026-07-06: a SAC-wrapper whose pre-Soroban opening
        # balance hasn't been seeded — a range-scoped condition fixed by
        # `stellarindex-ops supply seed-sep41-genesis`, not corruption; a
        # genuine post-seed negative still surfaces as `compute_error`).
        expr: |
          (
            sum by (asset_key) (rate(stellarindex_aggregator_supply_refresh_total{outcome!~"ok|dormant|missing_baseline"}[5m]))
            /
            (sum by (asset_key) (rate(stellarindex_aggregator_supply_refresh_total[5m])) > 0)
          ) > 0.5
        for: 30m
        labels:
          severity: ticket
          team: stellarindex
          component: supply
          runbook_url: https://github.com/StellarIndex/stellar-index/blob/main/docs/operations/runbooks/supply-refresh-error-dominant.md
        annotations:
          summary: "supply refresher: > 50% of ticks non-ok for asset {{ $labels.asset_key }} for ≥ 30m"
          description: |
            More than half of the supply refresher's ticks for
            asset {{ $labels.asset_key }} are failing — outcome ∈
            {no_ledger, no_observation, compute_error, write_error,
            stale_component, missing_freshness} (the benign `dormant`
            and `missing_baseline` outcomes are excluded). Steady-state
            should be mostly `ok`; a single asset stuck here is usually a
            stalled freshness producer (sustained `stale_component`) or
            operator config drift (watched_classic_assets parse errors,
            sac_wrappers map missing entries). A SAC-wrapper stuck on
            `missing_baseline` (visible in the per-asset series, not this
            alert) needs `stellarindex-ops supply seed-sep41-genesis`.
            Runbook: split by outcome, inspect the dominant kind; for
            sustained `stale_component` on one asset, see
            WithStaleComponentLedgersFor.
