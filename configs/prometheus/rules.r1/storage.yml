---
# Storage alerts — Postgres + TimescaleDB + pgBackRest.

groups:
  - name: stellarindex.storage
    interval: 30s
    rules:

      # F-1329: the scrape job is `postgres_exporter` (not `postgres`)
      # and postgres_exporter emits no `role` label, so the old
      # `up{job="postgres",role="primary"}` selector matched no series
      # and this PAGE was dead. postgres_exporter exposes `pg_up` (1 =
      # the exporter reached the server, 0 = it could not) — the direct
      # liveness signal for the single-node r1 primary.
      - alert: stellarindex_timescale_primary_down
        expr: pg_up == 0
        for: 30s
        labels:
          severity: page
          team: stellarindex
          component: storage
          runbook_url: https://github.com/StellarIndex/stellar-index/blob/main/docs/operations/runbooks/timescale-primary-down.md
        annotations:
          summary: "TimescaleDB primary is down (SEV-1)"
          description: |
            Postgres primary {{ $labels.instance }} has been unreachable for
            30+ s. Writes are blocked everywhere. Patroni should auto-failover
            within 60 s — if not, follow the manual-failover path in the
            runbook.

      # F-0151 (audit-2026-05-26): the indexer's *sql.DB pool
      # silently held dead conns for ~14 h after postgres@15-main
      # crashed + recovered, until a manual indexer restart. The
      # pool now retires conns every 30 min via
      # `PoolConnMaxLifetime`; this alert is the LIVE signal so
      # the next cascade surfaces in minutes instead of hours.
      # The indexer's `watchPostgresPing` goroutine probes the
      # pool every 60 s and increments
      # `stellarindex_postgres_ping_total{outcome="error"}` per
      # failure.
      - alert: stellarindex_postgres_ping_failing
        expr: rate(stellarindex_postgres_ping_total{outcome="error"}[5m]) > 0.5
        for: 2m
        labels:
          severity: page
          team: stellarindex
          component: storage
          runbook_url: https://github.com/StellarIndex/stellar-index/blob/main/docs/operations/runbooks/postgres-ping-failing.md
        annotations:
          summary: "Indexer postgres pool ping failing (F-0151)"
          description: |
            The indexer's resilience-ping goroutine is reporting
            sustained Postgres ping failures (rate {{ $value }}/s
            over the last 5 m). The pool's 30 min lifetime
            safety-net will refresh dead conns automatically, but
            until then writes are likely stalled. Check
            `postgresql@15-main.service` (NOT the umbrella) and
            the indexer journal for the `pool may be wedged` log
            line.

      - alert: stellarindex_timescale_replica_lag
        expr: pg_replication_lag_seconds > 5
        for: 2m
        labels:
          severity: ticket
          team: stellarindex
          component: storage
          runbook_url: https://github.com/StellarIndex/stellar-index/blob/main/docs/operations/runbooks/replica-lag.md
        annotations:
          summary: "Postgres sync replica lagging {{ $value }}s"
          description: |
            Replica {{ $labels.instance }} is more than 5 s behind the primary
            for 2+ minutes. If this is the sync replica, writes on the primary
            are being held back until it catches up — look for saturation on
            the replica.

      # F-1251 (audit-2026-05-12): lock-table headroom. The
      # 2026-05-06 SEV-3 hit `out of shared memory (53200)` when
      # the per-tx lock table saturated under concurrent ingest
      # (default max_locks_per_transaction = 64 × 200 conns =
      # 12,800-entry table). Bumped to 256 (51,200) by hand, which
      # held ~9 days before the 2026-05-15 recurrence: trades grew
      # to ~2,738 chunks and concurrent diagnostic queries + the
      # all-time SDEX backfill thrashed it again. The R1 ansible
      # role now templates max_locks_per_transaction = 4096
      # (819,200 entries — permanent growth headroom). This alert
      # fires at 70% saturation so we get warning long before any
      # future bump is forced. Depends on postgres_exporter (not
      # currently scraped on R1 — see configs/prometheus/rules.r1/
      # README.md "remaining files NOT shipped"; the alert lights
      # up when the exporter lands.)
      - alert: stellarindex_timescale_lock_table_pressure
        expr: |
          pg_locks_count
            / (pg_settings_max_locks_per_transaction * pg_settings_max_connections)
            > 0.7
        for: 5m
        labels:
          severity: ticket
          team: stellarindex
          component: storage
          runbook_url: https://github.com/StellarIndex/stellar-index/blob/main/docs/operations/runbooks/pg-conns-saturated.md
        annotations:
          summary: "Postgres lock-table > 70% saturated (P3)"
          description: |
            Lock-table utilisation is {{ $value | humanizePercentage }}.
            The next sustained ingest spike risks SQLSTATE 53200
            ("out of shared memory") and dropped INSERTs — the
            2026-05-06 SEV-3 class. Bump
            `postgres_max_locks_per_transaction` in the archival-node
            role and reapply.

      - alert: stellarindex_timescale_disk_full
        expr: |
          (node_filesystem_avail_bytes{mountpoint="/var/lib/postgresql"} /
           node_filesystem_size_bytes{mountpoint="/var/lib/postgresql"}) * 100 < 10
        for: 1m
        labels:
          severity: page
          team: stellarindex
          component: storage
          runbook_url: https://github.com/StellarIndex/stellar-index/blob/main/docs/operations/runbooks/db-disk-full.md
        annotations:
          summary: "Postgres disk {{ $value | humanize }}% free (SEV-1)"
          description: |
            Postgres data volume on {{ $labels.instance }} has < 10 % free.
            WAL will refuse to write once full, halting all writes. Act now.

      - alert: stellarindex_timescale_disk_warning
        expr: |
          (node_filesystem_avail_bytes{mountpoint="/var/lib/postgresql"} /
           node_filesystem_size_bytes{mountpoint="/var/lib/postgresql"}) * 100 < 20
        for: 10m
        labels:
          severity: ticket
          team: stellarindex
          component: storage
          runbook_url: https://github.com/StellarIndex/stellar-index/blob/main/docs/operations/runbooks/db-disk-full.md
        annotations:
          summary: "Postgres disk {{ $value | humanize }}% free"
          description: |
            Postgres data volume on {{ $labels.instance }} under 20 %. Plan
            retention tuning / vacuum / compression policy review. Hard page
            fires at 10 %.

      # Root filesystem (/) — distinct from /var/lib/postgresql
      # which has its own ZFS dataset with separate space.
      # Caught the 2026-05-10 outage retrospectively: root FS hit
      # 100 % from log accumulation before any existing alert
      # fired. Without this rule the operator sees the symptom
      # downstream (Redis MISCONF → /v1/price 404s) rather than
      # the cause.
      - alert: stellarindex_node_root_disk_full
        expr: |
          (node_filesystem_avail_bytes{mountpoint="/"} /
           node_filesystem_size_bytes{mountpoint="/"}) * 100 < 10
        for: 1m
        labels:
          severity: page
          team: stellarindex
          component: storage
          runbook_url: https://github.com/StellarIndex/stellar-index/blob/main/docs/operations/runbooks/redis-write-blocked-disk-full.md
        annotations:
          summary: "Root filesystem on {{ $labels.instance }} {{ $value | humanize }}% free (SEV-1)"
          description: |
            Root FS (/) under 10 % free on {{ $labels.instance }}.
            Redis can't snapshot once full; with the default
            stop-writes-on-bgsave-error=yes that blocks every cache
            write, blocking aggregator VWAP refresh, surfacing as
            `/v1/price` 404s on rewritten / triangulated /
            stablecoin-proxy pairs (incident 2026-05-10).

      - alert: stellarindex_node_root_disk_warning
        expr: |
          (node_filesystem_avail_bytes{mountpoint="/"} /
           node_filesystem_size_bytes{mountpoint="/"}) * 100 < 20
        for: 10m
        labels:
          severity: ticket
          team: stellarindex
          component: storage
          runbook_url: https://github.com/StellarIndex/stellar-index/blob/main/docs/operations/runbooks/redis-write-blocked-disk-full.md
        annotations:
          summary: "Root filesystem on {{ $labels.instance }} {{ $value | humanize }}% free"
          description: |
            Root FS (/) under 20 % on {{ $labels.instance }}.
            Investigate /var/log + /tmp + /var/cache before this
            grows into the page-tier alert.

      # Fast-fill predictor — the static thresholds above fire when
      # the line is ALREADY crossed; the 2026-06-11 CH log-wedge loop
      # filled root at ~3.8 GB/min, going from healthy to full in
      # ~5 min — faster than a human can act on a <10% page. This
      # fires while there is still time: root trending to FULL within
      # 30 min. The avail<50% guard keeps meaningless trends on a
      # roomy disk from paging.
      - alert: stellarindex_node_root_disk_filling_fast
        expr: |
          (
            predict_linear(node_filesystem_avail_bytes{mountpoint="/"}[10m], 1800) < 0
          and
            (node_filesystem_avail_bytes{mountpoint="/"} /
             node_filesystem_size_bytes{mountpoint="/"}) < 0.5
          )
        for: 2m
        labels:
          severity: page
          team: stellarindex
          component: storage
          runbook_url: https://github.com/StellarIndex/stellar-index/blob/main/docs/operations/runbooks/node-root-disk-filling-fast.md
        annotations:
          summary: "Root filesystem on {{ $labels.instance }} trending to FULL within 30 min"
          description: |
            Root FS (/) on {{ $labels.instance }} is filling fast enough
            to reach 0 bytes within 30 minutes (10m linear trend). This
            is the log-flood signature (2026-05-10 / 2026-05-13 /
            2026-06-11 class): find the writer NOW —
            `du -xs /var/log/* /tmp | sort -rh | head` — and see the
            runbook for the CH log-wedge kill sequence.

      # Guard-config liveness — born 2026-07-03: the 2026-06-11
      # incident's rsyslog suppression was codified in ansible but
      # NEVER applied to r1 (recorded as fixed), and live-only hand
      # fixes existed that an ansible render would erase. Ansible does
      # not auto-run against r1, so neither direction self-heals;
      # config-assertions.sh (hourly timer) checks the load-bearing
      # files' CONTENT and this pages the gap within ~2h.
      - alert: stellarindex_config_assertion_failed
        expr: stellarindex_config_assertion_ok == 0
        for: 65m
        labels:
          severity: ticket
          team: stellarindex
          component: storage
          runbook_url: https://github.com/StellarIndex/stellar-index/blob/main/docs/operations/runbooks/config-assertion-failed.md
        annotations:
          summary: "Guard config {{ $labels.assertion }} is missing or reverted on {{ $labels.instance }}"
          description: |
            config-assertions.sh found {{ $labels.assertion }} absent or
            content-reverted for two consecutive hourly runs. Each
            assertion is a load-bearing incident fix (root-fill loop
            guards, public-edge firewall, redis cap, CS-010 supply
            config). See the runbook for the per-assertion restore
            recipe and docs/operations/r1-ansible-drift-2026-07-03.md
            for why this class exists.

      - alert: stellarindex_config_assertions_stale
        expr: time() - timestamp(stellarindex_config_assertion_ok) > 7200
        for: 30m
        labels:
          severity: ticket
          team: stellarindex
          component: storage
          runbook_url: https://github.com/StellarIndex/stellar-index/blob/main/docs/operations/runbooks/config-assertion-failed.md
        annotations:
          summary: "config-assertions has not run for 2h on {{ $labels.instance }}"
          description: |
            The hourly config-assertions.timer is not producing fresh
            textfile output — a silent checker is the same class of
            failure the checker exists to catch. systemctl status
            config-assertions.timer.

      # Redis BGSAVE health — when Redis can't snapshot to disk
      # (typically because the volume backing /var/lib/redis is
      # full) it sets stop-writes-on-bgsave-error and rejects
      # every SET. The aggregator's VWAP cache writes start
      # failing for every pair. Catches the same incident shape
      # as the root-disk alert above from a different angle:
      # the disk could be on a separate mount, or the failure
      # could be caused by something other than disk space
      # (permissions, fork failure on memory pressure).
      - alert: stellarindex_redis_writes_blocked
        expr: redis_rdb_last_bgsave_status == 0
        for: 1m
        labels:
          severity: page
          team: stellarindex
          component: cache
          runbook_url: https://github.com/StellarIndex/stellar-index/blob/main/docs/operations/runbooks/redis-write-blocked-disk-full.md
        annotations:
          summary: "Redis BGSAVE failing on {{ $labels.instance }} (SEV-1) — writes blocked"
          description: |
            Redis BGSAVE on {{ $labels.instance }} has been failing
            for 1+ minute. With the default
            stop-writes-on-bgsave-error=yes, every Redis write is
            being rejected — aggregator VWAP cache stops refreshing,
            `/v1/price` 404s on rewritten/triangulated/proxy pairs
            (incident 2026-05-10). Free disk on the Redis volume
            (typically `/`), then `redis-cli BGSAVE` to clear the
            stop-writes block.

      - alert: stellarindex_timescale_connections_saturated
        expr: |
          (sum by (instance) (pg_stat_activity_count) / on (instance)
           pg_settings_max_connections) * 100 > 80
        for: 5m
        labels:
          severity: ticket
          team: stellarindex
          component: storage
          runbook_url: https://github.com/StellarIndex/stellar-index/blob/main/docs/operations/runbooks/pg-conns-saturated.md
        annotations:
          summary: "Postgres connection pool {{ $value | humanize }}% used"
          description: |
            > 80 % of max_connections in use for 5+ minutes. PgBouncer should
            be smoothing this; check that the pool is healthy + sized right.

      # ── INERT (F-1329) — NO PRODUCER ──────────────────────────────
      # The two TimescaleDB-internal alerts below reference metrics that
      # NOTHING emits today:
      #   - stellarindex_cagg_last_refresh_unix /
      #     stellarindex_cagg_refresh_interval_seconds (cagg-stale)
      #   - stellarindex_uncompressed_chunks_older_than_7d (compression-lag)
      # These describe TimescaleDB job-scheduler state
      # (timescaledb_information.job_stats / .chunks). No periodic worker in
      # this repo queries those views and re-exports them as Prometheus
      # gauges, and postgres_exporter's default queries don't cover them
      # either. The clean fix is a small custom postgres_exporter query
      # (queries.yaml) or a textfile-collector SQL script — both real but
      # larger than a rule edit. Until that producer exists these rules
      # cannot fire; they are kept (signal matters) but INERT and TRACKED
      # in scripts/ci/lint-metric-refs.sh's KNOWN_INERT list. To un-inert:
      # add the producer, then drop the entries from KNOWN_INERT.
      - alert: stellarindex_timescale_cagg_stale
        # INERT: stellarindex_cagg_last_refresh_unix /
        # stellarindex_cagg_refresh_interval_seconds have no producer.
        expr: |
          (time() - stellarindex_cagg_last_refresh_unix) > 5 * stellarindex_cagg_refresh_interval_seconds
        for: 5m
        labels:
          severity: ticket
          team: stellarindex
          component: storage
          runbook_url: https://github.com/StellarIndex/stellar-index/blob/main/docs/operations/runbooks/cagg-stale.md
        annotations:
          summary: "Continuous aggregate {{ $labels.cagg }} hasn't refreshed"
          description: |
            Refresh for {{ $labels.cagg }} is 5× its configured interval
            overdue. API reads from this CAGG will return stale data until it
            refreshes; check timescaledb job-scheduler health.

      - alert: stellarindex_timescale_compression_lag
        # INERT: stellarindex_uncompressed_chunks_older_than_7d has no producer.
        expr: stellarindex_uncompressed_chunks_older_than_7d > 0
        for: 24h
        labels:
          severity: informational
          team: stellarindex
          component: storage
          runbook_url: https://github.com/StellarIndex/stellar-index/blob/main/docs/operations/runbooks/compression-lag.md
        annotations:
          summary: "{{ $value }} chunks older than 7d are still uncompressed"
          description: |
            Compression policy should run on chunks older than 7 days. If some
            aren't compressed, the timescaledb job scheduler may be misfiring.

      # F-1329: repointed off the never-emitted
      # `stellarindex_pgbackrest_last_success_unix` /
      # `stellarindex_pgbackrest_expected_interval_seconds` pair (note the
      # bogus `stellarindex_` prefix — the SCRAPED exporter is woblerr's
      # pgbackrest_exporter, job `pgbackrest_exporter`, which emits
      # `pgbackrest_*`). The exporter computes
      # `pgbackrest_backup_since_last_completion_seconds` server-side as
      # (now - last_backup_stop_time), one series per backup_type
      # {full,diff,incr} per stanza — so it IS already "seconds since",
      # no time()-subtraction. We take `min by (stanza)` so the freshest
      # backup of ANY type satisfies the alert, and exclude the exporter's
      # aggregate pseudo-stanzas so a per-stanza failure can't be masked.
      # Backups can now page if they silently stop (the F-1329 gap).
      - alert: stellarindex_timescale_backup_failed
        expr: |
          min by (stanza) (
            pgbackrest_backup_since_last_completion_seconds{stanza!~"all-stanzas.*"}
          ) > 25 * 3600
        for: 5m
        labels:
          severity: ticket
          team: stellarindex
          component: storage
          runbook_url: https://github.com/StellarIndex/stellar-index/blob/main/docs/operations/runbooks/backup-failed.md
        annotations:
          summary: "pgBackRest stanza {{ $labels.stanza }} last backup {{ $value | humanizeDuration }} ago"
          description: |
            Backup has missed at least one expected daily cycle (no completed
            full/diff/incr in > 25 h). Check pgBackRest logs + MinIO connectivity.

      - alert: stellarindex_timescale_backup_none_24h
        expr: |
          min by (stanza) (
            pgbackrest_backup_since_last_completion_seconds{stanza!~"all-stanzas.*"}
          ) > 24 * 3600
        for: 5m
        labels:
          severity: page
          team: stellarindex
          component: storage
          runbook_url: https://github.com/StellarIndex/stellar-index/blob/main/docs/operations/runbooks/backup-failed.md
        annotations:
          summary: "No successful Postgres backup in > 24 h (SEV-1)"
          description: |
            RPO breach. At 24h+ without a backup we exceed the documented
            5-min RPO target by 288×. Escalate immediately.
