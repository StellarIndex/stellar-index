---
# Top-level playbook — brings a fresh Ubuntu 24.04 (or 22.04) box up
# as a Stellar Index archival node. Idempotent; safe to re-run.
#
# All apt-repo tasks use {{ ansible_distribution_release }} so the
# role itself is codename-agnostic; the assertion below just pins
# the supported-OS set explicitly so an accidental install on, say,
# Debian or CentOS fails loud rather than halfway-through.
#
# Usage:
#   ansible-playbook -i inventory/r1.yml playbooks/archival-node.yml
#
# See configs/ansible/README.md for prerequisites.

- name: Bootstrap archival node
  hosts: archival_nodes
  become: true
  gather_facts: true

  pre_tasks:
    - name: Confirm Ubuntu 22.04 or 24.04 LTS
      ansible.builtin.assert:
        that:
          - ansible_facts.distribution == "Ubuntu"
          - ansible_facts.distribution_major_version in ["22", "24"]
        fail_msg: >-
          This role targets Ubuntu 22.04 or 24.04 LTS. Got
          {{ ansible_facts.distribution }} {{ ansible_facts.distribution_version }}.

  # Vault-encrypted region secrets (postgres passwords, MinIO keys,
  # healthcheck ping URLs). Wired 2026-07-03 — previously the README
  # implied it but nothing loaded the file, so every secret-using task
  # died on undefined vars. Override secrets_file for other regions.
  vars_files:
    - "{{ secrets_file | default('../inventory/r1.secrets.yml') }}"

  roles:
    - role: archival-node
