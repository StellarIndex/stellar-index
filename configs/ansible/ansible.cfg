[defaults]
inventory              = ./inventory
roles_path             = ./roles
collections_paths      = ~/.ansible/collections
host_key_checking      = True
retry_files_enabled    = False
# YAML output for readable play recaps. The old community.general.yaml
# callback was removed in collection v12; the same behaviour now lives
# in the built-in default callback via result_format.
stdout_callback        = default
result_format          = yaml
bin_ansible_callbacks  = True
forks                  = 10
timeout                = 30
gathering              = smart
fact_caching           = jsonfile
fact_caching_connection= /tmp/ansible_fact_cache
fact_caching_timeout   = 3600

# Output: one task per line, no huge "OK/CHANGED" stanzas unless -v
display_skipped_hosts  = False

[ssh_connection]
pipelining             = True
ssh_args               = -o ControlMaster=auto -o ControlPersist=60s -o ServerAliveInterval=30

[privilege_escalation]
become                 = True
become_method          = sudo
become_ask_pass        = False
