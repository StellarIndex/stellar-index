---
# Inventory for R1 (Hetzner FSN1 — Falkenstein, Germany).
# Hardware: Intel Core Ultra 7 265 + 192 GB DDR5 ECC + 4× 7.68 TB
# Samsung PM9A3 NVMe. Deployed 2026-04-23.
#
# Secrets (DB password, MinIO creds, etc.) live in r1.secrets.yml
# (ansible-vault — see configs/ansible/README.md §Secrets).

all:
  vars:
    # ───── Region identity ─────────────────────────────────────────
    region_id:           "r1"
    region_name:         "Falkenstein"
    home_domain:         "ratesengine.net"

    # ───── Stellar network ─────────────────────────────────────────
    stellar_network:     "pubnet"
    catchup_mode:        "CATCHUP_RECENT"
    is_validator:        false
    node_is_validator:   "{{ is_validator }}"

    # ───── Storage layout ──────────────────────────────────────────
    # Post-installimage state (verified 2026-04-23):
    #   * nvme0n1 (S6CKNN0Y717048): OS mirror — partitions 1-3
    #     (ESP/swap/root), partition 4 created by this role for ZFS.
    #   * nvme1n1 (S6CKNN0Y717042): OS mirror — same shape as nvme0.
    #   * nvme2n1 (S6CKNN0Y716944): untouched, whole-drive ZFS vdev.
    #   * nvme3n1 (S6CKNN0Y718947): untouched, whole-drive ZFS vdev.
    zfs_os_drives_needing_data_partition:
      - /dev/nvme0n1
      - /dev/nvme1n1
    zfs_data_devices:
      # OS-mirror drives — p4 created by the role at apply time
      - /dev/disk/by-id/nvme-SAMSUNG_MZQL27T6HBLA-00A07_S6CKNN0Y717048-part4
      - /dev/disk/by-id/nvme-SAMSUNG_MZQL27T6HBLA-00A07_S6CKNN0Y717042-part4
      # Pristine drives — whole-device vdevs
      - /dev/disk/by-id/nvme-SAMSUNG_MZQL27T6HBLA-00A07_S6CKNN0Y716944
      - /dev/disk/by-id/nvme-SAMSUNG_MZQL27T6HBLA-00A07_S6CKNN0Y718947
    zfs_data_pool_type:  "raidz2"
    zfs_data_pool_name:  "data"

    # ───── Roles colocated on this host ────────────────────────────
    run_postgres:        true
    run_stellar_core:    true
    run_galexie:         true
    run_stellar_rpc:     true
    run_minio:           true
    run_observability:   true

    # ───── Galexie export target ───────────────────────────────────
    galexie_backend_type: "s3"
    galexie_s3_endpoint:  "http://127.0.0.1:9000"
    galexie_s3_bucket:    "galexie-live"
    galexie_s3_region:    "{{ region_id }}"

    # ───── Observability ───────────────────────────────────────────
    # Single-host deployment for now — only localhost scrapes.
    # When we add a dedicated monitoring box, extend the allow-list.
    prometheus_scrape_allow_cidrs:
      - "127.0.0.1/32"
    # Loki push URL left empty until we stand up the log-aggregation
    # layer. Absent = local journald only.
    loki_push_url: ""

    # ───── SSH hardening ───────────────────────────────────────────
    admin_ssh_keys:
      - "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIPknEhtWeiFH7MRebS0X2A2JdHbmyixmpD0YaJChG/jQ Ashs-MacBook-Pro.local-04-04-2024"
    # For the first apply, allow SSH from anywhere so we don't lock
    # ourselves out. Tighten to workstation IP / VPN CIDR after the
    # hardening pass is validated.
    allowed_ssh_cidrs:
      - "0.0.0.0/0"

  children:
    archival_nodes:
      hosts:
        r1-01.ratesengine.net:
          ansible_host:         "136.243.90.96"
          ansible_user:         "root"
          ansible_port:         22
          ansible_ssh_private_key_file: "~/.ssh/id_ed25519"
          # Pin Python interpreter. /usr/bin/python3 is a symlink to
          # python3.12 on noble; pinning silences the auto-discovery
          # warning and insulates us from future default shifts.
          ansible_python_interpreter: /usr/bin/python3
