---
- name: Reload systemd
  ansible.builtin.systemd:
    daemon_reload: true

- name: Restart postgres
  ansible.builtin.systemd:
    name: "postgresql@{{ postgres_version }}-main"
    state: restarted

- name: Restart stellar-core
  ansible.builtin.systemd:
    name: stellar-core
    state: restarted

- name: Restart galexie
  ansible.builtin.systemd:
    name: galexie
    state: restarted

- name: Restart minio
  ansible.builtin.systemd:
    name: minio
    state: restarted

- name: Restart clickhouse-server
  ansible.builtin.systemd:
    name: clickhouse-server
    state: restarted

- name: Restart stellarindex-indexer
  ansible.builtin.systemd:
    name: stellarindex-indexer
    state: restarted

- name: Restart stellarindex-aggregator
  ansible.builtin.systemd:
    name: stellarindex-aggregator
    state: restarted

- name: Restart stellarindex-api
  ansible.builtin.systemd:
    name: stellarindex-api
    state: restarted

# Timer-driven oneshot units (verify-archive-tier-a /
# archive-completeness / supply-snapshot): a unit-file change is
# picked up on the next timer fire after a daemon-reload — the
# oneshot service itself is not restarted (it isn't running).
- name: Restart verify-archive-tier-a.timer
  ansible.builtin.systemd:
    name: verify-archive-tier-a.timer
    state: restarted

- name: Restart archive-completeness.timer
  ansible.builtin.systemd:
    name: archive-completeness.timer
    state: restarted

- name: Restart supply-snapshot.timer
  ansible.builtin.systemd:
    name: supply-snapshot.timer
    state: restarted

- name: Restart node_exporter
  # Legacy handler kept for any pre-#33 task references; new tasks
  # should notify `Restart prometheus-node-exporter` instead.
  ansible.builtin.systemd:
    name: node_exporter
    state: restarted

- name: Restart prometheus-node-exporter
  ansible.builtin.systemd:
    name: prometheus-node-exporter
    state: restarted

- name: Restart core exporter
  ansible.builtin.systemd:
    name: stellar-core-prometheus-exporter
    state: restarted

- name: Restart nftables
  ansible.builtin.systemd:
    name: nftables
    state: restarted

- name: Restart ssh
  ansible.builtin.systemd:
    name: ssh
    state: restarted

# 15-log-discipline — journald cap is applied by restarting the
# daemon; the new SystemMaxUse limit takes effect on the next
# rotation cycle. Restarting is cheap (sub-second) and idempotent.
- name: Restart systemd-journald
  ansible.builtin.systemd:
    name: systemd-journald
    state: restarted

# rsyslog needs a HUP rather than a restart to pick up the
# /etc/logrotate.d/rsyslog drop-in; reload triggers a HUP via
# systemd's ExecReload, which rotates without interrupting logging.
- name: Reload rsyslog
  ansible.builtin.systemd:
    name: rsyslog
    state: reloaded

# 17-stellarindex-healthchecks — wrapper-script and unit edits
# notify only the matching timer group, so a touch on smoke.sh
# doesn't churn the heartbeat or sla-probe timers.
- name: Restart stellarindex-heartbeat timers
  ansible.builtin.systemd:
    name: "stellarindex-heartbeat@{{ item }}.timer"
    state: restarted
  loop:
    - indexer
    - aggregator
    - api

- name: Restart stellarindex-smoke timer
  ansible.builtin.systemd:
    name: stellarindex-smoke.timer
    state: restarted

- name: Restart stellarindex-sla-probe timer
  ansible.builtin.systemd:
    name: stellarindex-sla-probe.timer
    state: restarted

- name: Restart redis
  ansible.builtin.systemd:
    name: redis-server
    state: restarted

- name: Reload caddy
  ansible.builtin.systemd:
    name: caddy
    state: reloaded
