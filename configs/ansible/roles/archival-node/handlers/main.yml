---
- name: Reload systemd
  ansible.builtin.systemd:
    daemon_reload: true

- name: Restart postgres
  ansible.builtin.systemd:
    name: "postgresql@{{ postgres_version }}-main"
    state: restarted

- name: Restart stellar-core
  ansible.builtin.systemd:
    name: stellar-core
    state: restarted

- name: Restart galexie
  ansible.builtin.systemd:
    name: galexie
    state: restarted

- name: Restart minio
  ansible.builtin.systemd:
    name: minio
    state: restarted

- name: Restart ratesengine-indexer
  ansible.builtin.systemd:
    name: ratesengine-indexer
    state: restarted

- name: Restart ratesengine-aggregator
  ansible.builtin.systemd:
    name: ratesengine-aggregator
    state: restarted

- name: Restart ratesengine-api
  ansible.builtin.systemd:
    name: ratesengine-api
    state: restarted

# Timer-driven oneshot units (verify-archive-tier-a /
# archive-completeness / supply-snapshot): a unit-file change is
# picked up on the next timer fire after a daemon-reload — the
# oneshot service itself is not restarted (it isn't running).
- name: Restart verify-archive-tier-a.timer
  ansible.builtin.systemd:
    name: verify-archive-tier-a.timer
    state: restarted

- name: Restart archive-completeness.timer
  ansible.builtin.systemd:
    name: archive-completeness.timer
    state: restarted

- name: Restart supply-snapshot.timer
  ansible.builtin.systemd:
    name: supply-snapshot.timer
    state: restarted

- name: Restart node_exporter
  # Legacy handler kept for any pre-#33 task references; new tasks
  # should notify `Restart prometheus-node-exporter` instead.
  ansible.builtin.systemd:
    name: node_exporter
    state: restarted

- name: Restart prometheus-node-exporter
  ansible.builtin.systemd:
    name: prometheus-node-exporter
    state: restarted

- name: Restart core exporter
  ansible.builtin.systemd:
    name: stellar-core-prometheus-exporter
    state: restarted

- name: Restart nftables
  ansible.builtin.systemd:
    name: nftables
    state: restarted

- name: Restart ssh
  ansible.builtin.systemd:
    name: ssh
    state: restarted

# 15-log-discipline — journald cap is applied by restarting the
# daemon; the new SystemMaxUse limit takes effect on the next
# rotation cycle. Restarting is cheap (sub-second) and idempotent.
- name: Restart systemd-journald
  ansible.builtin.systemd:
    name: systemd-journald
    state: restarted

# rsyslog needs a HUP rather than a restart to pick up the
# /etc/logrotate.d/rsyslog drop-in; reload triggers a HUP via
# systemd's ExecReload, which rotates without interrupting logging.
- name: Reload rsyslog
  ansible.builtin.systemd:
    name: rsyslog
    state: reloaded
