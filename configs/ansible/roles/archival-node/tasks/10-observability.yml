---
# node_exporter + stellar-core-prometheus-exporter + promtail.
# Metrics on :9100 and :9473 respectively; both bound to loopback
# and reachable only over the internal_cidrs (nftables enforces).
# Promtail ships journald logs to the local Loki (:3100).

# Node-exporter source-of-truth: the Debian package
# `prometheus-node-exporter` (#33 cutover 2026-05-20). Previously
# we hand-downloaded /usr/local/bin/node_exporter and a custom
# systemd unit, which (a) silently squatted :9100 against any
# parallel-installed package, (b) didn't auto-update for CVE
# coverage, and (c) ran a 2024 binary. The package version of the
# unit + binary is the canonical setup; we keep the same
# collectors and the same textfile_collector dir for full
# metric-source continuity (archive_completeness.prom,
# sla_probe.prom, galexie_archive_tip_lag.prom etc.).
- name: Install prometheus-node-exporter Debian package
  ansible.builtin.apt:
    name: prometheus-node-exporter
    state: present
    update_cache: true
    cache_valid_time: 3600

# Textfile-collector landing dir. cmd/stellarindex-sla-probe writes
# its prom file here; cmd/stellarindex-ops verify-archive +
# archive-completeness + supply-snapshot write here too. Without
# this dir + the matching --collector.textfile flag below, every
# alert in deploy/monitoring/rules/{sla-probe,archive-completeness,
# supply-snapshot,verify-archive}.yml is permanently silent —
# this is exactly what the 2026-05-12 audit's F-1219 + F-1221
# documented as the SLA-evidence-chain gap.
- name: Ensure node_exporter textfile-collector dir
  ansible.builtin.file:
    path: /var/lib/node_exporter/textfile_collector
    state: directory
    owner: stellarindex
    group: stellarindex
    mode: "0775"

# /etc/default/supply-snapshot — operator override that wires the
# textfile-collector path the supply-snapshot binary writes its
# success metric to. Without this, the binary runs successfully on
# its daily cadence but emits no metric, and
# `stellarindex_supply_snapshot_never_initialized` (alert in
# deploy/monitoring/rules/supply-snapshot.yml) fires permanently.
# The asset coverage limitation (only XLM today) is documented in
# the unit comments + tracked separately — this file just unblocks
# the SLA-evidence chain.
- name: Install /etc/default/supply-snapshot (textfile metric wiring)
  ansible.builtin.copy:
    dest: /etc/default/supply-snapshot
    owner: root
    group: root
    mode: "0644"
    content: |
      # Managed by ansible (archival-node role / 10-observability.yml).
      # Required for stellarindex_supply_snapshot_last_success_timestamp
      # to emit. Without TEXTFILE_OUTPUT, the unit succeeds but no
      # metric is written and the never-initialized alert fires.
      TEXTFILE_OUTPUT=/var/lib/node_exporter/textfile_collector/supply_snapshot.prom
  tags: [observability, supply-snapshot]

# /etc/default/sla-probe — operator override that:
#   1. Targets the local API binary (bypasses CF + Caddy edges).
#   2. Wires the textfile-collector output for the
#      stellarindex_sla_probe_unit_failed gauge — without this the
#      Prometheus alert can't read the verdict and stays stuck on
#      whatever the previous run wrote (or stuck firing if no run
#      ever wrote a value).
#   3. Loosens the availability target from 99.9% (default) to
#      99.0%. With 30s × 2-worker burst the probe collects ~430
#      samples per endpoint; a single transient failure (TCP
#      reset, packet drop) registers as 99.77% < 99.9% — false-
#      positive that fired the alert constantly. 99.0% tolerates
#      4 transient failures per probe burst, still tighter than
#      the published customer-facing SLA (99.5%).
- name: Install /etc/default/sla-probe (probe target + textfile wiring)
  ansible.builtin.copy:
    dest: /etc/default/sla-probe
    owner: root
    group: root
    mode: "0644"
    content: |
      # Managed by ansible (archival-node role / 10-observability.yml).
      BASE_URL=http://127.0.0.1:3000/v1
      DURATION=30s
      CONCURRENCY=2
      TEXTFILE_OUTPUT=/var/lib/node_exporter/textfile_collector/sla_probe.prom
      EXTRA_FLAGS="-availability-target 99.0"
  tags: [observability, sla-probe]

- name: Enable sla-probe.timer (the GO probe; emits the textfile metric)
  ansible.builtin.systemd:
    name: sla-probe.timer
    enabled: true
    state: started
  tags: [observability, sla-probe]

# Configure the Debian package's ARGS to mirror the legacy flags
# so existing textfile_collector .prom files (and their alerts)
# remain visible after the cutover. `--collector.textfile` is
# implied by `--collector.textfile.directory` in node_exporter
# ≥1.7.x — dropped to avoid the deprecation warning.
- name: Template /etc/default/prometheus-node-exporter
  ansible.builtin.copy:
    dest: /etc/default/prometheus-node-exporter
    owner: root
    group: root
    mode: "0644"
    content: |
      # Managed by ansible (archival-node role / 10-observability.yml).
      ARGS="--web.listen-address=0.0.0.0:{{ node_exporter_port }} --collector.systemd --collector.processes --collector.textfile.directory=/var/lib/node_exporter/textfile_collector"
  notify: Restart prometheus-node-exporter

- name: Enable + start prometheus-node-exporter
  ansible.builtin.systemd:
    name: prometheus-node-exporter
    state: started
    enabled: true
    daemon_reload: true

# Idempotent cleanup for boxes that ran the old (pre-#33)
# playbook: stop + disable the hand-rolled node_exporter.service
# so the two binaries no longer collide on :9100. The unit file +
# /usr/local/bin/node_exporter binary are left in place as a
# zero-downtime rollback path (`systemctl stop
# prometheus-node-exporter && systemctl start node_exporter`).
- name: Stop legacy node_exporter.service (#33 cutover)
  ansible.builtin.systemd:
    name: node_exporter.service
    state: stopped
    enabled: false
  failed_when: false  # absent on fresh installs — fine

# stellar-core-prometheus-exporter scrapes the primary stellar-core
# daemon's /info endpoint. Only install when we actually run the
# primary — captive-cores don't expose /info.
- name: Install stellar-core-prometheus-exporter apt package
  ansible.builtin.apt:
    name: stellar-core-prometheus-exporter
    state: present
  when: run_stellar_core | bool

- name: Ensure stellar-core-prometheus-exporter systemd drop-in dir
  ansible.builtin.file:
    path: /etc/systemd/system/stellar-core-prometheus-exporter.service.d
    state: directory
    mode: "0755"
    owner: root
    group: root
  when: run_stellar_core | bool

- name: Install stellar-core-prometheus-exporter systemd override
  ansible.builtin.copy:
    dest: /etc/systemd/system/stellar-core-prometheus-exporter.service.d/override.conf
    mode: "0644"
    content: |
      [Service]
      ExecStart=
      ExecStart=/usr/bin/stellar-core-prometheus-exporter --port {{ core_exporter_port }}
  when: run_stellar_core | bool
  notify:
    - Reload systemd
    - Restart core exporter

- name: Enable + start stellar-core-prometheus-exporter
  ansible.builtin.systemd:
    name: stellar-core-prometheus-exporter
    state: started
    enabled: true
  when: run_stellar_core | bool

# ── Promtail → Loki (journald log shipping) ──────────────────────────
# Codifies the hand-install documented in configs/loki/README.md
# (Grafana APT repo + `promtail` system package). Loki itself is
# still the single-host system package on r1 (same README) — this
# block manages only the shipper side. The rendered config matches
# configs/loki/promtail.r1.yml on r1 (host label = region_id,
# push URL = loki_push_url).

- name: Ensure /etc/apt/keyrings exists
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    owner: root
    group: root
    mode: "0755"
  when: run_promtail | bool
  tags: [observability, promtail]

- name: Install Grafana APT signing key (dearmored)
  ansible.builtin.shell: |
    set -o pipefail
    curl -fsSL https://apt.grafana.com/gpg.key \
      | gpg --dearmor --yes -o /etc/apt/keyrings/grafana.gpg
  args:
    creates: /etc/apt/keyrings/grafana.gpg
    executable: /bin/bash
  when: run_promtail | bool
  tags: [observability, promtail]

- name: Add Grafana APT repository
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/grafana.gpg] https://apt.grafana.com stable main"
    filename: grafana
    state: present
  when: run_promtail | bool
  tags: [observability, promtail]

- name: Install promtail
  ansible.builtin.apt:
    name: promtail
    state: present
    update_cache: true
    cache_valid_time: 3600
  when: run_promtail | bool
  tags: [observability, promtail]

# The packaged unit runs as user `promtail` (group nogroup), which
# cannot read /run/log/journal/* — without this group grant promtail
# starts cleanly but ships nothing (silent-empty failure mode).
- name: Grant promtail systemd-journal read access
  # check-mode tolerance: the promtail user exists only after the
  # apt install above, which cannot happen in --check.
  ignore_errors: "{{ ansible_check_mode }}"
  ansible.builtin.user:
    name: promtail
    groups: systemd-journal
    append: true
  when: run_promtail | bool
  notify: Restart promtail
  tags: [observability, promtail]

# Default packaging owner-mismatches /var/lib/promtail, so the
# positions file can't be written and promtail re-ships the whole
# journal from scratch on every restart.
- name: Ensure /var/lib/promtail owned by promtail
  ignore_errors: "{{ ansible_check_mode }}"  # user exists only post-install
  ansible.builtin.file:
    path: /var/lib/promtail
    state: directory
    owner: promtail
    group: nogroup
    mode: "0755"
  when: run_promtail | bool
  tags: [observability, promtail]

- name: Template promtail config (journald → loki_push_url)
  ansible.builtin.template:
    src: promtail-config.yml.j2
    dest: /etc/promtail/config.yml
    owner: root
    group: root
    mode: "0644"
  when: run_promtail | bool
  notify: Restart promtail
  tags: [observability, promtail]

- name: Enable + start promtail
  # check-mode tolerance: unit file exists only after the apt install.
  ignore_errors: "{{ ansible_check_mode }}"
  ansible.builtin.systemd:
    name: promtail
    state: started
    enabled: true
  when: run_promtail | bool
  tags: [observability, promtail]

- name: galexie catchup-refusal probe (script + timer)
  # 'History: Skipping catchup' sat verbatim in the journal for 11h
  # (2026-07-05) with nothing watching. Every minute: count refusals
  # in the last 5min, write node-exporter textfile metrics; the rule
  # trees alert on >0 sustained.
  ansible.builtin.copy:
    dest: /usr/local/sbin/galexie-catchup-probe.sh
    owner: root
    group: root
    mode: "0755"
    content: |
      #!/usr/bin/env bash
      set -euo pipefail
      # MUST be the --collector.textfile.directory the running
      # node_exporter reads (the ansible-managed dir above), NOT
      # Debian's /var/lib/prometheus/node-exporter default. The probe
      # originally wrote to the Debian dir — the metric never reached
      # Prometheus and the page alert silently couldn't fire, which is
      # exactly what happened in the 2026-07-08 P27 catchup-refusal
      # incident (found + fixed during it).
      DIR=/var/lib/node_exporter/textfile_collector
      mkdir -p "$DIR"
      N=$(journalctl -u galexie --since "-5min" --no-pager 2>/dev/null | grep -c "Skipping catchup" || true)
      TMP=$(mktemp)
      {
        echo "# HELP stellarindex_galexie_catchup_refusals_5m 'History: Skipping catchup' journal lines in the last 5 minutes."
        echo "# TYPE stellarindex_galexie_catchup_refusals_5m gauge"
        echo "stellarindex_galexie_catchup_refusals_5m $N"
      } > "$TMP"
      # mktemp creates 0600; node_exporter runs unprivileged and
      # SILENTLY skips unreadable textfiles (second way this probe
      # was invisible, 2026-07-08).
      chmod 644 "$TMP"
      mv "$TMP" "$DIR/galexie_catchup.prom"

- name: galexie catchup-probe service unit
  ansible.builtin.copy:
    dest: /etc/systemd/system/galexie-catchup-probe.service
    owner: root
    group: root
    mode: "0644"
    content: |
      [Unit]
      Description=Galexie catchup-refusal probe (textfile metric)
      [Service]
      Type=oneshot
      ExecStart=/usr/local/sbin/galexie-catchup-probe.sh
  notify: daemon-reload

- name: galexie catchup-probe timer
  ansible.builtin.copy:
    dest: /etc/systemd/system/galexie-catchup-probe.timer
    owner: root
    group: root
    mode: "0644"
    content: |
      [Unit]
      Description=Run the galexie catchup probe every minute
      [Timer]
      OnCalendar=*-*-* *:*:30
      Persistent=true
      [Install]
      WantedBy=timers.target
  notify: daemon-reload

- name: enable the galexie catchup-probe timer
  ansible.builtin.systemd:
    name: galexie-catchup-probe.timer
    enabled: true
    state: started
    daemon_reload: true
