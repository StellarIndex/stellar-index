---
# Postgres 15 from the PGDG repository. stellar-core uses BucketListDB
# (Postgres-backed) per ADR discussion in the archival-node spec.
#
# Secrets (postgres_pass_core) come from ansible-vault.

- name: Add PGDG apt key
  ansible.builtin.get_url:
    url: "https://www.postgresql.org/media/keys/ACCC4CF8.asc"
    dest: /etc/apt/keyrings/pgdg.asc
    mode: "0644"

- name: Add PGDG apt repo
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/pgdg.asc] https://apt.postgresql.org/pub/repos/apt {{ ansible_facts.distribution_release }}-pgdg main"
    state: present
    filename: pgdg

- name: Install Postgres {{ postgres_version }}
  ansible.builtin.apt:
    name:
      - "postgresql-{{ postgres_version }}"
      - "postgresql-contrib-{{ postgres_version }}"
      - "postgresql-client-{{ postgres_version }}"
      - python3-psycopg2          # required by community.postgresql modules
    state: present
    update_cache: true

- name: Verify Postgres cluster dir is on the ZFS dataset
  ansible.builtin.stat:
    path: "/var/lib/postgresql/{{ postgres_version }}/main"
  register: pg_main_dir

- name: Template postgresql.conf
  ansible.builtin.template:
    src: postgresql.conf.j2
    dest: "/etc/postgresql/{{ postgres_version }}/main/postgresql.conf"
    owner: postgres
    group: postgres
    mode: "0640"
  notify: Restart postgres

- name: Template pg_hba.conf
  ansible.builtin.template:
    src: pg_hba.conf.j2
    dest: "/etc/postgresql/{{ postgres_version }}/main/pg_hba.conf"
    owner: postgres
    group: postgres
    mode: "0640"
  notify: Restart postgres

- name: Ensure Postgres is running
  ansible.builtin.systemd:
    name: "postgresql@{{ postgres_version }}-main"
    state: started
    enabled: true

- name: Create stellar-core Postgres role
  when: run_stellar_core | bool  # 2026-07-03: core was trimmed from r1 (2026-04-23); creating its DB role unconditionally breaks on hosts whose secrets file has no postgres_pass_core
  community.postgresql.postgresql_user:
    name: "{{ postgres_user_core }}"
    password: "{{ postgres_pass_core }}"
    encrypted: true
    state: present
  become_user: postgres

- name: Create stellar-core database
  when: run_stellar_core | bool
  community.postgresql.postgresql_db:
    name: "{{ postgres_db_core }}"
    owner: "{{ postgres_user_core }}"
    encoding: "UTF8"
    lc_collate: "en_US.UTF-8"
    lc_ctype: "en_US.UTF-8"
    template: "template0"
    state: present
  become_user: postgres

- name: Enable pg_stat_statements extension (core DB)
  when: run_stellar_core | bool  # 2026-07-03: core trimmed from r1; its DB does not exist
  community.postgresql.postgresql_ext:
    login_db: "{{ postgres_db_core }}"
    name: "pg_stat_statements"
    state: present
  become_user: postgres

# pg_stat_statements on the APPLICATION db — this is the one operators
# actually query for slow-statement forensics (the core-db copy above
# predates the 2026-04-23 core trim and is skipped on r1).
- name: Enable pg_stat_statements extension (stellarindex DB)
  community.postgresql.postgresql_ext:
    login_db: "{{ postgres_db_stellarindex }}"
    name: "pg_stat_statements"
    state: present
  become_user: postgres

# ──── stellarindex application database ─────────────────────────────
# Used by stellarindex-indexer / aggregator / api. Owns the trades +
# oracle_updates hypertables + price-aggregate CAGGs. TimescaleDB
# extension is enabled at db-create time so migrations don't need
# superuser to CREATE EXTENSION.

- name: Install TimescaleDB apt repo signing key
  ansible.builtin.get_url:
    url: "https://packagecloud.io/timescale/timescaledb/gpgkey"
    dest: /etc/apt/keyrings/timescaledb.asc
    mode: "0644"

- name: Add TimescaleDB apt repo
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/timescaledb.asc] https://packagecloud.io/timescale/timescaledb/ubuntu/ {{ ansible_facts.distribution_release }} main"
    state: present
    filename: timescaledb

- name: Install TimescaleDB for Postgres {{ postgres_version }}
  ansible.builtin.apt:
    name: "timescaledb-2-postgresql-{{ postgres_version }}"
    state: present
    update_cache: true
  notify: Restart postgres

- name: Add timescaledb to shared_preload_libraries
  # Value carries a space after the comma to match what Postgres stores
  # and reports back ("timescaledb, pg_stat_statements"). postgresql_set
  # string-compares the desired value against the live pg_settings value,
  # so the spaceless form drifts (reports changed → restart handler) on
  # every --check run (2026-07-06 drift reconcile).
  community.postgresql.postgresql_set:
    name: shared_preload_libraries
    value: "timescaledb, pg_stat_statements"
  become_user: postgres
  notify: Restart postgres

- name: Flush handlers (postgres restart needed before timescaledb extension is usable)
  ansible.builtin.meta: flush_handlers

- name: Create stellarindex Postgres role
  community.postgresql.postgresql_user:
    name: "{{ postgres_user_stellarindex }}"
    password: "{{ postgres_pass_stellarindex }}"
    encrypted: true
    state: present
  become_user: postgres
  no_log: true

- name: Create stellarindex Postgres database
  community.postgresql.postgresql_db:
    name: "{{ postgres_db_stellarindex }}"
    owner: "{{ postgres_user_stellarindex }}"
    encoding: "UTF8"
    lc_collate: "en_US.UTF-8"
    lc_ctype: "en_US.UTF-8"
    template: "template0"
    state: present
  become_user: postgres

- name: Enable timescaledb extension on stellarindex db
  community.postgresql.postgresql_ext:
    login_db: "{{ postgres_db_stellarindex }}"
    name: "timescaledb"
    state: present
  become_user: postgres

- name: Enable pg_stat_statements on stellarindex db
  community.postgresql.postgresql_ext:
    login_db: "{{ postgres_db_stellarindex }}"
    name: "pg_stat_statements"
    state: present
  become_user: postgres
