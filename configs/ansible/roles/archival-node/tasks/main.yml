---
# Orchestrates the archival-node bootstrap. Each included task file
# carries a tag matching its file name so operators can run a subset:
#
#   ansible-playbook ... --tags zfs,postgres
#   ansible-playbook ... --skip-tags minio

- name: "Preflight checks"
  ansible.builtin.import_tasks: 01-preflight.yml
  tags: [preflight, always]

- name: "Kernel + sysctl tuning"
  ansible.builtin.import_tasks: 02-kernel.yml
  tags: [kernel]

- name: "ZFS install + pool + datasets"
  ansible.builtin.import_tasks: 03-zfs.yml
  tags: [zfs]

- name: "Service users"
  ansible.builtin.import_tasks: 04-users.yml
  tags: [users]

- name: "Postgres 15"
  ansible.builtin.import_tasks: 05-postgres.yml
  when: run_postgres | bool
  tags: [postgres]

- name: "pgBackRest backup schedule"
  ansible.builtin.import_tasks: 18-pgbackrest-backup.yml
  when: run_postgres | bool
  tags: [postgres, pgbackrest, backup]

- name: "stellar-core"
  ansible.builtin.import_tasks: 06-stellar-core.yml
  when: run_stellar_core | bool
  tags: [stellar-core, core]

- name: "Galexie"
  ansible.builtin.import_tasks: 07-galexie.yml
  when: run_galexie | bool
  tags: [galexie]

- name: "MinIO (single-node local)"
  ansible.builtin.import_tasks: 09-minio.yml
  when: run_minio | bool
  tags: [minio]

- name: "Observability (node_exporter + core exporter)"
  ansible.builtin.import_tasks: 10-observability.yml
  when: run_observability | bool
  tags: [observability, monitoring]

- name: "Prometheus exporters (redis + postgres + pgbackrest)"
  # F-0152 (audit-2026-05-26): installs the three exporters whose
  # scrape jobs are configured in configs/prometheus/prometheus.r1.yml
  # but which had never been installed on r1. Ordered AFTER
  # 10-observability.yml so node_exporter's textfile-collector dir is
  # already present and the `prometheus` group (created by the
  # Debian exporter packages) is available for env-file ACLs.
  ansible.builtin.import_tasks: 16-prometheus-exporters.yml
  when: run_observability | bool
  tags: [observability, monitoring, exporters]

- name: "Firewall (nftables)"
  ansible.builtin.import_tasks: 11-firewall.yml
  tags: [firewall]

- name: "SSH + base hardening"
  ansible.builtin.import_tasks: 12-hardening.yml
  tags: [hardening, ssh]

- name: "External healthcheck (Healthchecks.io push)"
  ansible.builtin.import_tasks: 13-healthcheck.yml
  tags: [healthcheck, monitoring]

- name: "Stellar Index services (build, deploy, migrate, indexer)"
  ansible.builtin.import_tasks: 14-stellarindex-services.yml
  when: run_stellarindex | bool
  tags: [stellarindex, indexer]

- name: "Stellar Index Healthchecks.io stack (heartbeat + smoke + sla-probe)"
  # F-0137 (audit-2026-05-26): replaces the manual
  # configs/healthchecks/install.sh re-run. Ordered AFTER
  # 14-stellarindex-services.yml because the sla-probe wrapper
  # invokes /usr/local/bin/stellarindex-sla-probe (built + installed
  # by 14) and the smoke wrapper hits the API surface that 14 brings
  # up; the wrappers degrade gracefully if either is missing
  # (ping /fail + journalctl) so the dependency is soft rather than
  # blocking.
  ansible.builtin.import_tasks: 17-stellarindex-healthchecks.yml
  tags: [healthchecks, monitoring]

- name: "Caddy public edge"
  ansible.builtin.import_tasks: 19-caddy.yml
  when: run_caddy | default(true) | bool
  tags: [caddy]

- name: "Log discipline (rsyslog cap + journald cap)"
  ansible.builtin.import_tasks: 15-log-discipline.yml
  tags: [log-discipline, logrotate, journald]
