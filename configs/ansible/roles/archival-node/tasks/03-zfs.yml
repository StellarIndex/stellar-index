---
# ZFS: install, create the `data` pool across the declared NVMe devices
# in the configured topology (raidz2 by default), then create the
# per-workload datasets with tuned recordsize + compression.
#
# IMPORTANT: creating the pool is DESTRUCTIVE. The task guards against
# re-creation with `creates:` — if the pool already exists, nothing
# happens. To re-create, operator must manually `zpool destroy` first.

# GATE (2026-07-03, after the stage-A apply nearly broke the live pool):
# r1 runs upstream OpenZFS 2.3.4 from locally-built debs
# (/root/zfs-migration-2026-05-21/, apt-mark hold). Installing the
# Ubuntu-pinned zfsutils on top DOWNGRADES: apt removed the 2.3.4
# packages AND deleted the dkms module from /lib/modules before dying
# on a file conflict — one reboot away from a poolless host. Only
# install packages when NO zfs userspace exists (fresh build).
- name: Check for existing ZFS userspace
  ansible.builtin.command: zfs --version
  register: zfs_existing
  changed_when: false
  failed_when: false
  check_mode: false

- name: Install ZFS userspace + kernel modules + gdisk for partitioning
  when: zfs_existing.rc != 0
  ansible.builtin.apt:
    name:
      - zfsutils-linux
      - zfs-initramfs
      - gdisk
    state: present

# When the box's OS-mirror drives (drive 0 and drive 1 in the
# standard layout) share disks with the data pool, installimage has
# already created partitions 1-3 (ESP, swap, root) and left the
# remainder of each drive unallocated. We carve a p4 spanning the
# rest and hand that to ZFS. sgdisk's -n 4:0:0 means "new partition
# 4, starting at first free block, ending at last" — so we don't
# have to know the exact byte offset where p3 ended. Typecode BF01
# is Solaris/ZFS root, which is what zpool expects. The
# 'creates:' guard makes this idempotent.
# SAFETY GATE (added 2026-07-03 after the drift-audit dry run caught the
# r1 inventory pointing this task at a whole-disk zpool member — nvme
# device names are not boot-stable). Refuse to touch any listed drive
# that (a) is referenced anywhere in current zpool status, or (b) does
# not already carry the 3-partition OS-mirror layout this task extends.
- name: "SAFETY: listed carve targets must be OS-mirror drives, never pool members"
  ansible.builtin.shell: |
    set -e
    dev="{{ item }}"
    if zpool status -P 2>/dev/null | grep -q "${dev}"; then
      echo "REFUSING: ${dev} appears in zpool status (pool member)"; exit 1
    fi
    for p in 1 2 3; do
      [ -e "${dev}p${p}" ] || { echo "REFUSING: ${dev} lacks OS partition p${p}"; exit 1; }
    done
  loop: "{{ zfs_os_drives_needing_data_partition }}"
  changed_when: false
  check_mode: false
  tags: [zfs]

- name: Carve ZFS data partition on OS-mirror drives
  ansible.builtin.command: >-
    sgdisk
    --new={{ zfs_os_drives_data_partition_number }}:0:0
    --typecode={{ zfs_os_drives_data_partition_number }}:BF01
    --change-name={{ zfs_os_drives_data_partition_number }}:zfs-data
    {{ item }}
  args:
    creates: "{{ item }}p{{ zfs_os_drives_data_partition_number }}"
  loop: "{{ zfs_os_drives_needing_data_partition }}"
  register: sgdisk_result

# Kernel doesn't always pick up new partitions immediately. partprobe
# forces a re-scan; udevadm settle waits for /dev/disk/by-id/... to
# populate the new -partN symlinks before we hand those paths to
# zpool create.
- name: Reload partition tables after creating ZFS partitions
  ansible.builtin.command: "partprobe {{ item }}"
  loop: "{{ zfs_os_drives_needing_data_partition }}"
  changed_when: false
  when: sgdisk_result.changed

- name: Wait for /dev/disk/by-id/ symlinks to settle
  ansible.builtin.command: "udevadm settle --timeout=10"
  changed_when: false
  when: sgdisk_result.changed

- name: Verify every zfs_data_device path exists (incl. newly-carved partitions)
  ansible.builtin.stat:
    path: "{{ item }}"
  loop: "{{ zfs_data_devices }}"
  register: zfs_device_stat

- name: Fail if any zfs_data_device is still missing
  ansible.builtin.assert:
    that:
      - item.stat.exists
    fail_msg: "zfs_data_device {{ item.item }} missing — did partition creation succeed?"
  loop: "{{ zfs_device_stat.results }}"
  loop_control:
    label: "{{ item.item }}"

- name: Check if pool "{{ zfs_data_pool_name }}" already exists
  ansible.builtin.command: "zpool list -H {{ zfs_data_pool_name }}"
  register: zpool_list
  failed_when: false
  changed_when: false

# -f bypasses zpool's refusal to create raidz across differently-
# sized vdevs. We use it deliberately because our layout mixes
# partitions (on the OS-mirror drives, ~7.63 TB after OS slots) with
# whole drives (the pristine data drives, 7.68 TB). zpool sizes the
# raidz to the smallest vdev anyway, so the result is a correct ~15 TB
# usable pool with ~100 GB of inaccessible trailing space on the
# whole-drive vdevs — not dangerous, just mildly wasteful.
- name: Create ZFS pool {{ zfs_data_pool_name }} ({{ zfs_data_pool_type }})
  ansible.builtin.command: >-
    zpool create -f
    -o ashift={{ zfs_ashift }}
    -O compression=zstd
    -O atime=off
    -O xattr=sa
    -O acltype=posixacl
    -O canmount=off
    -O mountpoint=/mnt/{{ zfs_data_pool_name }}
    {{ zfs_data_pool_name }}
    {{ zfs_data_pool_type if zfs_data_pool_type != 'stripe' else '' }}
    {{ zfs_data_devices | join(' ') }}
  when: zpool_list.rc != 0
  register: zpool_create
  changed_when: zpool_create.rc == 0

# extra_zfs_properties carries ONLY the properties an item sets locally
# (mountpoint is always local). Omitted keys are left to inherit the pool
# default — the module compares against `zfs get -p`, and a property whose
# live source is inherited/default reads back as "unset" and would always
# report changed if we declared it. Building the dict per-item (rather than
# forcing recordsize/compression/atime/logbias/primarycache with defaults)
# keeps --check clean for the inherited-tuning datasets (pgbackrest,
# restore-drill). See defaults/main.yml `zfs_datasets` for the rationale.
- name: Create ZFS datasets (per-workload tuning)
  community.general.zfs:
    name: "{{ zfs_data_pool_name }}/{{ item.name }}"
    state: present
    extra_zfs_properties: >-
      {{ {}
         | combine({'recordsize': item.recordsize} if item.recordsize is defined else {})
         | combine({'compression': item.compression} if item.compression is defined else {})
         | combine({'atime': item.atime} if item.atime is defined else {})
         | combine({'logbias': item.logbias} if item.logbias is defined else {})
         | combine({'primarycache': item.primarycache} if item.primarycache is defined else {})
         | combine({'mountpoint': item.mountpoint}) }}
  loop: "{{ zfs_datasets }}"
  loop_control:
    label: "{{ item.name }} → {{ item.mountpoint }}"

- name: Ensure dataset mount points exist with correct perms
  ansible.builtin.file:
    path: "{{ item.mountpoint }}"
    state: directory
    mode: "{{ item.dir_mode | default('0755') }}"
  loop: "{{ zfs_datasets }}"
  loop_control:
    label: "{{ item.mountpoint }}"

- name: Show final pool layout
  ansible.builtin.command: "zpool status -v {{ zfs_data_pool_name }}"
  register: zpool_status
  changed_when: false

- name: Log pool layout
  ansible.builtin.debug:
    var: zpool_status.stdout_lines
