---
# Codifies the disk-fill prevention work that came out of incident
# 2026-05-10-redis-writes-blocked-disk-full (root FS hit 100% with
# 35 GB of stale logs; Redis BGSAVE blocked; aggregator VWAP cache
# writes failed; /v1/price 404'd on every rewritten/triangulated
# pair for ~9 hours).
#
# Two layered fixes, both applied here so a from-scratch r1 rebuild
# can't regress:
#
#   1. rsyslog logrotate drop-in: cap the live syslog at 100M with
#      7-rotation history, gzip-compressed. Pre-fix, /var/log/syslog
#      had grown to 8.6 GB and rotated-but-not-compressed copies
#      had piled up.
#
#   2. systemd-journald cap: SystemMaxUse=500M. Pre-fix the journal
#      held 3.5 GB unbounded.
#
# These map directly to the postmortem's open follow-ups (see
# `internal/incidents/data/2026-05-10-redis-writes-blocked-disk-full.md`
# under "Operational follow-ups" — items 1 and 4). The Prometheus
# alerts on root-FS fill (deploy/monitoring/rules/storage.yml,
# `stellarindex_node_root_disk_warning` + `_full`) catch the
# downstream symptom; this task addresses the upstream cause so
# the alert never has to fire in steady state.

- name: Install rsyslog logrotate override
  ansible.builtin.copy:
    dest: /etc/logrotate.d/rsyslog
    owner: root
    group: root
    mode: "0644"
    content: |
      # Managed by ansible (archival-node role / 15-log-discipline.yml).
      # Caps the live syslog + auth.log + kern.log family so the
      # 2026-05-10 disk-fill incident class can't repeat.
      #
      # `maxsize 100M` — rotate as soon as a file crosses 100 MB,
      #                  even mid-cycle. Without this the file
      #                  could grow unbounded between daily rotations.
      # `rotate 7`     — keep 7 historic rotations (~7 days at
      #                  typical churn; weeks at quiet times).
      # `compress` +
      # `delaycompress`— gzip rotated copies, but defer one cycle
      #                  so the most-recent rotation stays readable
      #                  without zcat. Reproduces stock Ubuntu policy.
      # `notifempty`   — skip rotation when a file is empty (avoids
      #                  generating zero-byte syslog.1.gz artefacts).
      # `missingok`    — don't fail if any of the listed files
      #                  doesn't exist on this host (some are
      #                  service-specific and may be absent on
      #                  minimal installs).
      #
      # After rotating, send rsyslog a HUP via systemctl reload —
      # the daemon re-opens the file handles and resumes writing
      # to the freshly-rotated current files.
      /var/log/syslog
      /var/log/mail.info
      /var/log/mail.warn
      /var/log/mail.err
      /var/log/mail.log
      /var/log/daemon.log
      /var/log/kern.log
      /var/log/auth.log
      /var/log/user.log
      /var/log/lpr.log
      /var/log/cron.log
      /var/log/debug
      /var/log/messages
      {
              rotate 7
              daily
              maxsize 100M
              missingok
              notifempty
              compress
              delaycompress
              sharedscripts
              postrotate
                      /usr/lib/rsyslog/rsyslog-rotate
              endscript
      }
  notify:
    - Reload rsyslog
  tags: [log-discipline, logrotate]

- name: Filter chatty service stdout out of /var/log/syslog
  ansible.builtin.copy:
    dest: /etc/rsyslog.d/10-suppress-noisy-units.conf
    owner: root
    group: root
    mode: "0644"
    content: |
      # Managed by ansible (archival-node role / 15-log-discipline.yml).
      # Stops listed systemd-unit stdout from reaching /var/log/syslog
      # (and the rest of the rsyslog file targets). Messages are still
      # captured by journald and queryable via `journalctl -u <unit>`.
      #
      # Why: Loki single-binary mode at info-or-below logs ~4M
      # `caller=mock.go msg=Get key=collectors/...` lines per day —
      # the same poll-loop noise that filled /var/log/syslog to 7 GB
      # in 4 days on r1 (2026-05-13). The Loki config itself was
      # also lowered to log_level=warn (configs/ansible/roles/loki/
      # templates/loki-config.yaml.j2); this filter is the
      # belt-and-braces guarantee that an accidental log_level
      # regression doesn't blow the disk again.
      if $programname == "loki" then stop
      # clickhouse-server: on a full root, CH's log rotation throws and
      # its async log channel wedges ("Cannot log message in
      # OwnAsyncSplitChannel"), spamming ~80k lines/min to journald →
      # rsyslog → /var/log/syslog and re-filling root in a self-
      # sustaining loop (2026-06-11 recurrence of the 2026-05-10 class;
      # crashed PG twice). CH's own log is also moved to ZFS below so
      # the channel can't wedge; this filter keeps the journald flood
      # off /var/log/syslog as belt-and-braces. journalctl -u
      # clickhouse-server still has the messages.
      if $programname == "clickhouse-server" then stop
  notify:
    - Reload rsyslog
  tags: [log-discipline, rsyslog]

- name: Ensure /etc/systemd/journald.conf.d exists
  ansible.builtin.file:
    path: /etc/systemd/journald.conf.d
    state: directory
    owner: root
    group: root
    mode: "0755"
  tags: [log-discipline, journald]

- name: Install journald SystemMaxUse cap + rate-limit bump
  ansible.builtin.copy:
    dest: /etc/systemd/journald.conf.d/00-cap.conf
    owner: root
    group: root
    mode: "0644"
    content: |
      # Managed by ansible (archival-node role / 15-log-discipline.yml).
      # Two policies, both informed by 2026-05-26 audit findings:
      #
      # 1) Storage cap (F-0001 / 2026-05-10 incident).
      #    Pre-fix the journal was unbounded and consumed 3.5 GB of
      #    /var/log on r1, contributing to the disk-fill incident.
      #    500 MB matches the value the operator set manually during
      #    recovery.
      #
      # 2) Rate-limit bump (F-0031 — 2026-05-26 audit observed a 3 h
      #    log gap on `journalctl -u stellarindex-indexer` despite the
      #    indexer running continuously; startup logs were missing).
      #    journald's default RateLimitBurst (10000 over 30 s) is hit
      #    during the indexer's startup burst — dispatcher registration,
      #    source connections, ledgerstream tier scan all log within
      #    a few seconds. Once the burst limit hits, journald drops
      #    messages for the remainder of the interval, producing the
      #    audit's observed gap.
      #    50000-over-10s is generous enough to never legitimately
      #    drop messages from our binaries while still throttling
      #    pathological flood scenarios (e.g. a log loop bug). The
      #    SystemMaxUse cap above is the dominant guard against
      #    pathological log volume.
      [Journal]
      SystemMaxUse=500M
      # SystemKeepFree=300M ensures the journal never consumes the
      # last 300 MB of free space on the journal's filesystem (a
      # final guardrail above SystemMaxUse).
      SystemKeepFree=300M
      # Rate-limit override (F-0031 closure).
      RateLimitIntervalSec=10s
      RateLimitBurst=50000
  notify:
    - Restart systemd-journald
  tags: [log-discipline, journald]

- name: Install /etc/logrotate.d/stellarindex
  # Wave-2 fix for F-0009/F-0015 from 2026-05-26 audit. Rotates
  # /var/log/stellarindex/*.log weekly + on 500M size. Uses
  # copytruncate so long-running stellarindex-ops processes
  # (backfill/replay) holding open FDs don't end up writing to the
  # renamed file forever.
  ansible.builtin.copy:
    src: stellarindex.logrotate
    dest: /etc/logrotate.d/stellarindex
    owner: root
    group: root
    mode: "0644"

- name: Ensure ClickHouse log directory exists on the ZFS pool
  # 2026-06-11 incident. CH's <log> defaulted to /var/log/clickhouse-server
  # on the 49 GB root (1000M x 10 rotation). On a full root the rotation
  # throws and the async log channel wedges ("Cannot log message in
  # OwnAsyncSplitChannel"), spamming ~80k lines/min and re-filling root in a
  # self-sustaining loop that crashed PG twice. /var/lib/clickhouse is the
  # 9 TB ZFS pool, which never fills — moving CH's logs there removes the
  # failure mode at the source.
  ansible.builtin.file:
    path: /var/lib/clickhouse/logs
    state: directory
    owner: clickhouse
    group: clickhouse
    mode: "0750"
  tags: [log-discipline, clickhouse]

- name: Move ClickHouse server logs off root onto the ZFS pool
  ansible.builtin.copy:
    dest: /etc/clickhouse-server/config.d/zzz-logpath.xml
    owner: root
    group: root
    mode: "0644"
    content: |
      <clickhouse>
          <!-- Managed by ansible (archival-node / 15-log-discipline.yml).
               2026-06-11 incident fix: CH server logs on the 9TB ZFS pool,
               not the chronically-tight 49G root. A full root must never be
               able to wedge CH's log-rotation/async channel again. -->
          <logger>
              <log>/var/lib/clickhouse/logs/clickhouse-server.log</log>
              <errorlog>/var/lib/clickhouse/logs/clickhouse-server.err.log</errorlog>
          </logger>
      </clickhouse>
  notify:
    - Restart clickhouse-server
  tags: [log-discipline, clickhouse]

# ─── Redis memory cap (2026-06-16 incident-sweep fix, codified
# 2026-07-03 during the r1↔ansible drift audit) ──────────────────────
# r1 runs the Debian-packaged redis-server (the redis-sentinel role is
# the future HA-cluster shape, NOT applied to archival nodes). The
# incident sweep set maxmemory by hand; without codification a rebuild
# ships an uncapped Redis that can eat the host under cache pressure.
- name: Cap Redis memory (Debian-packaged redis on the archival node)
  ansible.builtin.lineinfile:
    path: /etc/redis/redis.conf
    regexp: '^#?\s*maxmemory\s+[^-]'
    line: "maxmemory {{ redis_maxmemory | default('1gb') }}"
  notify:
    - Restart redis
  tags: [log-discipline, redis]

# ─── nft-drop log routing (hand-applied 2026-06-30, codified 2026-07-03
# in the drift audit) ────────────────────────────────────────────────
# Firewall drop logs go to their own small rotated file instead of
# /var/log/syslog — the security record is preserved but syslog stays
# readable and the root FS stays bounded (same class of guard as the
# clickhouse/loki suppression above).
- name: Route nft-drop kernel log lines to their own file
  ansible.builtin.copy:
    dest: /etc/rsyslog.d/10-nft-drop.conf
    owner: root
    group: root
    mode: "0644"
    content: |
      # Managed by ansible (archival-node/15-log-discipline.yml).
      # security record is preserved but syslog stays readable + small.
      :msg, contains, "nft-drop" -/var/log/nft-drop.log
      & stop
  notify:
    - Reload rsyslog
  tags: [log-discipline, rsyslog, firewall]

- name: Rotate the nft-drop log
  ansible.builtin.copy:
    dest: /etc/logrotate.d/nft-drop
    owner: root
    group: root
    mode: "0644"
    content: |
      /var/log/nft-drop.log {
          daily
          rotate 5
          compress
          missingok
          notifempty
          create 0640 syslog adm
      }
  tags: [log-discipline, firewall]

# ─── config-assertions watchdog (2026-07-03 drift audit) ─────────────
# Hourly content-assertions over the load-bearing guard configs; the
# textfile gauge feeds stellarindex_config_assertion_failed. A rebuild
# without this ships a host whose incident fixes can silently regress.
- name: Install config-assertions script
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../../../scripts/ops/config-assertions.sh"
    dest: /usr/local/bin/config-assertions.sh
    owner: root
    group: root
    mode: "0755"
  tags: [log-discipline, config-assertions]

- name: Install config-assertions systemd units
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../../../deploy/systemd/{{ item }}"
    dest: "/etc/systemd/system/{{ item }}"
    owner: root
    group: root
    mode: "0644"
  loop:
    - config-assertions.service
    - config-assertions.timer
  tags: [log-discipline, config-assertions]

- name: Enable the config-assertions timer
  ansible.builtin.systemd:
    name: config-assertions.timer
    enabled: true
    state: started
    daemon_reload: true
  tags: [log-discipline, config-assertions]

- name: ClickHouse server tuning drop-in (formerly hand-managed)
  # zz-ratesengine.xml predates ansible management (old-brand name
  # kept: renaming needs a coordinated restart; the file is loaded by
  # name-sort so the prefix matters). max_server_memory_usage history:
  # 64G (pre-lake conservatism) -> 96G CRASHED under
  # vm.overcommit_memory=2 (commit budget: swap 16G + 80% x 188G;
  # CH's startup mmaps overshot) -> 72G stable (2026-07-08). The
  # completeness reconcile needs real headroom, but the binding
  # constraint is the KERNEL commit budget, not RAM.
  ansible.builtin.copy:
    dest: /etc/clickhouse-server/config.d/zz-ratesengine.xml
    owner: clickhouse
    group: clickhouse
    mode: "0644"
    content: |
      <clickhouse>
          <tcp_port>9300</tcp_port>
          <max_server_memory_usage>77309411328</max_server_memory_usage>
          <listen_host>127.0.0.1</listen_host>
          <listen_host>::1</listen_host>
          <logger><level>warning</level></logger>
      </clickhouse>
  # No automatic restart: CH restarts are operator-coordinated (the
  # lake sink tolerates them, but merges/queries in flight die).
  tags: [clickhouse, log-discipline]

- name: ClickHouse merge-memory guard drop-in
  # 2026-07-09 incident: the contract_events_daily uniqExact(UInt128)
  # merge's allocation exceeded the KERNEL COMMIT BUDGET
  # (vm.overcommit_memory=2 — see the tuning drop-in above) and failed
  # with an allocator ErrnoException inside AggregatingSortedAlgorithm;
  # the background executor retried in a loop, each attempt starving
  # queries + the live sink until the server was effectively wedged.
  # This soft limit makes an oversized merge ABORT CLEANLY
  # (MEMORY_LIMIT_EXCEEDED) instead of exhausting the commit budget.
  # It does NOT fix that table's merge — that is parked persistently
  # via ALTER TABLE stellar.contract_events_daily MODIFY SETTING
  # max_bytes_to_merge_at_max_space_in_pool = 1 until the MV's
  # uniqExact state is redesigned (tracked in notes/ROADMAP.md).
  ansible.builtin.copy:
    dest: /etc/clickhouse-server/config.d/zz-merge-memory-guard.xml
    owner: clickhouse
    group: clickhouse
    mode: "0644"
    content: |
      <clickhouse>
          <merges_mutations_memory_usage_soft_limit>10737418240</merges_mutations_memory_usage_soft_limit>
      </clickhouse>
  # No automatic restart — same operator-coordinated policy as above.
  tags: [clickhouse, log-discipline]
