---
# Caddy — the public TLS-terminating edge for the /v1 API.
#
# Codified 2026-07-03 (drift audit): Caddy was the last hand-managed
# public-edge config — no role installed it, so a rebuild shipped an
# archival node with no public API at all, and a naive nftables render
# was one missing default away from firewalling it dead (the 80/443
# rules live in public_allow_ports_base; config-assertions.sh asserts
# them live).
#
# caddy_site_addresses keeps the legacy api.ratesengine.net alias —
# it still resolves and serves traffic (verified 2026-07-03); drop it
# only with a deprecation window + redirect plan.

# Keyring path + list filename MATCH the official caddy install docs
# (and therefore the hand-installed state on r1) — a different
# Signed-By path for the same source makes apt refuse the whole
# sources list (found on the first staged apply).
- name: Install Caddy signing key (dearmored, official path)
  ansible.builtin.shell: |
    set -e
    curl -1sLf https://dl.cloudsmith.io/public/caddy/stable/gpg.key \
      | gpg --dearmor --yes -o /usr/share/keyrings/caddy-stable-archive-keyring.gpg
  args:
    creates: /usr/share/keyrings/caddy-stable-archive-keyring.gpg
  tags: [caddy]

- name: Add Caddy apt repository (official form)
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/caddy-stable.list
    owner: root
    group: root
    mode: "0644"
    content: |
      # Managed by ansible (archival-node/19-caddy.yml). Official caddy
      # stable repo, keyring at the upstream-documented path.
      deb [signed-by=/usr/share/keyrings/caddy-stable-archive-keyring.gpg] https://dl.cloudsmith.io/public/caddy/stable/deb/debian any-version main
      deb-src [signed-by=/usr/share/keyrings/caddy-stable-archive-keyring.gpg] https://dl.cloudsmith.io/public/caddy/stable/deb/debian any-version main
  tags: [caddy]

- name: Install Caddy
  ansible.builtin.apt:
    name: caddy
    state: present
    update_cache: true
  tags: [caddy]

- name: Install the Caddyfile
  ansible.builtin.template:
    src: Caddyfile.j2
    dest: /etc/caddy/Caddyfile
    owner: root
    group: root
    mode: "0644"
    validate: "caddy validate --adapter caddyfile --config %s"
  notify:
    - Reload caddy
  tags: [caddy]

- name: Enable caddy
  # check-mode tolerance: the package install above cannot happen in
  # --check, so the unit does not exist yet; a real apply installs first.
  ignore_errors: "{{ ansible_check_mode }}"
  ansible.builtin.systemd:
    name: caddy
    enabled: true
    state: started
  tags: [caddy]
