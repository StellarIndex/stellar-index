---
# Build + install the stellarindex-* binaries, ship migrations, run
# them against the freshly-provisioned stellarindex database (05-
# postgres.yml), and bring up the indexer systemd service.
#
# Build is cross-compiled on the operator's host (delegate_to:
# localhost) and copied up — avoids cloning a private git repo on
# r1 and avoids running a Go toolchain there. Operator must have
# Go ≥1.25 locally; verified in 01-preflight.yml.
#
# Re-applying this task is idempotent:
#   - Binary copies are content-hash idempotent (`copy` only writes
#     when the source bytes change).
#   - `stellarindex-migrate up` is idempotent by design (no-op when
#     the schema is at the latest version).
#   - The systemd unit handler restarts only on unit-file change.

- name: Cross-compile stellarindex-* binaries (localhost)
  # 2026-07-03 drift audit: binary builds/installs moved to the
  # deploy.yml GitHub workflow (release-artifact + SHA256SUMS + staged
  # install + auto-rollback) — the config playbook manages CONFIG.
  # Flip manage_stellarindex_binaries only for a from-scratch bootstrap
  # where no release exists yet.
  when: manage_stellarindex_binaries | default(false) | bool
  # F-1314 (codex audit-2026-05-13): `sla-probe` added to the
  # bootstrap build/install list. The Healthchecks stellarindex-
  # sla-probe.{service,timer} units invoke
  # /usr/local/bin/stellarindex-sla-probe; pre-fix archival-node
  # bootstrap built indexer/aggregator/api/migrate/ops only, so a
  # fresh-host apply would enable the timer (via the healthchecks
  # role) but find no binary under it. Bootstrap is now complete
  # without an out-of-band ssh side-channel.
  delegate_to: localhost
  ansible.builtin.command:
    chdir: "{{ playbook_dir }}/../../.."
    argv:
      - go
      - build
      - -trimpath
      - -ldflags
      - "-s -w"
      - -o
      - "{{ playbook_dir }}/../../../bin/stellarindex-{{ item }}"
      - "./cmd/stellarindex-{{ item }}"
  environment:
    GOOS: linux
    GOARCH: amd64
    CGO_ENABLED: "0"
  loop:
    - indexer
    - aggregator
    - api
    - migrate
    - ops
    - sla-probe
  changed_when: true   # rebuild every apply; copy step decides if r1 changed

- name: Install stellarindex binaries on r1
  # 2026-07-03 drift audit: binary builds/installs moved to the
  # deploy.yml GitHub workflow (release-artifact + SHA256SUMS + staged
  # install + auto-rollback) — the config playbook manages CONFIG.
  # Flip manage_stellarindex_binaries only for a from-scratch bootstrap
  # where no release exists yet.
  when: manage_stellarindex_binaries | default(false) | bool
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../../../bin/stellarindex-{{ item }}"
    dest: "/usr/local/bin/stellarindex-{{ item }}"
    owner: root
    group: root
    mode: "0755"
  loop:
    - indexer
    - aggregator
    - api
    - migrate
    - ops
    - sla-probe
  notify: Restart stellarindex-indexer

# ──── Migrations (versioned schema for trades + oracle_updates + CAGGs) ───

- name: Ensure migrations dir exists on r1
  ansible.builtin.file:
    path: /usr/local/share/stellarindex/migrations
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Sync migrations from repo to r1
  ansible.posix.synchronize:
    src: "{{ playbook_dir }}/../../../migrations/"
    dest: /usr/local/share/stellarindex/migrations/
    delete: true
    rsync_opts:
      - "--exclude=.DS_Store"

- name: Run pending migrations against the stellarindex database
  # OPT-IN since 2026-07-10: deploy.yml is the canonical migration
  # applier (stages migrations FROM THE TAG, guaranteeing
  # binary<->migration parity). This task syncs from the OPERATOR'S
  # LOCAL CHECKOUT, so running it by default applied an UNRELEASED
  # migration (0101) to production during a plain config apply — and
  # it failed on an ownership drift, leaving schema_migrations dirty
  # and the play aborted before the config template it was invoked
  # for. Set stellarindex_apply_migrations=true explicitly (greenfield
  # bringup / deliberate out-of-band apply) to run it.
  when: stellarindex_apply_migrations | default(false) | bool
  ansible.builtin.command:
    argv:
      - /usr/local/bin/stellarindex-migrate
      - -migrations
      - /usr/local/share/stellarindex/migrations
      - up
  environment:
    STELLARINDEX_POSTGRES_DSN: "postgres://{{ postgres_user_stellarindex }}:{{ postgres_pass_stellarindex }}@127.0.0.1:5432/{{ postgres_db_stellarindex }}?sslmode=disable"
  register: migrate_result
  changed_when: "'no change' not in (migrate_result.stdout | default(''))"
  failed_when: migrate_result.rc != 0
  no_log: true

# ──── Indexer service ─────────────────────────────────────────────────

- name: Template /etc/default/stellarindex (runtime secrets env file)
  # EnvironmentFile loaded by the stellarindex-{indexer,aggregator,
  # api} units. Carries the Postgres DSN (with password), the MinIO
  # read creds, and the off-chain connector API keys — everything
  # stellarindex.toml deliberately omits. Mode 0640 root:stellarindex
  # (CS-118/CS-121 pattern): systemd reads EnvironmentFile as PID 1,
  # but scripts sourced interactively by the service user need group
  # read; the stellarindex group is created in 04-users.yml (CS-119).
  ansible.builtin.template:
    src: stellarindex.env.j2
    dest: /etc/default/stellarindex
    owner: root
    group: stellarindex
    mode: "0640"
  no_log: true
  notify:
    - Restart stellarindex-indexer
    - Restart stellarindex-aggregator
    - Restart stellarindex-api

- name: Template /etc/stellarindex.toml
  # The on-disk config carries everything except secrets. Secrets
  # come from /etc/default/stellarindex via EnvironmentFile (the
  # Postgres password overrides the DSN here; S3 creds + connector
  # keys are injected the same way).
  ansible.builtin.template:
    src: stellarindex.toml.j2
    dest: /etc/stellarindex.toml
    owner: root
    group: root
    mode: "0644"
  notify:
    - Restart stellarindex-indexer
    - Restart stellarindex-aggregator
    - Restart stellarindex-api

- name: Install stellarindex-indexer systemd unit
  ansible.builtin.template:
    src: systemd/stellarindex-indexer.service.j2
    dest: /etc/systemd/system/stellarindex-indexer.service
    mode: "0644"
  notify:
    - Reload systemd
    - Restart stellarindex-indexer

- name: Enable + start stellarindex-indexer
  ansible.builtin.systemd:
    name: stellarindex-indexer
    state: started
    enabled: true
    daemon_reload: true

# ──── Aggregator service ──────────────────────────────────────────────
# Reads Timescale `trades` rows + writes CAGG rollups (per-window VWAP/TWAP).
# /v1/price closed-bucket serving (ADR-0015) depends on this populating
# the CAGG tables — without aggregator running, the API falls back to
# last-trade lookups which won't satisfy the cross-region consistency
# property. See aggregation-plan.md for the pipeline.

- name: Install stellarindex-aggregator systemd unit
  ansible.builtin.template:
    src: systemd/stellarindex-aggregator.service.j2
    dest: /etc/systemd/system/stellarindex-aggregator.service
    mode: "0644"
  notify:
    - Reload systemd
    - Restart stellarindex-aggregator

- name: Enable + start stellarindex-aggregator
  ansible.builtin.systemd:
    name: stellarindex-aggregator
    state: started
    enabled: true
    daemon_reload: true

# ──── API service ─────────────────────────────────────────────────────
# The public REST + SSE server. Caddy terminates TLS on :80/:443 and
# proxies to this on the loopback :3000. Without this unit a rebuild
# produces no public API surface.

- name: Install stellarindex-api systemd unit
  ansible.builtin.template:
    src: systemd/stellarindex-api.service.j2
    dest: /etc/systemd/system/stellarindex-api.service
    mode: "0644"
  notify:
    - Reload systemd
    - Restart stellarindex-api

- name: Enable + start stellarindex-api
  ansible.builtin.systemd:
    name: stellarindex-api
    state: started
    enabled: true
    daemon_reload: true

# ──── Timer-driven oneshot units ──────────────────────────────────────
# verify-archive Tier A (nightly chain-link integrity, ADR-0016),
# archive-completeness (daily completeness verify, ADR-0017) and
# supply-snapshot (daily supply writer, ADR-0011). Each is a oneshot
# service fired by a systemd timer. R1 is the integrity leader; R2/R3
# run verify-archive on a slower cadence (separate units, TBD).

- name: stellarindex user reads the galexie report dir (diagnostics/archive endpoint)
  # /var/lib/galexie is 750 galexie:galexie; the api's
  # /v1/diagnostics/archive reads last-completeness-report.json from
  # inside it. Group membership is the narrowest grant (vs 755 on a
  # dir that also holds captive-core state).
  ansible.builtin.user:
    name: stellarindex
    groups: galexie
    append: true

- name: galexie drop-in directory
  ansible.builtin.file:
    path: /etc/systemd/system/galexie.service.d
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: galexie resource-protection drop-in (2026-07-05 captive-core wedge)
  # The captive stellar-core got swapped/starved by co-located batch
  # work (CH allocator exhaustion + an unwindowed ops job) and wedged
  # with 'invalid local state' — an 11h lake stall. MemoryLow makes
  # the kernel reclaim galexie LAST; the weights outrank batch jobs
  # for CPU/IO under contention.
  ansible.builtin.copy:
    dest: /etc/systemd/system/galexie.service.d/resources.conf
    owner: root
    group: root
    mode: "0644"
    content: |
      [Service]
      MemoryLow=16G
      CPUWeight=500
      IOWeight=500
  notify: daemon-reload

- name: heavy-job wrapper (mandatory for ops one-shots on this host)
  # Wraps any command in a systemd transient scope with a hard memory
  # budget + batch-class CPU/IO so a ballooning job gets killed before
  # it can starve galexie/CH/PG (the 2026-07-05 lesson). Usage:
  #   run-heavy-job.sh <name> <command...>
  ansible.builtin.copy:
    dest: /usr/local/sbin/run-heavy-job.sh
    owner: root
    group: root
    mode: "0755"
    content: |
      #!/usr/bin/env bash
      # Mandatory wrapper for heavy one-shot jobs (ops re-derives,
      # backfills, bulk SQL). Hard-caps memory at 20G (kill, not swap:
      # MemoryswapMax=0 keeps the job away from swap entirely) and
      # deprioritises CPU/IO below the service units.
      set -euo pipefail
      NAME="$1"; shift
      UNIT="heavy-${NAME}-$$"

      # Root-disk watchdog (2026-06-11 incident follow-up): a heavy job
      # that floods logs or scratch space can fill the 49G root faster
      # than anyone reacts, wedging service logging into the CH
      # async-channel failure mode. Stop the job while root still has
      # headroom; the services it would have starved keep their logs.
      (
        # This subshell MUST NOT inherit errexit/pipefail: a single
        # transient `df` failure (EBUSY/EIO under the very I/O pressure a
        # heavy job creates) would otherwise kill the watchdog silently
        # and leave a multi-hour job running with NO disk monitoring —
        # the exact fail-open the watchdog exists to prevent. Keep the
        # loop alive across a bad probe; a non-numeric/empty reading is
        # treated as "skip this tick, re-check in 30s", never as a
        # false low-space trip.
        set +eo pipefail
        while sleep 30; do
          avail_kb=$(df --output=avail -k / 2>/dev/null | tail -1 | tr -d ' ')
          case "$avail_kb" in
            ''|*[!0-9]*) continue ;;  # df glitched — don't act on garbage
          esac
          if [ "$avail_kb" -lt 2097152 ]; then
            echo "run-heavy-job: root FS below 2 GiB (${avail_kb} KiB avail) — stopping ${UNIT}" >&2
            systemctl stop "${UNIT}.scope" 2>/dev/null || systemctl kill "${UNIT}.scope" 2>/dev/null || true
            exit 0
          fi
        done
      ) &
      WATCHDOG=$!
      trap 'kill "$WATCHDOG" 2>/dev/null || true' EXIT

      rc=0
      systemd-run --scope --unit "$UNIT" \
        -p MemoryMax=20G -p MemorySwapMax=0 \
        -p CPUWeight=50 -p IOWeight=50 \
        "$@" || rc=$?
      exit "$rc"

- name: archive-completeness override drop-in (root user, no legacy env)
  # Replaces a hand-written pre-rebrand override that still loaded
  # /etc/default/ratesengine — dead legacy credentials whose values
  # loaded AFTER the unit's real env file (later EnvironmentFile wins).
  # Site-audit follow-up 2026-07-03; the legacy file is removed below.
  ansible.builtin.copy:
    dest: /etc/systemd/system/archive-completeness.service.d/override.conf
    owner: root
    group: root
    mode: "0644"
    content: |
      [Service]
      User=root
      Group=root
  notify: daemon-reload

- name: Remove the legacy ratesengine env file
  # Pre-rebrand credentials (old DB, deleted MinIO reader) that
  # survived the 2026-07-03 brand purge because a systemd drop-in
  # still referenced the path. Nothing references it after the
  # override above.
  ansible.builtin.file:
    path: /etc/default/ratesengine
    state: absent

- name: Install compute-archive-to.sh helper
  # archive-completeness.service's ExecStartPre derives ARCHIVE_TO
  # from the indexer cursor. Without it ARCHIVE_TO stays 0 and the
  # completeness verify is a no-op (F-1205, audit-2026-05-12).
  ansible.builtin.copy:
    src: compute-archive-to.sh
    dest: /usr/local/sbin/compute-archive-to.sh
    owner: root
    group: root
    mode: "0755"

- name: Install compute-trim-cutoff.sh helper (ADR-0027 §Trim operator)
  # galexie-archive-trim.service's ExecStartPre derives TRIM_CUTOFF
  # = current indexer cursor − 90 days of ledgers. Same pattern as
  # compute-archive-to.sh; the trim binary requires an explicit
  # ledger sequence, and systemd can't do arithmetic in the unit.
  ansible.builtin.copy:
    src: compute-trim-cutoff.sh
    dest: /usr/local/sbin/compute-trim-cutoff.sh
    owner: root
    group: root
    mode: "0755"

- name: Install run-compute-completeness.sh driver (ADR-0033 verdict refresh)
  # compute-completeness.service runs this self-chunking per-source driver:
  # it walks each source's [watermark, tip] in 25k-ledger windows so the
  # SDEX projection reconcile never blows ClickHouse's 12 GiB query limit,
  # and never regresses an already-ahead source's watermark.
  ansible.builtin.copy:
    src: run-compute-completeness.sh
    dest: /usr/local/sbin/run-compute-completeness.sh
    owner: root
    group: root
    mode: "0755"

- name: Install data-freshness.sh watchdog (the "never get behind" textfile emit)
  # data-freshness.service runs this every 15 min: emits per-domain ingest
  # freshness + per-source completeness-verdict gauges so a dead feed / silent
  # timer / real served<>lake gap pages instead of rotting unnoticed.
  ansible.builtin.copy:
    src: data-freshness.sh
    dest: /usr/local/sbin/data-freshness.sh
    owner: root
    group: root
    mode: "0755"

- name: Install run-ch-supply.sh driver (supply_flows forward gap-fill)
  # ch-supply.service runs this: a defensive re-seed of stellar.supply_flows
  # for [last-seeded+1, tip] from the certified CH lake, in case the indexer's
  # live decode-at-ingest writer ever falls behind (normally a no-op).
  # supply_flows is what backs /v1/assets SEP-41 supply — summed live on
  # every request (no materialized rollup; the old stellar.token_supply
  # rollup + its -write refresh were retired, ROADMAP #66, 2026-07-10). Seed
  # is chunked + memory-guarded.
  ansible.builtin.copy:
    src: run-ch-supply.sh
    dest: /usr/local/sbin/run-ch-supply.sh
    owner: root
    group: root
    mode: "0755"

- name: Install verify-archive-tier-a / archive-completeness / supply-snapshot / galexie-archive-trim units
  ansible.builtin.template:
    src: "systemd/{{ item }}.j2"
    dest: "/etc/systemd/system/{{ item }}"
    mode: "0644"
  loop:
    - verify-archive-tier-a.service
    - verify-archive-tier-a.timer
    - archive-completeness.service
    - archive-completeness.timer
    - supply-snapshot.service
    - supply-snapshot.timer
    - galexie-archive-trim.service
    - galexie-archive-trim.timer
    - sep1-refresh.service
    - sep1-refresh.timer
    - compute-completeness.service
    - compute-completeness.timer
    - data-freshness.service
    - data-freshness.timer
    - ch-supply.service
    - ch-supply.timer
  notify: Reload systemd

- name: Enable + start verify-archive / completeness / supply-snapshot timers
  # galexie-archive-trim.timer is INTENTIONALLY OMITTED from this
  # loop — per [[feedback_cold_tier_premature_enable]] and ADR-0027
  # §Sequencing, the monthly trim is destructive before §3 (cold-
  # tiering enabled) + §4 (bulk-trim done). The operator runs
  # `systemctl enable --now galexie-archive-trim.timer` by hand
  # after the bulk-trim completes.
  ansible.builtin.systemd:
    name: "{{ item }}"
    state: started
    enabled: true
    daemon_reload: true
  loop:
    - verify-archive-tier-a.timer
    - archive-completeness.timer
    - supply-snapshot.timer
    - sep1-refresh.timer
    - compute-completeness.timer
    - data-freshness.timer
    - ch-supply.timer

# ──── Tier D weekly cron (multi-peer fork-detection) ──────────────────
# Per ADR-0016 §7.4: each region runs verify-archive Tier D weekly to
# catch upstream divergence (R2 reads from aws-public-blockchain S3,
# R3 from Vultr Object Storage; if either upstream's bytes hash to a
# different chain than the network's signed reality, Tier D catches it).
# Runs as root because it needs to read /etc/default/stellarindex-ops
# for galexie-archive S3 creds. Output to journald (logger -t).

- name: Install Tier D verify-archive weekly cron
  ansible.builtin.cron:
    name: stellarindex-verify-archive-tier-d
    cron_file: stellarindex-verify-archive-tier-d
    user: root
    minute: "23"
    hour: "4"
    weekday: "0"   # Sunday morning
    job: >-
      bash -c 'set -a; source /etc/default/stellarindex-ops; set +a;
      /usr/local/bin/stellarindex-ops verify-archive
      -config /etc/stellarindex.toml
      -tier peers
      -peer-samples 50
      -from 2 -to {{ stellarindex_live_seam_ledger | default(0) | int - 1 }}
      2>&1 | logger -t stellarindex-tier-d'
