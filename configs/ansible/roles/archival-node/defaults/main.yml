---
# Defaults for the archival-node role.
# Every value here is overridable via inventory group_vars / host_vars.
# See inventory/r1.example.yml for the operator-facing knobs.
#
# ─── Per-region differences (ADR-0016) ──────────────────────────────
# Knobs marked `[Per-region: ...]` below differ between regions per
# the storage strategy in docs/adr/0016-per-region-storage-strategy.md:
#
#   R1 FSN1 (Hetzner)        — full local mirror, all 4 verify tiers
#   R2 US-East-1 (AWS)       — galexie-archive read from
#                              s3://aws-public-blockchain (no local
#                              archive bucket); Tier A + D weekly
#   R3 Singapore (Vultr)     — galexie-archive on Vultr Object Storage
#                              (S3, region-local); Tier A + D weekly
#
# When provisioning a new region, copy r1.example.yml → rN.yml and
# override only the [Per-region] knobs. The inventory file is also
# the right place for the per-region cron settings (verify-archive
# tier flags) and for the ratesengine_live_seam_ledger value (each
# region has its own seam where its galexie-live bucket starts).

# ───── Region ────────────────────────────────────────────────────────
# [Per-region: r1=FSN1 (Hetzner Falkenstein), r2=US-East-1, r3=Singapore]
region_id:           "r1"
region_name:         "FSN1"
home_domain:         "ratesengine.net"

# ───── Which subsystems to run on this host ──────────────────────────
run_postgres:        true
# Primary stellar-core daemon. Off by default — the archive we ship
# (galexie → MinIO) doesn't need it, and running it alongside the
# captive-cores costs RAM/CPU/peer-slots for no gain. Flip to true
# when we're ready to become a validator (ADR-0004).
run_stellar_core:    false
run_galexie:         true
# stellar-rpc. Off by default — our own indexer reads from galexie's
# MinIO output directly via ingest.ApplyLedgerMetadata, so stellar-rpc's
# JSON-RPC surface isn't on the Rates Engine data path. Removed from
# r1 on 2026-04-23; see docs/operations/r1-deployment-state.md for the
# architecture rationale. If re-enabled, operator must also re-enable
# its captive_peer_port_rpc + data/rpc dataset + firewall port 8000
# below (currently gated off).
run_stellar_rpc:     false
run_minio:           true
run_observability:   true

# ───── ZFS ───────────────────────────────────────────────────────────
# [Per-region:
#   r1 = raidz2 across 4× NVMe (full local mirror, two-drive tolerance)
#   r2 = NOT used — EBS gp3 directly, no ZFS layer
#   r3 = mirror across 2× NVMe (Vultr SG SKU only ships 2 drives;
#        single-drive tolerance, acceptable for an async DR replica)
# ]
zfs_data_pool_name:  "data"
zfs_data_pool_type:  "raidz2"
zfs_data_devices:    []          # set in inventory, validated in preflight
zfs_ashift:          12          # 4K NVMe sector alignment

# Drives where installimage put OS partitions (ESP/swap/root) in slots
# 1-3, leaving the rest of the disk unallocated. Role carves a p4 on
# each of these spanning all remaining free space, to use as a ZFS
# raidz2 vdev alongside the whole-drive data disks. Empty = no
# partitioning needed (all zfs_data_devices are whole drives).
zfs_os_drives_needing_data_partition: []
zfs_os_drives_data_partition_number: 4

# Per-workload dataset tuning
zfs_datasets:
  - name: "os"
    recordsize: "128K"
    compression: "zstd"
    atime: "off"
    mountpoint: "/var/lib/ratesengine"
  - name: "postgres"
    recordsize: "8K"
    compression: "zstd"
    atime: "off"
    logbias: "throughput"
    primarycache: "metadata"
    mountpoint: "/var/lib/postgresql"
  # "core" dataset (for the primary stellar-core daemon's bucket dir
  # at /var/lib/stellar-core) is intentionally NOT in this list
  # while run_stellar_core=false. When flipping to true for Phase-3
  # validator work, add this entry back and re-apply the zfs tag:
  #
  #   - name: "core"
  #     recordsize: "128K"
  #     compression: "zstd"
  #     atime: "off"
  #     mountpoint: "/var/lib/stellar-core"
  # "rpc" dataset — for stellar-rpc's SQLite + captive-core bucket dir
  # at /var/lib/stellar-rpc. Not in this list while run_stellar_rpc=
  # false. To re-enable, add back:
  #   - name: "rpc"
  #     recordsize: "16K"
  #     compression: "zstd"
  #     atime: "off"
  #     mountpoint: "/var/lib/stellar-rpc"
  - name: "galexie"
    recordsize: "1M"
    compression: "zstd"
    atime: "off"
    mountpoint: "/var/lib/galexie"
  - name: "minio"
    recordsize: "1M"
    compression: "zstd"
    atime: "off"
    mountpoint: "/var/lib/minio"
  - name: "archive"
    recordsize: "1M"
    compression: "zstd"
    atime: "off"
    mountpoint: "/srv/history-archive"

# ───── OS kernel tuning ──────────────────────────────────────────────
sysctl_tunings:
  # File descriptor headroom (stellar-core + Postgres + Galexie keep many open)
  fs.file-max: 2097152
  fs.nr_open: 2097152
  # Network buffers for the SCP overlay + Galexie writers
  net.core.rmem_max: 16777216
  net.core.wmem_max: 16777216
  net.core.netdev_max_backlog: 5000
  net.ipv4.tcp_rmem: "4096 87380 16777216"
  net.ipv4.tcp_wmem: "4096 65536 16777216"
  # Swap sanity for a DB workload
  vm.swappiness: 1
  vm.dirty_ratio: 10
  vm.dirty_background_ratio: 3
  # Transparent huge pages OFF (Postgres + BucketListDB recommendation)
  vm.overcommit_memory: 2
  vm.overcommit_ratio: 80

# ───── Postgres ──────────────────────────────────────────────────────
postgres_version:        "15"
postgres_listen_addresses: "127.0.0.1"          # stellar-core is local
postgres_port:           5432
postgres_shared_buffers: "{{ (ansible_facts.memtotal_mb * 0.25) | int }}MB"
postgres_effective_cache_size: "{{ (ansible_facts.memtotal_mb * 0.5) | int }}MB"
postgres_work_mem:       "32MB"
postgres_maintenance_work_mem: "1GB"
postgres_wal_compression: "zstd"
postgres_max_connections: 200

postgres_db_core:        "stellar_core"
postgres_user_core:      "stellar_core"
# postgres_pass_core ← set in ansible-vault secrets file

# Application database for the indexer / aggregator / api binaries.
# Owns the trades + oracle_updates hypertables + price_aggregates
# CAGGs (see migrations/). TimescaleDB extension is enabled at db
# create time so the migrations can `CREATE EXTENSION IF NOT EXISTS
# timescaledb` without elevation.
postgres_db_ratesengine:    "ratesengine"
postgres_user_ratesengine:  "ratesengine"
# postgres_pass_ratesengine ← set in ansible-vault secrets file

# ───── ratesengine-indexer / aggregator / api services ───────────────
run_ratesengine: true

# Indexer source fleet — empty array → fall back to the binary's
# built-in default ([soroswap, aquarius, phoenix]). Keep small at
# first; broaden as decoders earn coverage.
ratesengine_enabled_sources: ["soroswap", "aquarius", "phoenix"]

# Earliest ledger to backfill from on a fresh install (no persisted
# cursor yet). 0 = refuse to start without a cursor — operator must
# pick an explicit ledger to avoid accidental genesis re-ingest.
ratesengine_backfill_from_ledger: 0

# First ledger present in the galexie-live bucket. Below this the
# indexer reads from galexie-archive. Set to whatever galexie-append.sh
# passed as --start when the live tail first started writing —
# query the running galexie process args:
#   pgrep -af 'galexie append'
# 0 = live-only mode (pre-2026-04-26 default; archive bucket unused).
#
# [Per-region: each region has its own seam — the ledger where that
#  region's *own* galexie-live bucket starts emitting. R1's seam was
#  the cutover from archive-fill to live-tail (~April 2026). R2/R3
#  will have later seams set when their indexers first start.]
ratesengine_live_seam_ledger: 0

# ───── Stellar network / quorum ──────────────────────────────────────
stellar_network:         "pubnet"
catchup_mode:            "CATCHUP_RECENT"       # RECENT | COMPLETE
is_validator:            false
node_is_validator:       "{{ is_validator }}"

# Extra SCP peers beyond what's covered by the ADDRESS field on each
# [[VALIDATORS]] block below. Empty by default — the validator
# addresses plus SCP's gossip protocol cover the bootstrap case.
stellar_extra_known_peers: []

# Tier-1 quorum — matches SDF's canonical pubnet-validator-full
# reference config:
#   https://github.com/stellar/packages/blob/master/docs/examples/
#   pubnet-validator-full/stellar-core.cfg
# (fetched 2026-04-23).
#
# 7 organizations × 3 validators each = 21 tier-1 validators.
# stellar-core auto-builds the quorum set from the HOME_DOMAINS
# groupings below: inner set per org (2/3 threshold), outer set
# across orgs (5/7 default via QUALITY=HIGH).
#
# IMPORTANT: if any validator's public-key CRC stops matching (org
# rotated keys, SDF updated the reference), stellar-core won't parse
# and the node won't start. Refresh by re-fetching SDF's reference
# config and diffing whenever we upgrade stellar-core.

# Ordered list of tier-1 orgs, rendered as [[HOME_DOMAINS]] blocks
# in the template BEFORE the [[VALIDATORS]] blocks.
stellar_home_domains:
  - home_domain: "publicnode.org"
    quality:     "HIGH"
  - home_domain: "lobstr.co"
    quality:     "HIGH"
  - home_domain: "www.franklintempleton.com"
    quality:     "HIGH"
  - home_domain: "satoshipay.io"
    quality:     "HIGH"
  - home_domain: "stellar.creit.tech"
    quality:     "HIGH"
  - home_domain: "www.stellar.org"
    quality:     "HIGH"
  - home_domain: "stellar.blockdaemon.com"
    quality:     "HIGH"

