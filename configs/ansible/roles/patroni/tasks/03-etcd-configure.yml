---
# Render /etc/default/etcd from the inventory cluster spec.
# The 3-node cluster's initial-cluster string lists every host's
# peer URL — same on every node.

- name: ensure /etc/default exists
  file:
    path: /etc/default
    state: directory
    mode: '0755'

- name: render /etc/default/etcd
  template:
    src: etcd.conf.j2
    dest: /etc/default/etcd
    mode: '0640'
    owner: root
    group: etcd
    backup: yes
  notify: "etcd config changed"
