---
# Open public ingress on 80+443; allow VRRP between LB peers;
# stats endpoint stays loopback-only (no nftables rule needed).

- name: ensure nftables installed
  apt:
    name: nftables
    state: present

- name: ensure /etc/nftables.d/ exists
  file:
    path: /etc/nftables.d
    state: directory
    mode: "0755"

- name: render haproxy nftables drop-in
  copy:
    dest: /etc/nftables.d/42-haproxy.conf
    mode: "0644"
    content: |
      # Managed by ansible (haproxy role).
      # 80/443 public, VRRP between LB peers, stats loopback-only.
      table inet haproxy_filter {
        chain input {
          type filter hook input priority 0; policy accept;
          # Public api ingress.
          tcp dport { 80, 443 } accept comment "haproxy-public";
          # VRRP from peer LB hosts (multicast 224.0.0.18 is the
          # VRRP group; auth_pass already restricts foreign joiners).
      {% for cidr in haproxy_internal_cidrs %}
          ip protocol vrrp ip saddr {{ cidr }} accept comment "vrrp-{{ cidr }}";
      {% endfor %}
          # Stats endpoint already bound to 127.0.0.1; no public rule.
        }
      }
  notify: "firewall rules changed"

- name: ensure nftables loads our drop-in
  lineinfile:
    path: /etc/nftables.conf
    line: 'include "/etc/nftables.d/*.conf"'
    state: present
  notify: "firewall rules changed"
