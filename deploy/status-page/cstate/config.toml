baseURL = "https://status.ratesengine.net/"
languageCode = "en-gb"
title = "Rates Engine status"
theme = "cstate"

# Hugo 0.128+ requires explicit pagination config; cstate v5 's
# templates call .Paginate which errors with "pager size must
# be a positive integer" if neither is set. The pagerSize value
# below restores Hugo's pre-0.128 default.
[pagination]
  pagerSize = 10

# cstate is vendored under themes/cstate (pinned to v5.6.1 +
# commit 0705cd1b7501). The v6 line introduced breaking
# config-shape changes (categories/systems moved into
# params.*) that we'd need a config rewrite for; staying on
# v5 keeps the data/systems.yml + content/issues structure
# intact.

# cstate is a static-site generator built on Hugo. Operators
# update component status + post incident markdown files in
# `content/`; CI rebuilds the site on every commit and the
# resulting `public/` directory is what the CDN / static-site
# host serves. This config is the source-of-truth — the
# deployment target (Pages, Vercel, Netlify, S3+CloudFront, …)
# is operator-chosen and lives outside this repo.

# Operator notes: posting an incident
# ===================================
# 1. New file under content/issues/<UTC-date>-<slug>.md (see
#    docs/operations/runbooks/sev-status-page-update.md for the
#    front-matter template + the SEV-playbook touchpoint).
# 2. Push to the status-page branch / repo. CI rebuilds, CDN
#    invalidates, status.ratesengine.net updates within 1–2 min.
# 3. Resolve by editing the same file's `resolved` front-matter
#    field to `true`.
#
# The Freighter RFP §SLA F3.5 / F3.6 require status updates within
# the SEV-1 / SEV-2 timelines; runbook above is the prescribed
# update path.

[params]
  description = "Public status page for the Rates Engine pricing API. Real-time + historical pricing for the Stellar network."
  logo = "/logo.svg"
  # cstate's incident-list templates call `.Paginate $incidents
  # .Site.Params.incidentPostsPerPage`. When unset, the second
  # argument is nil and Hugo errors with "pager size must be a
  # positive integer". 10 mirrors Hugo's pre-0.128 default.
  incidentPostsPerPage = 10

  # cstate templates format issue/incident timestamps via these
  # — Hugo errors "invalid value; expected string" when unset.
  # Values mirror cstate's exampleSite/config.yml.
  dateFormat            = "January 2, 2006 at 3:04 PM UTC"
  shortDateFormat       = "15:04 UTC — Jan 2"
  incidentHistoryFormat = "yearly"

  # cstate v5 reads category + system definitions from
  # .Site.Params.{categories,systems} — the standalone
  # data/systems.yml file is unused (legacy v4 path). Each
  # entry is a top-level service surface a customer would
  # notice degrading; prefer narrow scopes ("Off-chain CEX
  # ingest") over sweeping ones ("Backend").
  categories = [
    { name = "API",     description = "Customer-facing HTTP/SSE surfaces." },
    { name = "Ingest",  description = "Data sources feeding the aggregator." },
    { name = "Backend", description = "Storage + compute behind the API." },
  ]
  systems = [
    { name = "Pricing API",          description = "/v1/price, /v1/price/batch, /v1/price/tip, /v1/history, /v1/ohlc, /v1/chart, /v1/oracle/*", category = "API",     ping = "https://api.ratesengine.net/v1/healthz" },
    { name = "Streaming API",        description = "Server-Sent Events surfaces — /v1/price/stream, /v1/price/tip/stream, /v1/observations/stream", category = "API" },
    { name = "Asset metadata",       description = "/v1/assets, /v1/assets/{id}, /v1/coins, /v1/issuers, /v1/markets — directories with SEP-1 overlay + F2 fields (supply, market cap, FDV, 24h volume).", category = "API" },
    { name = "Diagnostics",          description = "/v1/diagnostics/cursors — operator-facing per-source ingest cursor positions.", category = "API" },
    { name = "Account self-service", description = "/v1/account/me, /v1/account/usage, /v1/account/keys — API-key issuance + per-key metadata.", category = "API" },
    { name = "SEP-10 Web Auth",      description = "/v1/auth/sep10/{challenge,token} — SEP-10 challenge / verify flow.", category = "API" },
    { name = "On-chain DEX ingest",  description = "SDEX, Soroswap, Aquarius, Phoenix, Comet, Blend — Stellar mainnet ledger ingestion via Galexie.", category = "Ingest" },
    { name = "Off-chain CEX/FX ingest", description = "Binance, Coinbase, Kraken, Bitstamp, ECB, Polygon-Forex, ExchangeRatesAPI — REST polling + WebSocket streaming.", category = "Ingest" },
    { name = "Oracle ingest",        description = "Reflector (DEX/CEX/FX), Redstone, Band — on-chain SEP-40-style oracle observations.", category = "Ingest" },
    { name = "Aggregator",           description = "VWAP / TWAP / OHLC computation, anomaly detection, divergence cross-check, supply snapshot writer.", category = "Backend" },
    { name = "Storage",              description = "TimescaleDB (price + supply hypertables), Redis (hot-path cache + freeze markers), MinIO (Galexie archive).", category = "Backend" },
    { name = "Public history archive", description = "Galexie archive — required for since-inception backfill + cross-region verification.", category = "Backend" },
  ]
  # systemStatus controls the top-of-page banner. Possible values:
  #   "ok"           → All systems operational (green)
  #   "disrupted"    → Partial outage (yellow)
  #   "down"         → Major outage (red)
  #   "notice"       → Scheduled maintenance / advisory (blue)
  # Unset = derived from the worst component status. Operators
  # override during major incidents to communicate even when no
  # component is fully red yet (e.g. during rolling-restart).
  # systemStatus = "ok"

  # Show the last-incident timestamp on the index page.
  showSummaryEnd = true

  # Show component history toggles (per-component history view).
  showCollapseToggles = true

  # Include a public RSS / Atom feed at /index.xml so customers
  # can subscribe in their feed-reader of choice without
  # registering for our notification system.
  rss = true
