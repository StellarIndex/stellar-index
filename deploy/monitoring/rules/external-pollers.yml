---
# External-poller staleness alerts — fires when an aggregator /
# CEX poller stops producing successful polls. Catches the class
# of bug shipped on r1 2026-05-09 where CoinGecko throttled the
# unauthenticated tier and the only signal was a per-minute WARN
# log (no metric, no alert) — the poller was effectively down for
# 13 h before discovery.

groups:
  - name: ratesengine.external_pollers
    interval: 60s
    rules:

      # 30-minute window with zero successful polls is the
      # canonical "this source is down" signal for the per-minute
      # fleet (binance, coinbase, kraken, coingecko). ECB is
      # excluded — it has a 6-hour poll interval because the
      # source publishes once per EU business day (per
      # internal/sources/external/ecb/poller.go::DefaultPollInterval),
      # so the 30m threshold would fire after every successful
      # poll. ECB gets its own slower threshold in the rule below.
      # (F-1208, codex audit-2026-05-13: prior single rule with a
      # comment claiming ECB polls every 60s with cached responses
      # was inconsistent with the source code; the implementation
      # is 6h.)
      - alert: ratesengine_external_poller_stale
        expr: |
          (time() - ratesengine_external_poller_last_success_unix{source!="ecb"}) > 1800
        for: 5m
        labels:
          severity: ticket
          team: ratesengine
          component: external-poller
          runbook_url: https://github.com/RatesEngine/rates-engine/blob/main/docs/operations/runbooks/external-poller-stale.md
        annotations:
          summary: "external poller {{ $labels.source }} has not succeeded in 30+ min"
          description: |
            ratesengine_external_poller_last_success_unix for source
            {{ $labels.source }} has been > 30 min stale for > 5 min.
            Either the poller is sustained-throttled (4xx), the
            upstream venue is down (5xx / network), or an auth token
            expired. Check the indexer log for the matching
            "poller error" lines and the source's auth_mode startup
            log for the configured tier.

      # ECB-specific staleness — 12h threshold (2x the configured
      # 6h poll interval) means we only fire when ECB has missed
      # at least one whole poll cycle. Fires every day from ~22h
      # after the last success if the poller is genuinely stuck.
      - alert: ratesengine_external_poller_stale_ecb
        expr: |
          (time() - ratesengine_external_poller_last_success_unix{source="ecb"}) > 43200
        for: 10m
        labels:
          severity: informational
          team: ratesengine
          component: external-poller
          runbook_url: https://github.com/RatesEngine/rates-engine/blob/main/docs/operations/runbooks/external-poller-stale.md
        annotations:
          summary: "ECB FX poller has not succeeded in 12+ h (>2x poll interval)"
          description: |
            ECB's 6h poll interval skipped at least one whole cycle.
            Either the rates.xml.zip endpoint is down (rare; check
            https://www.ecb.europa.eu/stats/eurofxref/eurofxref-daily.xml),
            the indexer host lost outbound HTTPS to ECB, or the
            poller goroutine deadlocked. Severity is informational
            because ECB rates are fallback FX, not primary pricing.

      # Sustained error rate over 15 min — catches the case where
      # the poller is hitting the venue successfully sometimes but
      # >50% of attempts return non-nil err. Lower severity than
      # the staleness alert because at least *some* data is flowing.
      - alert: ratesengine_external_poller_error_rate_high
        expr: |
          (
            rate(ratesengine_external_poller_polls_total{outcome="error"}[15m])
            /
            (
              rate(ratesengine_external_poller_polls_total{outcome="success"}[15m])
              + rate(ratesengine_external_poller_polls_total{outcome="error"}[15m])
            )
          ) > 0.5
        for: 15m
        labels:
          severity: informational
          team: ratesengine
          component: external-poller
          runbook_url: https://github.com/RatesEngine/rates-engine/blob/main/docs/operations/runbooks/external-poller-stale.md
        annotations:
          summary: "external poller {{ $labels.source }} error rate > 50 % (15 min)"
          description: |
            More than half of recent {{ $labels.source }} polls returned
            an error. Data is still flowing on the success rate, but
            something's degrading — investigate before it tips into
            full staleness.
