---
# Ingestion alerts — matches docs/operations/alerts-catalog.md
# "Ingestion alerts" section. Every alert here has a runbook
# under docs/operations/runbooks/.

groups:
  - name: stellarindex.ingestion
    interval: 30s
    rules:

      # F-1212b (audit-2026-05-12): 5-minute window false-positives
      # routinely on low-volume Soroban / FX sources (band, blend,
      # comet, ecb, phoenix). Total-outage detection is the
      # `_all_sources_stopped` alert below at 3 min — that one
      # stays tight; this one widens to give bursty sources their
      # natural breathing room.
      # F-1208 (codex audit-2026-05-12): per-source-class windows.
      # See configs/prometheus/rules.r1/ingestion.yml for the
      # rationale + the matching R1 overlay.
      - alert: stellarindex_ingestion_source_stopped
        expr: |
          sum by (source) (rate(stellarindex_source_events_total[30m])) == 0
          and on (source) stellarindex_source_enabled == 1
          and on (source) (
            label_replace(vector(1), "source", "binance",       "", "") or
            label_replace(vector(1), "source", "bitstamp",      "", "") or
            label_replace(vector(1), "source", "coinbase",      "", "") or
            label_replace(vector(1), "source", "kraken",        "", "") or
            label_replace(vector(1), "source", "sdex",          "", "") or
            label_replace(vector(1), "source", "aquarius",      "", "") or
            label_replace(vector(1), "source", "reflector-dex", "", "") or
            label_replace(vector(1), "source", "reflector-cex", "", "") or
            label_replace(vector(1), "source", "reflector-fx",  "", "") or
            label_replace(vector(1), "source", "redstone",      "", "") or
            label_replace(vector(1), "source", "coingecko",     "", "")
          )
        for: 15m
        labels:
          severity: ticket
          team: stellarindex
          component: ingestion
          runbook_url: https://github.com/StellarIndex/stellar-index/blob/main/docs/operations/runbooks/source-stopped.md
        annotations:
          summary: "Source {{ $labels.source }} has stopped ingesting"
          description: |
            No events from source {{ $labels.source }} in the last 30 minutes,
            sustained for ≥ 15 min. The source is configured
            as enabled in ingestion.enabled_sources.
            Runbook: https://github.com/StellarIndex/stellar-index/blob/main/docs/operations/runbooks/source-stopped.md

      - alert: stellarindex_ingestion_source_stopped_low_volume_dex
        expr: |
          sum by (source) (rate(stellarindex_source_events_total[6h])) == 0
          and on (source) stellarindex_source_enabled == 1
          and on (source) (
            label_replace(vector(1), "source", "comet",    "", "") or
            label_replace(vector(1), "source", "phoenix",  "", "") or
            label_replace(vector(1), "source", "soroswap", "", "") or
            label_replace(vector(1), "source", "blend",    "", "")
          )
        for: 30m
        labels:
          severity: ticket
          team: stellarindex
          component: ingestion
          runbook_url: https://github.com/StellarIndex/stellar-index/blob/main/docs/operations/runbooks/source-stopped.md
        annotations:
          summary: "Low-volume Soroban DEX {{ $labels.source }} silent 6+ hours"
          description: |
            For low-volume Soroban DEXes this is unusual but not
            necessarily an outage — check the contract on
            stellar.expert before paging the indexer team.
            Runbook: https://github.com/StellarIndex/stellar-index/blob/main/docs/operations/runbooks/source-stopped.md

      - alert: stellarindex_ingestion_source_stopped_daily_publisher
        expr: |
          sum by (source) (rate(stellarindex_source_events_total[30h])) == 0
          and on (source) stellarindex_source_enabled == 1
          and on (source) (
            label_replace(vector(1), "source", "ecb",  "", "") or
            label_replace(vector(1), "source", "band", "", "")
          )
        for: 1h
        labels:
          severity: ticket
          team: stellarindex
          component: ingestion
          runbook_url: https://github.com/StellarIndex/stellar-index/blob/main/docs/operations/runbooks/source-stopped.md
        annotations:
          summary: "Daily publisher {{ $labels.source }} silent 30+ hours"
          description: |
            ECB publishes daily; Band publishes on relayer push
            (also roughly daily). 30h gives a one-day buffer plus
            ample slack for upstream cadence variation.
            Runbook: https://github.com/StellarIndex/stellar-index/blob/main/docs/operations/runbooks/source-stopped.md

      - alert: stellarindex_ingestion_all_sources_stopped
        expr: sum(rate(stellarindex_source_events_total[5m])) == 0
        for: 3m
        labels:
          severity: page
          team: stellarindex
          component: ingestion
          runbook_url: https://github.com/StellarIndex/stellar-index/blob/main/docs/operations/runbooks/all-ingestion-down.md
        annotations:
          summary: "All ingestion sources have stopped (SEV-1)"
          description: |
            No events from any source in the last 3 minutes. API data will go
            stale within 60 s. This is a P1 — check shared upstream (stellar-rpc)
            or shared storage (Timescale) before restarting the indexer.
            Runbook: https://github.com/StellarIndex/stellar-index/blob/main/docs/operations/runbooks/all-ingestion-down.md

      - alert: stellarindex_ingestion_cursor_stuck
        expr: |
          increase(stellarindex_cursor_last_ledger[5m]) == 0
          and on (source) stellarindex_source_enabled == 1
        for: 5m
        labels:
          severity: ticket
          team: stellarindex
          component: ingestion
          runbook_url: https://github.com/StellarIndex/stellar-index/blob/main/docs/operations/runbooks/cursor-stuck.md
        annotations:
          summary: "Cursor for {{ $labels.source }} not advancing"
          description: |
            The persisted cursor hasn't moved in 5 minutes while the source is
            enabled. Typical cause: indexer consumed events but UpsertCursor
            failed silently, or the orchestrator's cursor-persister goroutine
            is wedged.

      - alert: stellarindex_ingestion_orphan_events
        expr: sum by (source) (rate(stellarindex_source_orphan_events_total[10m])) > 10/60
        for: 15m
        labels:
          severity: informational
          team: stellarindex
          component: ingestion
          runbook_url: https://github.com/StellarIndex/stellar-index/blob/main/docs/operations/runbooks/orphan-events.md
        annotations:
          summary: "Source {{ $labels.source }} orphan events {{ $value | humanize }}/sec"
          description: |
            Source {{ $labels.source }} has events arriving without their
            correlation partner (Soroswap swap-without-sync, Phoenix
            incomplete 8-field swap) at a rate above 10/min sustained
            15 min. Likely a page-boundary issue in the RPC subscription
            or a contract-schema shift we haven't accounted for.

      - alert: stellarindex_ingestion_decode_error
        expr: rate(stellarindex_source_decode_errors_total[5m]) > 1
        for: 5m
        labels:
          severity: informational
          team: stellarindex
          component: ingestion
          runbook_url: https://github.com/StellarIndex/stellar-index/blob/main/docs/operations/runbooks/decode-errors.md
        annotations:
          summary: "Decode errors on {{ $labels.source }} at {{ $value }}/sec"
          description: |
            Source {{ $labels.source }} failed to decode > 1 event/sec for 5+
            minutes. Usually a contract-event-schema change or a regression
            in the decoder.

      - alert: stellarindex_ingestion_discovery_drops
        expr: increase(stellarindex_discovery_dropped_hits_total[10m]) > 0
        for: 10m
        labels:
          severity: informational
          team: stellarindex
          component: ingestion
          runbook_url: https://github.com/StellarIndex/stellar-index/blob/main/docs/operations/runbooks/discovery-drops.md
        annotations:
          summary: "Discovery sink is dropping hits"
          description: |
            The SEP-41 discovery sink dropped at least one hit in the last
            10 minutes and continued doing so for 10 minutes. This does not
            stall the main ingest path, but discovery coverage is degrading
            under recorder pressure or buffer saturation.

      - alert: stellarindex_ingestion_ch_live_sink_drops
        expr: increase(stellarindex_ch_live_sink_ledgers_total{outcome="dropped"}[10m]) > 0
        for: 10m
        labels:
          severity: ticket
          team: stellarindex
          component: ingestion
          runbook_url: https://github.com/StellarIndex/stellar-index/blob/main/docs/operations/runbooks/ch-live-sink-drops.md
        annotations:
          summary: "ClickHouse live-sink is dropping ledger extracts"
          description: |
            The real-time CH dual-sink dropped at least one whole ledger
            extract in the last 10 minutes and kept doing so for 10
            minutes. Drops are healed by the ch-live-catchup timer, so
            this is "the heal path is being exercised abnormally" —
            check CH health and sink buffer pressure before the lake
            tail integrity degrades (ADR-0041).

      - alert: stellarindex_ingestion_ch_live_sink_drops_sustained
        expr: increase(stellarindex_ch_live_sink_ledgers_total{outcome="dropped"}[1h]) > 0
        for: 1h
        labels:
          severity: page
          team: stellarindex
          component: ingestion
          runbook_url: https://github.com/StellarIndex/stellar-index/blob/main/docs/operations/runbooks/ch-live-sink-drops.md
        annotations:
          summary: "ClickHouse live-sink drops sustained for 1h — heal path losing the race"
          description: |
            Ledger extracts have been dropping continuously for an hour.
            ch-live-catchup is either down or cannot keep up; the
            certified-lake tail (the coverage claim's substrate) is at
            risk. Treat as data-loss-risk (ADR-0041).

      # 2026-07-06 Postgres-outage fix (ADR-0041): the trade sink now
      # RETRIES an infrastructure-classified insert failure (connection
      # refused/reset, PG restarting) with backpressure instead of
      # dropping the write. While it retries, the on-chain drain
      # goroutine is blocked, so the ledger cursor STALLS (nothing lost)
      # but the served tier is frozen. A sustained retry rate is the
      # early signal that Postgres is unreachable and ingest is
      # backpressured. Ticket, not page: no data is being lost, and
      # cursor-stuck / all-sources-stopped page separately if this turns
      # into a full outage.
      - alert: stellarindex_ingestion_trade_insert_backpressure
        expr: sum(rate(stellarindex_trade_insert_retries_total{outcome="retry"}[5m])) > 0
        for: 10m
        labels:
          severity: ticket
          team: stellarindex
          component: ingestion
          runbook_url: https://github.com/StellarIndex/stellar-index/blob/main/docs/operations/runbooks/trade-insert-backpressure.md
        annotations:
          summary: "Trade sink retrying under backpressure — Postgres write path blocked"
          description: |
            The trade sink has been retrying infrastructure-classified
            insert failures (connection refused/reset, PG restarting) for
            ≥ 10 min. The on-chain ledger cursor is HELD (not advancing)
            until the writes land — nothing is dropped, but the served
            tier is frozen and external (CEX/FX) price freshness is
            degrading (watch stellarindex_trade_insert_buffer_depth).
            Almost always a Postgres outage/restart.
            Runbook: https://github.com/StellarIndex/stellar-index/blob/main/docs/operations/runbooks/trade-insert-backpressure.md

      - alert: stellarindex_ingestion_insert_errors
        expr: sum by (source, kind) (rate(stellarindex_source_insert_errors_total[5m])) > 0.1
        for: 5m
        labels:
          severity: ticket
          team: stellarindex
          component: ingestion
          runbook_url: https://github.com/StellarIndex/stellar-index/blob/main/docs/operations/runbooks/insert-errors.md
        annotations:
          summary: "Insert errors on {{ $labels.source }}/{{ $labels.kind }} at {{ $value }}/sec"
          description: |
            Source {{ $labels.source }} failed to persist {{ $labels.kind }}
            events (>6/min sustained for 5 min). Storage layer is rejecting
            writes — usually Timescale outage, disk-full, or a schema
            mismatch after a migration.

            Post-2026-07-06 (ADR-0041), INFRASTRUCTURE faults no longer
            drop — they retry with backpressure (see
            trade_insert_backpressure). So a firing here means GENUINE
            loss: a permanent data fault (kind=trade) or external-buffer
            overflow (kind=dropped). Escalate quickly if the rate is high.

      # Live r1 evidence on 2026-05-28 surfaced a cursor-replay
      # pattern: trade_inserts_total{source=sdex} ticked at 157/min
      # while the trades hypertable's max(ts) was 11 h old — every
      # attempt was an ON CONFLICT DO NOTHING short-circuit. The
      # `_insert_errors` alert above doesn't fire (no errors); the
      # `_source_stopped` alert above doesn't fire (events are still
      # being decoded); but the database is silently 0% fresh.
      #
      # The trade_insert_outcome_total counter (added 2026-05-28)
      # exposes the new-vs-duplicate split directly. This alert
      # fires when a source produces a sustained dedupe-only stream:
      # nonzero duplicate rate AND zero new rate for 10 min. Ticket
      # severity (not page) because the symptom is degraded
      # freshness, not outage.
      - alert: stellarindex_ingestion_duplicate_flood
        expr: |
          sum by (source) (rate(stellarindex_trade_insert_outcome_total{outcome="duplicate"}[10m])) > 0.5
          and on (source)
          sum by (source) (rate(stellarindex_trade_insert_outcome_total{outcome="new"}[10m])) == 0
        for: 10m
        labels:
          severity: ticket
          team: stellarindex
          component: ingestion
          runbook_url: https://github.com/StellarIndex/stellar-index/blob/main/docs/operations/runbooks/ingestion-duplicate-flood.md
        annotations:
          summary: "Source {{ $labels.source }} producing duplicates only (cursor replay or stuck-tip)"
          description: |
            Source {{ $labels.source }} has been attempting >0.5
            inserts/sec for ≥10 min but EVERY attempt hits
            `ON CONFLICT DO NOTHING` — no new rows are landing in
            the trades hypertable. The indexer cursor advances but
            the data underneath it is stale.

            Likely root causes: cursor-state corruption (cursor
            jumped past data without persisting), a stale event
            channel feeding the sink from an old replay loop, or a
            back-pressure event that lost in-flight events.

            Runbook: https://github.com/StellarIndex/stellar-index/blob/main/docs/operations/runbooks/ingestion-duplicate-flood.md

      # Timestamp-shape sibling to the rate-shape duplicate_flood
      # above. Fires when a source's last successful INSERT is over
      # 1 h old even though source_enabled=1. Doesn't require
      # sustained insert attempts to trigger — works for low-volume
      # sources (phoenix, comet) where the rate-shape alert never
      # crosses its 0.5/s threshold. The 1 h budget tolerates
      # legitimately-bursty sources without false-firing.
      - alert: stellarindex_ingestion_source_insert_stale
        # 1 h budget for normal sources; 6 h for the genuinely-sparse Soroban
        # AMMs (comet, phoenix). Comet is tiny — ~20-70 trades/day, bursty —
        # so multi-hour quiet stretches are normal and the flat 1 h budget
        # false-fired (2026-06-20). The 6 h budget still catches a real
        # day-scale stall (both produce every day). Tune the regex as new
        # sparse sources appear.
        expr: |
          (
            time() - stellarindex_source_last_insert_unix > 3600
            and on (source) stellarindex_source_enabled == 1
            unless on (source) stellarindex_source_last_insert_unix{source=~"comet|phoenix"}
          )
          or
          (
            time() - stellarindex_source_last_insert_unix{source=~"comet|phoenix"} > 21600
            and on (source) stellarindex_source_enabled == 1
          )
        for: 10m
        labels:
          severity: ticket
          team: stellarindex
          component: ingestion
          runbook_url: https://github.com/StellarIndex/stellar-index/blob/main/docs/operations/runbooks/ingestion-duplicate-flood.md
        annotations:
          summary: "Source {{ $labels.source }} hasn't landed a new row in >1h"
          description: |
            stellarindex_source_last_insert_unix{source="{{ $labels.source }}"}
            hasn't advanced in over an hour while the source is
            still enabled. Same root-cause cluster as the
            duplicate-flood alert; the timestamp-shape signal
            catches low-volume sources whose insert rate sits
            under the rate-shape alert's 0.5/s threshold.

            Cross-check stellarindex_source_last_event_unix — if the
            dispatcher is still matching events, the gap is the
            stuck-tip diagnostic (cursor advances, data doesn't).

            Runbook: https://github.com/StellarIndex/stellar-index/blob/main/docs/operations/runbooks/ingestion-duplicate-flood.md

      # Data-derived gap detector. The cursor-derived density
      # projection in /v1/diagnostics/ingestion measures process
      # state ("did we walk this ledger") and can read 100% while
      # data is missing — the F-0020 audit found that exact pattern,
      # with the soroban_events writer halted across a 92,737-ledger
      # contiguous window. This alert fires on the data-derived
      # gauge instead: a sustained contiguous gap of >1000 ledgers
      # in soroban_events that doesn't close on its own implies an
      # ingest halt that needs operator action.
      #
      # Threshold: max_gap_size > 1000 sustained 15 min. The 5-min
      # detector cadence × 3 cycles ensures the alert isn't fooled
      # by the brief window between cascade-clear + targeted-backfill
      # completion. 1000 ledgers (~1.5 h network time) filters out
      # legitimate no-Soroban-activity stretches.
      - alert: stellarindex_ingest_gap_detected
        expr: |
          max by (source) (stellarindex_ingest_gap_max_size_ledgers) > 1000
        for: 15m
        labels:
          severity: page
          team: stellarindex
          component: ingestion
          runbook_url: https://github.com/StellarIndex/stellar-index/blob/main/docs/operations/runbooks/ingest-gap-detected.md
        annotations:
          summary: "Data-coverage gap of {{ $value }} ledgers in source={{ $labels.source }}"
          description: |
            max by (source) (stellarindex_ingest_gap_max_size_ledgers{source="{{ $labels.source }}"})
            = {{ $value }} ledgers — a contiguous block of {{ $labels.source }}
            ingest is missing in one of its per-source hypertables.
            Cursor inventory may read fine; this alert reads the data
            tables directly.

            Resolve via:
              stellarindex-ops find-data-gaps --config /etc/stellarindex.toml --source {{ $labels.source }} --output text
            for per-source diagnosis, then for Soroban-derived sources:
              stellarindex-ops projector-replay --source <name> --from F  (per-source projection cursor rewind; ADR-0032)
            For non-projected sources (sdex / soroban-events):
              stellarindex-ops backfill --source <name> --from F --to T

            Runbook: https://github.com/StellarIndex/stellar-index/blob/main/docs/operations/runbooks/ingest-gap-detected.md

      # Meta-alert: gap detector itself is wedged for a target. Fires
      # when a (source, table)'s last SUCCESSFUL scan is older than 8h
      # (comfortably above the 6h sdex/soroban ScanCadence) OR the
      # detector metric is entirely absent (aggregator down).
      #
      # Keyed off the last-success TIMESTAMP gauge, not
      # rate(runs_total{outcome="ok"}). The heavy targets scan once per
      # 6h, so their ok counter is pinned at 1 within a process life;
      # across restarts the value is 1 → 1, which Prometheus cannot see
      # as a reset, so rate() read a flat line and false-fired for >7h
      # even though every scan succeeded (incident 2026-07-06). A
      # wall-clock gauge is reset-proof: a healthy startup scan re-stamps
      # it to now(), clearing staleness immediately.
      - alert: stellarindex_ingest_gap_detector_silent
        expr: |
          (time() - stellarindex_ingest_gap_detector_last_success_unix) > 28800
          OR
          absent_over_time(stellarindex_ingest_gap_detector_runs_total[15m]) == 1
        for: 10m
        labels:
          severity: ticket
          team: stellarindex
          component: ingestion
          runbook_url: https://github.com/StellarIndex/stellar-index/blob/main/docs/operations/runbooks/ingest-gap-detector-silent.md
        annotations:
          summary: "Data-gap detector hasn't scanned {{ $labels.source }}/{{ $labels.table }} successfully in >8h (above the 6h sdex/soroban scan cadence)"
          description: |
            The aggregator's data-gap detector goroutine appears
            stuck or absent for a target. Without it the operator-facing
            `stellarindex_ingest_gap_max_size_ledgers` gauge stops
            updating — gauges read stale value until restart.

            Likely causes: aggregator binary crash-looping; Postgres
            connection-pool exhaustion causing every scan to hit the
            per-target Go timeout / SQL statement_timeout and increment
            outcome=error; deploy regression that removed the worker
            wiring. Grep the aggregator log for
            `gap-detector: scan failed` (a non-ok outcome is logged
            loudly with elapsed_s so a timeout is unmistakable).

            Cross-check: aggregator service `active`?
            postgres_exporter targets `up`?
            `stellarindex_ingest_gap_detector_runs_total{outcome="error"}`
            climbing?

            Runbook: https://github.com/StellarIndex/stellar-index/blob/main/docs/operations/runbooks/ingest-gap-detector-silent.md
