---
# galexie-archive tip-lag alerts (#31) — defense-in-depth for #26.
#
# #26 was a 23-day silent stall of galexie-archive (the ADR-0016 R1
# durable full-mirror). The recurrence fix shipped in #26 is the
# hourly `galexie-archive-fill.timer`; this alert is the safety net
# under it — if that timer (or its `mc` aliases, aws-public IAM,
# etc.) silently breaks, we want to PAGE in hours, not weeks.
#
# Scrape source: node_exporter's textfile_collector reads
# `/var/lib/node_exporter/textfile_collector/galexie_archive_tip_lag.prom`,
# updated every 5 min by `galexie-archive-tip-lag.timer` →
# `/usr/local/bin/galexie-archive-tip-lag`.
#
# Metrics published:
#   galexie_archive_tip_ledger          — gauge, newest ledger in archive bucket.
#   galexie_live_tip_ledger             — gauge, newest ledger in live bucket.
#   galexie_archive_tip_lag_ledgers     — gauge, live - archive (lag in ledgers).
#   galexie_archive_tip_lag_updated_seconds — gauge, unix-time of last successful update.
#
# Partition model — the thresholds below depend on it:
# galexie writes 64,000 ledgers per partition (files_per_partition
# = 64000, ledgers_per_file = 1) and galexie-archive-fill mirrors
# only COMPLETE partitions. The archive tip therefore structurally
# lags galexie-live by however far live is into the current,
# in-progress partition — i.e. the lag sweeps 0 → 64,000 every
# partition (~4 days at mainnet pace) and drops back to ~0 when the
# hourly fill mirrors the just-completed partition. A lag ABOVE one
# full partition means a completed partition went un-mirrored — that
# is the fill timer failing.
#   Warn threshold: >64,000 sustained 90 min → a completed partition
#     stayed un-mirrored past two hourly fill cycles.
#   Page threshold: >128,000 → ≥2 completed partitions behind; the
#     hourly fill has clearly broken (the #26 failure class).
# The pre-2026-05-22 thresholds (5,000 / 50,000) predated this model
# and false-fired through every normal partition cycle.

groups:
  - name: stellarindex.galexie_archive_tip_lag
    interval: 60s
    rules:

      - alert: stellarindex_galexie_archive_tip_lag_high
        expr: galexie_archive_tip_lag_ledgers > 64000
        for: 90m
        labels:
          severity: ticket
          team: stellarindex
          component: archive
          runbook_url: https://github.com/StellarIndex/stellar-index/blob/main/docs/operations/runbooks/galexie-archive-tip-lag.md
        annotations:
          summary: "galexie-archive >1 partition behind live ({{ $value }} ledgers, sustained 90m, P3)"
          description: |
            galexie-archive (R1 durable full-mirror) is {{ $value }}
            ledgers behind galexie-live — more than one full 64,000-
            ledger partition — and has stayed there for 90+ minutes
            (two hourly fill cycles). A completed partition is not
            being mirrored: the hourly galexie-archive-fill timer is
            slow or partially failing. Customer impact: none yet
            (live ingest unaffected, durable upstream aws-public-blockchain
            backstops); R1's full-mirror guarantee is degrading.
            Investigate galexie-archive-fill.timer status + last log +
            aws-public mc-alias reachability.
            Runbook: https://github.com/StellarIndex/stellar-index/blob/main/docs/operations/runbooks/galexie-archive-tip-lag.md

      - alert: stellarindex_galexie_archive_tip_lag_severe
        expr: galexie_archive_tip_lag_ledgers > 128000
        for: 30m
        labels:
          severity: page
          team: stellarindex
          component: archive
          runbook_url: https://github.com/StellarIndex/stellar-index/blob/main/docs/operations/runbooks/galexie-archive-tip-lag.md
        annotations:
          summary: "galexie-archive >2 partitions behind live ({{ $value }} ledgers, P1)"
          description: |
            galexie-archive is {{ $value }} ledgers behind galexie-live
            — more than two full 64,000-ledger partitions. The hourly
            galexie-archive-fill.timer has clearly broken — same
            failure class as the original 23-day stall #26 was the
            initial fix for. Customer impact: local WASM-walks +
            historical backfills past the gap will fail; R1's
            full-mirror integrity-leader role is broken until repair.
            Runbook: same as above.

      - alert: stellarindex_galexie_archive_tip_lag_metric_stale
        expr: time() - galexie_archive_tip_lag_updated_seconds > 1800
        for: 15m
        labels:
          severity: ticket
          team: stellarindex
          component: archive
          runbook_url: https://github.com/StellarIndex/stellar-index/blob/main/docs/operations/runbooks/galexie-archive-tip-lag.md
        annotations:
          summary: "galexie-archive tip-lag metric not updated >30m"
          description: |
            The galexie-archive-tip-lag.timer hasn't successfully
            updated its textfile for >30 min (timer fires every
            5 min). The alert metric itself is the canary; without
            it we lose the safety net. Check
            `systemctl status galexie-archive-tip-lag.timer` +
            the service's last journal entries; verify the script
            can read both MinIO buckets via the `local` mc alias.

      - alert: stellarindex_galexie_catchup_refused
        # 2026-07-05: the captive core wedged with 'invalid local state'
        # and refused catchup for 11 hours while the lake froze — the
        # signature sat verbatim in the journal, unwatched. Sustained
        # refusals = the core cannot heal itself; the remedy is a galexie
        # restart (fresh bucket catchup from the archive).
        expr: stellarindex_galexie_catchup_refusals_5m > 0
        for: 10m
        labels:
          severity: page
        annotations:
          summary: "galexie captive core is refusing catchup (invalid local state)"
          runbook: docs/operations/runbooks/galexie-catchup-refused.md

      - alert: stellarindex_host_swap_activity
        # Swap engagement is the early warning of the pressure class that
        # wedged the captive core — batch jobs must be memory-capped
        # (run-heavy-job.sh), so ANY sustained swapping means a budget is
        # being violated.
        expr: rate(node_vmstat_pswpout[10m]) > 100
        for: 15m
        labels:
          severity: ticket
        annotations:
          summary: "host is swapping — a memory budget is being violated"
          runbook: docs/operations/runbooks/galexie-catchup-refused.md
