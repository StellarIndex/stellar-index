                flags:
                  stale: false
                  reduced_redundancy: false
                  triangulated: false
                  divergence_warning: false
                  divergence_checked: false
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      priced_assets: { type: integer, description: Number of assets that contributed a price. }
                      accounts:
                        type: array
                        items:
                          type: object
                          properties:
                            account_id: { type: string }
