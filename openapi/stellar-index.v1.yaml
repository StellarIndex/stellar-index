                    required: [data]
              example:
                data:
                  count: 1
                  incidents:
                    - slug: "2026-05-06-postgres-lock-table-full"
                      title: "[SEV-3] Indexer dropping ~1% of trades — Postgres lock-table-full"
                      severity: "SEV-3"
