                data:
                - source: band
                  contract_id: CCQXWMZVM3KRTXTUPTN53YHL272QGKF32L7XEDNZ2S6OSUFK3NFBGG5M
                  asset: crypto:USDC
                  quote: fiat:USD
                  ts: '2026-07-03T22:06:18Z'
                  price: '0.999879000'
