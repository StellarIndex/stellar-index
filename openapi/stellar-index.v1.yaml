                    count: 332561
                  activity_series:
                  - date: '2026-03-22'
                    events: 2449
                  activity_window_days: 90
                  events_total: 332561
                as_of: '2026-07-03T22:38:49.052946129Z'
                flags:
                  stale: false
                  reduced_redundancy: false
                  triangulated: false
                  divergence_warning: false
                  divergence_checked: false
              schema:
                allOf:
                  - { $ref: "#/components/schemas/EnvelopeMeta" }
