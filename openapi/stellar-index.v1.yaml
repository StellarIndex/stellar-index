  /account/me:
    get:
      tags: [account]
      summary: API-key holder info + quota status.
      description: |
        Who am I? Returns the authenticated caller's identity.
        API-key / SEP-10 callers get the top-level `key_*` fields
        (key id, label, tier, per-minute rate limit); dashboard
        session callers get the nested `user` / `account` objects
        instead. When both credentials ride one request the
        session wins — it identifies a person, a key only
        identifies a credential. Anonymous callers get 401: /me
        is meaningless without a credential.
      security:
        - APIKeyAuth: []
        - SessionCookie: []
      responses:
        "200":
          description: Account.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AccountEnvelope" }
              example:
                data:
                  key_id: kid_8f3a2c1b9e7d4f6a
                  label: production-api-1
                  tier: apikey
                  rate_limit_per_min: 1000
                  created_at: "2026-04-12T09:32:18Z"
                as_of: "2026-05-05T16:25:42.881Z"
                flags: { stale: false, reduced_redundancy: false, triangulated: false, divergence_warning: false }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "429": { $ref: "#/components/responses/RateLimited" }
        "500": { $ref: "#/components/responses/InternalError" }

  /account/usage:
    get:
      tags: [account]
      summary: Daily per-endpoint request counters for the authenticated key.
      description: |
        Returns per-day, per-endpoint-family usage rows for the
        authenticated caller over the trailing 30 days: one row per
        (date, endpoint) with `requests` (allowed traffic),
        `errors` (4xx excluding 429, plus 5xx), and `throttled`
        (429 rate-limit rejections — tallied separately and never
        counted against monthly quota). `endpoint` is the route
        PATTERN (e.g. `/v1/assets/{asset_id}`), never a raw URL.
        Sum `requests` grouped by `date` for daily totals.

        Pipeline: the usage middleware counts every authenticated
        request per (subject, route pattern, outcome class) in
        Redis; the API's rollup worker folds those counters into
        the `usage_daily` Timescale table every 5 minutes, which
        this endpoint reads. Rows can therefore trail live traffic
        by up to ~5 minutes.

        Fallback shape: deployments where the rollup table has no
        rows yet (or Postgres is absent) degrade to the legacy
        per-day rows — one row per date with `endpoint` omitted
        and `errors`/`throttled` zero. Redis-less deployments
        return an empty array; the absence of the backend is
        reflected on /v1/readyz under `checks` (NOT `/v1/healthz`
        — the per-dependency `checks` field is `/readyz`-only; the
        `/healthz` liveness probe stays minimal by design).
      security:
        - APIKeyAuth: []
      parameters:
        - { $ref: "#/components/parameters/From" }
        - { $ref: "#/components/parameters/To" }
      responses:
        "200":
          description: Usage records.
          content:
            application/json:
              example:
                data:
                - date: '2026-07-01'
                  endpoint: /v1/price
                  requests: 18234
                  errors: 12
                  throttled: 0
                - date: '2026-07-02'
                  endpoint: /v1/price
                  requests: 20117
                  errors: 3
                  throttled: 41
                - date: '2026-07-02'
                  endpoint: /v1/assets/{asset_id}
                  requests: 512
                  errors: 0
                  throttled: 0
                as_of: '2026-07-03T09:00:00Z'
                flags:
                  stale: false
                  reduced_redundancy: false
                  triangulated: false
                  divergence_warning: false
                  divergence_checked: false
              schema: { $ref: "#/components/schemas/UsageEnvelope" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "429": { $ref: "#/components/responses/RateLimited" }
        "500": { $ref: "#/components/responses/InternalError" }

  /account/keys:
    get:
      tags: [account]
      summary: List all API keys for the authenticated caller.
      description: |
        Returns every key whose Identifier matches the caller's
        authenticated Subject, sorted oldest-first. Each entry is
        the public-safe projection — `key_id`, `label`, `tier`,
        `rate_limit_per_min`, `created_at`. **Plaintext is never
        returned**; it's only retrievable at POST-time.

        Use this to render an account dashboard ("here are your
        keys"), verify rotation worked, or confirm a Stripe-paid
        upgrade lifted the right keys.
      security:
        - APIKeyAuth: []
      responses:
        "200":
          description: Account keys (possibly empty list).
          content:
            application/json:
              example:
                data:
                - key_id: 7d9f2a54-4f0e-4c1a-9b3d-2f6c8e1a0b5c
                  label: production
                  key_prefix: sip_1a2b3c4d
                  tier: apikey
                  rate_limit_per_min: 300
                  created_at: '2026-06-12T08:30:00Z'
                as_of: '2026-07-03T09:00:00Z'
                flags:
                  stale: false
                  reduced_redundancy: false
                  triangulated: false
                  divergence_warning: false
                  divergence_checked: false
              schema:
                allOf:
                  - { $ref: "#/components/schemas/EnvelopeMeta" }
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: "#/components/schemas/Account" }
        "401":
          description: Unauthenticated.
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }
        "503":
          description: AccountStore not configured.
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }
    post:
      tags: [account]
      summary: Create a new API key.
      description: |
        Issues a new API key for the authenticated caller and returns
        the plaintext exactly once.

        `scopes` (optional) confines the new key to route families:
        `read` (public data surfaces), `account` (`/v1/account/*`),
        `dashboard` (`/v1/dashboard/*`), `admin` (`/v1/admin/*`).
        Omitted/empty mints a full-access key — the posture every key
        minted before scopes shipped keeps. Scopes only narrow; they
        never grant anything the key's tier wouldn't already reach.
      security:
        - APIKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                label: { type: string, maxLength: 128 }
                scopes:
                  type: array
                  items:
                    type: string
                    enum: [read, account, dashboard, admin]
                  description: |
                    Optional capability scopes. Empty = full access
                    (back-compat). Unknown values 400.
              required: [label]
      responses:
        "201":
          description: New key — plaintext shown **once**.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/KeyCreatedEnvelope" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "429": { $ref: "#/components/responses/RateLimited" }
        "500": { $ref: "#/components/responses/InternalError" }
        "503": { $ref: "#/components/responses/ServiceUnavailable" }

  /account/keys/{keyID}:
    delete:
      tags: [account]
      summary: Revoke an API key by KeyID.
      description: |
        Revokes the API key whose KeyID matches the path parameter,
        scoped to the authenticated caller's Identifier so accounts
        can only revoke their own keys. "Not found" and "not yours"
        collapse to 204 to prevent cross-account enumeration probes.

        The caller cannot revoke the key they're authenticated with —
        that would orphan the connection mid-request. 409 in that
        case so the UI can prompt for an alternate credential.
      security:
        - APIKeyAuth: []
      parameters:
        - name: keyID
          in: path
          required: true
          schema: { type: string }
          description: "Public-safe `kid_<hex>` identifier from /v1/account/keys."
      responses:
        "204":
          description: Revoked (or no-op when the key didn't belong to the caller).
        "400":
          description: Missing keyID.
        "401":
          description: Unauthenticated.
        "409":
          description: Caller tried to revoke the key they're using.
        "503":
          description: Account store not configured.

  /admin/keys:
    post:
      tags: [admin]
      summary: Operator — mint an API key for another identifier.
      description: |
        The operator key-mint path the self-service POST
        /v1/account/keys has always pointed at: unlike self-service
        (which inherits the caller's identifier + tier), the
        operator names the TARGET `identifier` and may pin `tier`
        (`apikey` default, or `operator`), `rate_limit_per_min`,
        and capability `scopes` explicitly.

        Restricted to operator-tier credentials (staff-issued via
        stellarindex-ops; never granted to public callers) — other
        tiers 403. Every successful mint is audit-logged: a
        structured log line unconditionally plus a persisted
        `audit_log` row (`key.mint`, staff actor) when the
        deployment wires the audit store.
      security:
        - APIKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                identifier:
                  type: string
                  description: |
                    Owner reference the minted key authenticates as
                    (e.g. `acct:<slug>`).
                label: { type: string, maxLength: 128 }
                tier:
                  type: string
                  enum: [apikey, operator]
                  default: apikey
                rate_limit_per_min:
                  type: integer
                  minimum: 0
                  maximum: 100000
                  description: 0 inherits the deployment default.
                scopes:
                  type: array
                  items:
                    type: string
                    enum: [read, account, dashboard, admin]
              required: [identifier, label]
      responses:
        "201":
          description: New key — plaintext shown **once**.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/KeyCreatedEnvelope" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403":
          description: Caller is not operator-tier.
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }
        "429": { $ref: "#/components/responses/RateLimited" }
        "500": { $ref: "#/components/responses/InternalError" }
        "503": { $ref: "#/components/responses/ServiceUnavailable" }

  /admin/accounts/{id}:
    get:
      tags: [admin]
      summary: Operator — read an account's tier + overrides.
      description: |
        Returns the account-level tier plus the per-account
        `rate_limit_per_min_override` / `monthly_request_quota_override`
        (0 = inherit tier default). Operator-tier only; read-only (not
        audit-logged — the audit log records mutations, not reads).
      security:
        - APIKeyAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
          description: Platform account UUID.
      responses:
        "200":
          description: Account view.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AdminAccountEnvelope" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403":
          description: Caller is not operator-tier.
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/InternalError" }
        "503": { $ref: "#/components/responses/ServiceUnavailable" }
    patch:
      tags: [admin]
      summary: Operator — set an account's tier + rate-limit / quota overrides.
      description: |
        Sets the account plan tier and/or the per-account
        `rate_limit_per_min_override` / `monthly_request_quota_override`
        (admin Phase 1.5). All three fields are optional; at least one
        must be present. An override value of `0` clears it (inherit the
        tier default). The rate-limit override acts as an account-wide
        floor applied by the Postgres API-key validator on the next
        Lookup — it raises keys budgeted below it, never lowers a key
        budgeted above.

        Operator-tier only (staff-issued via stellarindex-ops; never
        granted to public callers) — other tiers 403. Requires an
        `X-Reason` header captured into the audit log; every successful
        mutation lands an `account.override.set` audit row (staff actor)
        when the deployment wires the audit store.
      security:
        - APIKeyAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
          description: Platform account UUID.
        - name: X-Reason
          in: header
          required: true
          schema: { type: string }
          description: Free-form reason captured into the audit log.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                tier:
                  type: string
                  enum: [free, starter, pro, business, enterprise]
                rate_limit_per_min_override:
                  type: integer
                  minimum: 0
                  maximum: 100000
                  description: 0 clears the override (inherit tier default).
                monthly_request_quota_override:
                  type: integer
                  format: int64
                  minimum: 0
                  description: 0 clears the override (inherit tier default).
      responses:
        "200":
          description: Updated account view.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AdminAccountEnvelope" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403":
          description: Caller is not operator-tier.
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/InternalError" }
        "503": { $ref: "#/components/responses/ServiceUnavailable" }

  /admin/status-notices:
    get:
      tags: [admin]
      summary: Operator — list all status notices (active + resolved).
      description: |
        The operator history view of the customer-facing status banners
        (admin Phase 1.5 incident tooling), newest first. Operator-tier
        only; read-only.
      security:
        - APIKeyAuth: []
      responses:
        "200":
          description: Notice list.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/StatusNoticesEnvelope" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403":
          description: Caller is not operator-tier.
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }
        "500": { $ref: "#/components/responses/InternalError" }
        "503": { $ref: "#/components/responses/ServiceUnavailable" }
    post:
      tags: [admin]
      summary: Operator — post a customer-facing status banner.
      description: |
        Creates a LIVE, human-authored status banner shown on the public
        status surface via GET /v1/status/notices (platform-spec §7.1
        "Trigger maintenance mode banner"). Distinct from the embedded
        post-mortem corpus (GET /v1/incidents) and the Alertmanager-
        derived incidents block on GET /v1/status.

        Operator-tier only. Requires an `X-Reason` header captured into
        the audit log; audit-logged as `status_notice.create` (staff
        actor).
      security:
        - APIKeyAuth: []
      parameters:
        - name: X-Reason
          in: header
          required: true
          schema: { type: string }
          description: Free-form reason captured into the audit log.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title: { type: string, minLength: 1, maxLength: 200 }
                body: { type: string, minLength: 1, maxLength: 5000 }
                severity:
                  type: string
                  enum: [maintenance, minor, major, critical]
              required: [title, body, severity]
      responses:
        "201":
          description: Created notice.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/StatusNoticeEnvelope" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403":
          description: Caller is not operator-tier.
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }
        "500": { $ref: "#/components/responses/InternalError" }
        "503": { $ref: "#/components/responses/ServiceUnavailable" }

  /admin/status-notices/{id}/resolve:
    post:
      tags: [admin]
      summary: Operator — resolve (clear) a status banner.
      description: |
        Flips an active status banner to resolved — it drops off the
        public GET /v1/status/notices surface but is retained for the
        operator history + audit trail. Idempotent. Operator-tier only;
        requires an `X-Reason` header. Audit-logged as
        `status_notice.resolve` (staff actor).
      security:
        - APIKeyAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
          description: Status notice UUID.
        - name: X-Reason
          in: header
          required: true
          schema: { type: string }
          description: Free-form reason captured into the audit log.
      responses:
        "200":
          description: Resolved notice.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/StatusNoticeEnvelope" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403":
          description: Caller is not operator-tier.
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/InternalError" }
        "503": { $ref: "#/components/responses/ServiceUnavailable" }

  /webhooks/stripe:
    post:
      tags: [account]
      summary: Stripe webhook — paid-tier upgrade.
      description: |
        Receives Stripe webhook events. On `checkout.session.completed`
        with `payment_status=paid`, looks up every API key whose
        identifier matches `client_reference_id` and lifts their
        `rate_limit_per_min` to the value implied by `metadata.tier`
        (pro / business) or the explicit `metadata.rate_limit_per_min`
        override.

        Idempotent — Stripe at-least-once delivery means the same
        event may arrive multiple times; the handler always sets the
        same target rate-limit. Customer keeps their existing
        plaintext key; effective on the next request (validator reads
        the per-key budget on every Lookup).

        Stripe-Signature header verified via HMAC-SHA256 with
        timestamp drift bounded to 5 minutes. Endpoint returns 503
        when the signing secret is unset (deployments without
        Stripe).

        **Operator observability.** Beyond the Redis-side
        rate-limit lift (which 5xx-bubbles back to Stripe so the
        platform retries), the handler also fans out platform-store
        side effects: account tier update, subscription upsert, and
        per-key rate-limit lift on dashboard-created Postgres keys
        (F-1219). Those side effects are best-effort — they do NOT
        5xx — because Stripe retries against an unhealthy Postgres
        would just retry-storm. Failures are surfaced via the
        `stellarindex_stripe_platform_sync_errors_total{operation}`
        counter; the alert
        `stellarindex_stripe_platform_sync_errors` (P3 / ticket)
        fires on any non-zero rate over 15 min. See the runbook
        at `docs/operations/runbooks/stripe-platform-sync-errors.md`
        for per-`operation` triage.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      parameters:
        - name: Stripe-Signature
          in: header
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Event acknowledged (regardless of whether keys were upgraded — non-2xx triggers Stripe retries).
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:                { type: boolean }
                  upgraded:          { type: integer, description: "Keys upgraded to the new rate limit." }
                  keys_total:        { type: integer, description: "Total keys belonging to the identifier." }
                  rate_limit_per_min: { type: integer }
                  ignored:           { type: string, description: "Set when an event was acknowledged but not acted on (wrong type, unpaid)." }
        "400":
          description: Missing signature header / bad body / bad metadata.
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }
        "401":
          description: Stripe-Signature verification failed.
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }
        "503":
          description: Webhook signing secret not configured.
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }

  /signup:
    post:
      tags: [account]
      summary: Self-service signup — mint a first API key by email.
      description: |
        Public, anonymous-tier endpoint. Hit it once with an email
        + optional label and get back a freshly-minted API key for
        the Starter tier (1000 req/min). Idempotent on the email:
        a second call for the same email returns 409 with a pointer
        to the existing key (recover access via support; future
        Stripe-paid upgrade flow will support self-service rotation
        via /v1/account/keys).

        Already-authenticated callers receive 400 — they should
        rotate keys via POST /v1/account/keys instead.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email: { type: string, format: email }
                label: { type: string, maxLength: 128 }
              required: [email]
            example:
              email: "alice@example.com"
              label: "production-api-1"
      responses:
        "200":
          description: Account created — plaintext key shown **once**.
          content:
            application/json:
              schema:
                allOf:
                  - { $ref: "#/components/schemas/EnvelopeMeta" }
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          plaintext:         { type: string, description: "Bearer token. Show ONCE; unrecoverable." }
                          key_id:            { type: string }
                          identifier:        { type: string }
                          label:             { type: string }
                          tier:              { type: string, enum: [apikey] }
                          rate_limit_per_min: { type: integer }
                        required: [plaintext, key_id, identifier, tier, rate_limit_per_min]
              example:
                data:
                  plaintext: "re_live_4f9c1d8b3a7e2f1c9d4b8a6e3f2c1d9b8a7e6f5d4c3b2a1f"
                  key_id: "k_8f3a2c1b9e7d4f6a"
                  identifier: "signup-3d4f9a2c1e8b7f6d"
                  label: "production-api-1"
                  tier: "apikey"
                  rate_limit_per_min: 1000
                as_of: "2026-05-05T14:35:42.881Z"
                flags: { stale: false, reduced_redundancy: false, triangulated: false, divergence_warning: false }
        "400":
          description: Missing or invalid email, body too large, or already authenticated.
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }
        "409":
          description: Email already has an account.
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }
        "503":
          description: AccountStore not configured (Redis unavailable).
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }

  /signup/verify:
    get:
      tags: [account]
      summary: Confirm email ownership for a signup-issued API key.
      description: |
        F-1218 (codex audit-2026-05-12): closes the email-
        ownership-proof loop on `POST /v1/signup`. The signup
        handler issues a single-use token and emails it to the
        submitted address; this endpoint consumes the token from
        the click-through link.

        Single-use semantics via Redis GETDEL — the second
        click on the link returns 404, the same shape as a
        forged or expired token. Token TTL defaults to 24h to
        match the dashboard magic-link convention.

        Subsequent waves layer:
          1. The email-send step on POST /v1/signup that
             populates the verifier with the issued token.
          2. An optional validator gate (operator opt-in via
             config) that rejects unverified keys with 403.

        Today this endpoint just consumes the token; the
        success path returns the key_id so the customer's
        dashboard / CLI can correlate the verified key.
      parameters:
        - name: token
          in: query
          required: true
          schema: { type: string }
          description: The plaintext token from the verification email.
      responses:
        "200":
          description: Token consumed; email ownership confirmed.
          content:
            application/json:
              example:
                data:
                  verified: true
                  key_id: 7d9f2a54-4f0e-4c1a-9b3d-2f6c8e1a0b5c
                  detail: email verified; API key activated
                as_of: '2026-07-03T09:00:00Z'
                flags:
                  stale: false
                  reduced_redundancy: false
                  triangulated: false
                  divergence_warning: false
                  divergence_checked: false
              schema:
                allOf:
                  - { $ref: "#/components/schemas/EnvelopeMeta" }
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          verified: { type: boolean }
                          key_id:   { type: string }
                          detail:   { type: string }
                        required: [verified]
        "400":
          description: Missing `?token=` query parameter.
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }
        "404":
          description: Unknown / consumed / expired token.
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }
        "503":
          description: SignupVerifier not configured (Redis unavailable).
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }

  /dashboard/keys:
    get:
      tags: [dashboard]
      summary: Customer dashboard — list this account's API keys.
      security:
        - SessionCookie: []
      description: |
        Session-gated. Returns every key (active + revoked) for
        the authenticated user's account, ordered oldest-first.
        Plaintext is never returned by this endpoint — only
        the prefix (`sip_4f9c1d8b…`).
      responses:
        "200":
          description: Key list.
          content:
            application/json:
              example:
                keys:
                - id: 7d9f2a54-4f0e-4c1a-9b3d-2f6c8e1a0b5c
                  name: production
                  description: main backend key
                  key_prefix: sip_1a2b3c4d
                  tier: apikey
                  rate_limit_per_min: 300
                  monthly_quota: 1000000
                  usage_alert_threshold_pct: 80
                  last_used_at: '2026-07-03T08:59:41Z'
                  created_at: '2026-06-12T08:30:00Z'
              schema:
                type: object
                properties:
                  keys:
                    type: array
                    items: { $ref: "#/components/schemas/DashboardKey" }
                required: [keys]
        "401":
          description: No valid session cookie.
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }
    post:
      tags: [dashboard]
      summary: Customer dashboard — mint a new API key.
      security:
        - SessionCookie: []
      description: |
        Session-gated. Mints a new key, returns the plaintext
        ONCE. The dashboard surfaces it in a "save this now"
        banner; subsequent reads only see the prefix. Owner /
        admin / member roles can mint; viewer + billing 403.
        Active-key quota is tier-aware (free 5, starter 25, pro 50,
        business 100, enterprise 250 — deployment-overridable);
        exceeding it returns 409.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateKeyRequest" }
      responses:
        "201":
          description: Key minted.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CreateKeyResponse" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401":
          description: No valid session cookie.
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }
        "403":
          description: Role can't mint keys.
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }
        "409":
          description: Account already at the active-key quota.
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }

  /dashboard/keys/{id}:
    delete:
      tags: [dashboard]
      summary: Customer dashboard — revoke a key.
      security:
        - SessionCookie: []
      description: |
        Session-gated. Soft-delete by setting revoked_at;
        idempotent. 404 when the key doesn't exist OR belongs
        to a different account (same shape so attackers can't
        enumerate cross-account key_ids).
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "204":
          description: Revoked.
        "401":
          description: No valid session cookie.
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }
        "403":
          description: Role can't revoke keys.
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }
        "404":
          description: Key not found.
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }

  /dashboard/webhooks:
    get:
      tags: [dashboard]
      summary: Customer dashboard — list this account's webhooks.
      security:
        - SessionCookie: []
      description: |
        Session-gated. Returns every webhook this account has
        registered to receive incident / anomaly / divergence
        callbacks, newest first. The signing secret is never
        returned — only the URL, events, and enabled flag. F-1270.
      responses:
        "200":
          description: Webhook list.
          content:
            application/json:
              example:
                webhooks:
                - id: 0b6a3f2e-9c1d-4e7a-8f5b-6d2c4a1e9b0f
                  name: ops-alerts
                  url: https://ops.example.com/hooks/stellarindex
                  events:
                  - incident.sev1
                  - incident.resolved
                  enabled: true
                  created_at: '2026-06-20T10:00:00Z'
                  updated_at: '2026-06-20T10:00:00Z'
              schema:
                type: object
                properties:
                  webhooks:
                    type: array
                    items: { $ref: "#/components/schemas/DashboardWebhook" }
                required: [webhooks]
        "401":
          description: No valid session cookie.
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }
    post:
      tags: [dashboard]
      summary: Customer dashboard — register a new webhook.
      security:
        - SessionCookie: []
      description: |
        Session-gated. Returns the signing secret ONCE — store it
        server-side immediately and use it to HMAC-verify the
        X-StellarIndex-Signature header on inbound POSTs. URL must
        be https://. Owner / admin / member roles can register;
        viewer + billing 403. Webhook quota is tier-aware (free 2,
        starter 10, pro 25, business 50, enterprise 100 —
        deployment-overridable); exceeding it returns 409.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateWebhookRequest" }
      responses:
        "201":
          description: Webhook registered.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CreateWebhookResponse" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401":
          description: No valid session cookie.
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }
        "403":
          description: Role can't manage webhooks.
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }
        "409":
          description: Account at the 10-webhook quota.
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }

  /dashboard/webhooks/{id}:
    patch:
      tags: [dashboard]
      summary: Customer dashboard — update a webhook.
      security:
        - SessionCookie: []
      description: |
        Session-gated. Patches name / url / events / enabled.
        SecretHash is immutable; rotation lives behind a separate
        endpoint when it ships.
      parameters:
        - name: id
