                    to: GCAQSQVXUJZPDND4EUWQYRCJ64IGQ3REQK2CVSXHUQQ26GCTEMIGJDSC
                    amount: '40700000'
                  - ledger: 62757524
                    ledger_close_time: '2026-05-27T09:41:47Z'
                    tx_hash: 6517426650acea35cf0cd7f2ba420a4c7ec9619adffefce86c3ef015df618688
                    op_index: 1
                    event_index: 0
                    event_kind: transfer
                    from: GAUA7XL5K54CC2DDGP77FJ2YBHRJLT36CPZDXWPM6MP7MANOGG77PNJU
                    to: GCAQSQVXUJZPDND4EUWQYRCJ64IGQ3REQK2CVSXHUQQ26GCTEMIGJDSC
                    amount: '3600000'
                as_of: '2026-07-03T22:38:15.931276977Z'
                flags:
                  stale: false
                  reduced_redundancy: false
                  triangulated: false
                  divergence_warning: false
                  divergence_checked: false
              schema:
                allOf:
                  - { $ref: "#/components/schemas/EnvelopeMeta" }
                  - type: object
                    properties:
                      data:
                        type: object
                        required: [contract_id, count, limit, decimals, transfers]
                        properties:
                          contract_id: { type: string }
                          count: { type: integer }
                          limit: { type: integer }
                          from: { type: string }
                          to: { type: string }
                          decimals:
                            type: integer
                            description: |
                              The token contract's on-chain `decimals()`, read
