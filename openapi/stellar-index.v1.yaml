          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }
    post:
      tags: [dashboard]
      summary: Customer dashboard — register a new price alert.
      security:
        - SessionCookie: []
      description: |
        Session-gated. Registers a "notify me when <base>/<quote>
        goes <above|below> <threshold>" rule. When the aggregator's
        evaluator is enabled it enqueues a `price.alert` webhook to
