      summary: Customer dashboard — list this account's price alerts.
      security:
        - SessionCookie: []
      description: |
        Session-gated. Returns every price-threshold alert this
        account has registered, newest first. BACKLOG #60.
      responses:
        "200":
          description: Price-alert list.
          content:
            application/json:
              example:
                alerts:
                - id: 2f1c8e0a-9b3d-4e7a-8f5b-6d2c4a1e9b0f
