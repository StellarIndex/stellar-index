                                      example: XLM/USDC
                                    kind: { type: string, enum: [factory, instance, module], description: "Role within the protocol — a verified trust-root (factory), a factory-deployed pool/vault/market (instance), or a folded-in sub-module contract that belongs to this protocol but emits on its own address (module — e.g. the Blend Backstop)." }
