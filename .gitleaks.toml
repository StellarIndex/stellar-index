# Gitleaks config — allowlists only, no custom rules. The default
# ruleset still applies (extends = "gitleaks"). We lean on path-
# based allowlists instead of fingerprint-in-.gitleaksignore
# because squash merges change commit hashes, which breaks
# fingerprint-based ignores every time a PR lands on main.
#
# Each allowlist below documents the reason the flagged string is
# a false positive.

title = "stellar-index gitleaks config"

[extend]
useDefault = true

[[rules]]
id = "generic-api-key"
[[rules.allowlists]]
description = "Redacted third-party NODE_SEED quoted in a security-finding writeup for the legacy Dash k8s cluster. Not our credential; documentation of a known violation."
paths = [
  '''docs/architecture/infrastructure/existing-k8s-assessment\.md''',
]

[[rules.allowlists]]
description = "Test-only Stellar G-strkey (public account ID, not a secret) used to stamp a known observer identity in reflector decoder tests. No private key paired."
paths = [
  '''test/integration/ledgerstream_to_storage_test\.go''',
]

[[rules.allowlists]]
description = "Test-only Stellar C-strkey (public contract ID, not a secret) used as the SAC-wrapped fixture for the supply cross-check tests. Contract IDs are deterministic public ledger entries — not credentials."
paths = [
  '''internal/supply/crosscheck_test\.go''',
  '''internal/supply/classic_test\.go''',
  '''internal/supply/sep41_test\.go''',
]

[[rules.allowlists]]
description = "Test-only Stellar G-strkey fixture (Circle USDC issuer's public account ID) used by the pipeline-dispatcher supply-observer registration test. Bare G-address triggers gitleaks' generic-api-key entropy heuristic; prefixing with 'USDC:' (as in the supply-package fixtures) is the only structural difference. Public account IDs aren't credentials."
paths = [
  '''internal/pipeline/dispatcher_test\.go''',
]

[[rules.allowlists]]
description = "Test-only Stellar G-strkey + C-strkey fixtures (Circle USDC issuer + USDC SAC contract id, both public ledger entries) used by trades.usd_volume tests for L2.2 phase 1. Same pattern as the dispatcher_test.go allowlist — bare addresses trip the entropy heuristic, but they're not credentials."
paths = [
  '''internal/storage/timescale/trades_usd_volume_test\.go''',
]

[[rules.allowlists]]
description = "Test-only Stellar G-strkey fixture (Circle USDC issuer) embedded in a JSON wire-payload string the pkg/client AssetDetail decoder test feeds to encoding/json. Bare G-address trips the entropy heuristic; not a credential."
paths = [
  '''pkg/client/asset_detail_test\.go''',
]

[[rules.allowlists]]
description = "Test-only Stellar G-strkey fixture (Circle USDC issuer) embedded in pkg/client godoc Example* functions. Same shape as asset_detail_test.go — bare G-address trips entropy heuristic; public account ID isn't a credential."
paths = [
  '''pkg/client/example_test\.go''',
]

[[rules.allowlists]]
description = "Generated Redocly HTML — embeds OpenAPI example values (canonical asset_ids: G-strkeys, C-strkeys, transaction hashes) that look like high-entropy secrets to gitleaks. The file is a build artefact regenerated from openapi/stellar-index.v1.yaml; the spec itself is scanned and any real secret would be caught there."
paths = [
  '''docs/reference/api/index\.html''',
]

[[rules.allowlists]]
description = "OpenAPI spec example values for /v1/signup + /v1/dashboard/keys: synthetic key_id (`k_...`) + plaintext (`re_live_...`) are fabricated illustrations of what the response shape looks like — not real credentials. Real secrets in production never get committed; the response examples MUST be high-entropy-looking to be useful to API consumers. Generated TS types (web/explorer/src/api/types.ts) inherit the same examples in JSDoc; same allowlist rationale applies."
paths = [
  '''openapi/stellar-index\.v1\.yaml''',
  '''web/explorer/src/api/types\.ts''',
]

[[rules.allowlists]]
description = "Explorer issuer-detail page — embeds Circle USDC issuer's public Stellar G-strkey as the static-params fallback so the page pre-renders with at least one route in the CI stub. Bare G-address is a public account ID, not a credential. Same pattern as the supply tests already allowlisted above."
paths = [
  '''web/explorer/src/app/issuers/\[g_strkey\]/page\.tsx''',
]

[[rules.allowlists]]
description = "Explorer aggregators page — hardcoded contract IDs for Soroswap/Phoenix/Aquarius/Comet/DefIndex routers, factories, and autocompound vaults. These are deterministic public on-chain entries — Soroban contract IDs are derived from the hash of the deployer + WASM, NOT credentials. Used to label rows in the aggregators listing without a per-network registry roundtrip."
paths = [
  '''web/explorer/src/app/aggregators/page\.tsx''',
]

[[rules.allowlists]]
description = "Generated Redocly-format spec mirror — `make docs-api` regenerates this from openapi/stellar-index.v1.yaml verbatim, so any allowlist on the source yaml must also cover the mirror. Contains the same OpenAPI example values (canonical asset_ids, signup/dashboard key shapes) the source already declares."
paths = [
  '''docs/reference/api/stellar-index\.v1\.yaml''',
]

[[rules.allowlists]]
description = "Historical spec filenames — gitleaks scans full repo history. openapi/stellar-index.v1.yaml + docs/reference/api/stellar-index.v1.yaml were renamed from an earlier filename in a past commit. Those commits still carry the old paths with the SAME synthetic signup/dashboard OpenAPI example keys (k_... key_id + re_live_... plaintext) already allowlisted on the current names above. Allowlist the historical paths so full-history scans pass. Same rationale as the web/showcase historical allowlist."
paths = [
  # Historical pre-rebrand paths — these files no longer exist, but
  # gitleaks scans full history where they do. Path-scoped, harmless.
  '''openapi/rates-engine\.v1\.yaml''',
  '''docs/reference/api/rates-engine\.v1\.yaml''',
]

[[rules.allowlists]]
description = "Historical web/showcase tree — gitleaks scans full repo history. The web/showcase directory was renamed to web/explorer (task #19); past commits contain the old path with the same OpenAPI-derived TS bindings that web/explorer/src/api/types.ts has today (already allowlisted). Allowlist by path so historical scans pass."
paths = [
  '''web/showcase/src/api/types\.ts''',
]

[[rules.allowlists]]
description = "Test-only Stellar G-strkey fixture (Circle USDC issuer's public account ID) used by the /v1/issuers handler tests. Bare G-address triggers gitleaks' generic-api-key entropy heuristic; same shape as the supply / dispatcher / pkg-client allowlists already declared above. Public account IDs aren't credentials."
paths = [
  '''internal/api/v1/issuers_test\.go''',
]

[[rules.allowlists]]
description = "Historical working-doc (removed from the tree, retained in git history) — quotes a Stellar G-strkey (Circle USDC issuer) inline in a user-journey writeup as one of the example issuers a user would explore. Same entropy-heuristic false positive as the test-file allowlists; public account ID, not a credential."
paths = [
  '''docs/audit-2026-05-02/03-journeys\.md''',
]

[[rules.allowlists]]
description = "Test-only Stellar asset-key fixture (`USDC-G...`, Circle USDC's canonical CODE-ISSUER asset_id) used by the SAC-wrapper classic-supply handler test. The bare G-strkey portion trips gitleaks' generic-api-key entropy heuristic; same shape as the supply / dispatcher / issuers allowlists above. Public asset identifiers aren't credentials."
paths = [
  '''internal/api/v1/asset_supply_test\.go''',
]

[[rules.allowlists]]
description = "Test-only Stellar C-strkey fixtures (synthetic pool + token contract IDs) used by the comet liquidity-storage integration test. Contract IDs are deterministic public ledger entries (hash of deployer + WASM), not credentials — same pattern as the supply/aggregators allowlists above."
paths = [
  '''test/integration/comet_liquidity_storage_test\.go''',
]

[[rules.allowlists]]
description = "Circle CCTP mainnet contract IDs (TokenMessengerMinter / MessageTransmitter / CctpForwarder C-strkeys), verified against developers.circle.com and github.com/circlefin/stellar-cctp. These are public Soroban contract addresses (deterministic ledger entries), not credentials — the entropy heuristic trips on the 56-char base32 strkey."
paths = [
  '''internal/sources/cctp/events\.go''',
]

[[rules.allowlists]]
description = "Test-only base64-encoded XDR fixtures (ScVal Address/Symbol/Vec bodies for real Aquarius update_reserves / deposit_liquidity / withdraw_liquidity events, captured from the lake) + Stellar C-strkey token/pool contract-id fixtures, used by the aquarius liquidity/reserves decoder golden tests AND the timescale storage integration test. These are XDR-encoded public ledger data / deterministic public contract IDs (i128 amounts), not credentials — the base64 blobs + strkeys trip gitleaks' generic-api-key entropy heuristic. Same rationale as the other decoder-fixture allowlists above."
paths = [
  '''internal/sources/aquarius/liquidity_decode_test\.go''',
  '''test/integration/aquarius_liquidity_storage_test\.go''',
]

[[rules.allowlists]]
description = "Test-only Stellar G-strkey + C-strkey fixtures (verified issuers + same-ticker impersonator issuers, e.g. USDC/AQUA/EURC/SHX issuer account IDs and SAC contract IDs) used by the served-data-correctness tests for the ticker-collision / verified-badge / dual-form-price cases. Bare public account/contract IDs trip the entropy heuristic; not credentials — same shape as the supply/dispatcher/issuers allowlists above."
paths = [
  '''internal/api/v1/served_data_correctness_test\.go''',
]

[[rules.allowlists]]
description = "Test-only Phoenix swap fixtures — base64-encoded XDR (ScvMap/Symbol swap-event bodies for the new Map-body pool CBENABXP…, captured from ledger 63307899) + C-strkey pool/token contract IDs — used by the phoenix volatile + map-body swap decoder golden tests. XDR-encoded public ledger data + deterministic public contract IDs (i128 amounts), not credentials — the base64 blobs + strkeys trip gitleaks' generic-api-key entropy heuristic. Same rationale as the aquarius/cctp decoder-fixture allowlists above."
paths = [
  '''internal/sources/phoenix/mapswap_test\.go''',
  '''internal/sources/phoenix/source_test\.go''',
]

[[rules.allowlists]]
description = "Test-only Stellar L-strkey fixture (a liquidity-pool id, e.g. LBBQ…) used by the native CAP-38 liquidity-pool state-reader test. L-strkeys are deterministic public ledger-entry identifiers (SHA-256 of the pool params), not credentials — the 56-char base32 trips gitleaks' generic-api-key entropy heuristic. Same rationale as the C-strkey / G-strkey fixture allowlists above."
paths = [
  '''internal/storage/clickhouse/liquidity_pool_state_reader_test\.go''',
]

[[rules.allowlists]]
description = "Test-only Redis lock-key fixture (`abcdef0123456789`) used by the signup-email-locker concurrency test. Fabricated 16-hex-char idempotency key; trips the entropy heuristic but is not a credential."
paths = [
  '''internal/auth/signup_email_locker_test\.go''',
]

[[rules.allowlists]]
description = "Codex audit evidence doc — a cross-file-interactions findings table quoting public git commit SHAs (e.g. `e9e57cb2...`) and evidence/finding IDs inline. These high-entropy hex strings are commit references, not credentials."
paths = [
  '''docs/audit-2026-05-12-codex/evidence/cross-file-interactions\.md''',
]

[[rules.allowlists]]
description = "Test-only Stellar C-strkey / G-strkey fixtures (synthetic pool / token / collateral contract IDs + account IDs) used by the orphaned-analytics bespoke-surfacing storage integration tests (sorocredit credit tables, comet/phoenix liquidity-flow depth, phoenix stake, soroswap skim). Deterministic public ledger entries (contract IDs are the hash of deployer + WASM) / public account IDs, not credentials — bare strkeys trip gitleaks' generic-api-key entropy heuristic. Same rationale as the aquarius/comet/phoenix decoder-fixture + supply allowlists above."
paths = [
  '''test/integration/sorocredit_bespoke_storage_test\.go''',
  '''test/integration/dex_liquidity_depth_storage_test\.go''',
  '''test/integration/blend_emissions_bespoke_storage_test\.go''',
]

# ── curl-auth-header (default rule) ─────────────────────────────────
# The default ruleset flags any `curl -H "Authorization: Bearer …"`
# string. The explorer API-docs page embeds exactly that as a usage
# EXAMPLE; the bearer value is an obvious placeholder, not a real key.
[[rules]]
id = "curl-auth-header"
[[rules.allowlists]]
description = "Explorer API-docs page (/docs) — a `curl -H \"Authorization: Bearer sip_your_key_here\"` usage example showing how to pass an API key. `sip_your_key_here` is a literal placeholder (the whole point of the snippet is to show the header shape); not a credential. Path-scoped so a real secret added to this file under any other rule is still caught."
paths = [
  '''web/explorer/src/app/docs/page\.tsx''',
  # Same placeholder pattern on the dashboard onboarding card
  # (LC-061 "working first request" snippet, `sip_your_key`).
  '''web/explorer/src/app/dashboard/page\.tsx''',
]

[[rules.allowlists]]
description = "Test-only token-SAC C-strkey fixtures (e.g. the XLM native SAC CAS3J7GY…, USDC SAC CCW67TSZ…) used by the protocol pool-pair label resolver tests. Deterministic public Stellar contract identifiers, not credentials — the 56-char base32 trips gitleaks' generic-api-key entropy heuristic. Same rationale as the aquarius/phoenix/liquidity-pool decoder-fixture allowlists above (#91)."
paths = [
  '''internal/api/v1/protocol_pairs_internal_test\.go''',
  '''internal/api/v1/protocols_pairs_test\.go''',
]
