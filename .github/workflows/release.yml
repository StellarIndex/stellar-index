name: release

# Triggered by pushing a v*.*.* tag to the repo. Cuts a GitHub
# Release containing cross-compiled Linux binaries (+ SHA256SUMS).
#
# Tag conventions per docs/architecture/semver-policy.md:
#   v0.1.0          — release
#   v0.1.0-rc.1     — pre-release
#   v0.1.0+build.1  — build metadata; treated like the bare version
#
# Operator deploy is a separate workflow (deploy.yml) — this one only
# produces and publishes artifacts.
#
# **Container images are NOT built/pushed by this workflow.** The
# `docker/*.Dockerfile` files remain in the repo so a self-hoster
# can build their own image (`make build-docker` or
# `docker build -f docker/ratesengine-api.Dockerfile .`); we don't
# push to ghcr.io because no consumer of those images exists today
# and multi-arch Docker builds were adding ~3-5 min of CI burn per
# release tag for no return. To re-enable: restore the `containers:`
# job (search the git log for "release: drop ghcr.io push") and
# the `packages: write` permission. Decision: 2026-05-11, operator.

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to (re)build a release for'
        required: true
        type: string

# Concurrency: at most one release run per tag in flight. A second
# push to the same tag (rare; only via force) cancels the first.
concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: write          # gh release create + upload assets
  # F-1296 (codex audit-2026-05-13): `id-token: write` removed.
  # No step currently consumes the OIDC JWT (keyless signing via
  # cosign is planned but not wired yet); a compromised step in
  # this workflow shouldn't be able to mint an OIDC token. Add
  # it back in the SAME PR that wires cosign signing, with a
  # clear comment pointing at the consuming step.

jobs:
  # Pin the tag once so every downstream job sees the same value
  # whether triggered by tag push or manual dispatch.
  resolve-tag:
    name: Resolve release tag
    runs-on: ubuntu-24.04
    outputs:
      tag: ${{ steps.out.outputs.tag }}
      is_prerelease: ${{ steps.out.outputs.is_prerelease }}
    steps:
      - id: out
        # F-1298 (codex audit-2026-05-13): inputs through `env:`,
        # never interpolated `${{ inputs.* }}` into the shell.
        # Pre-fix `tag="${{ inputs.tag }}"` would have shell-
        # expanded a malicious tag like `"; cat /etc/passwd; echo "v1.0.0`
        # before the SemVer regex even ran.
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            tag="$INPUT_TAG"
          else
            tag="$REF_NAME"
          fi
          # Sanity-check tag shape; abort early on garbage so we don't
          # publish a v-prefix-typo release.
          if ! echo "$tag" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.-]+)?(\+[A-Za-z0-9.-]+)?$'; then
            echo "::error::Tag '$tag' does not match SemVer vX.Y.Z[-prerelease][+build]"
            exit 1
          fi
          # Pre-release detection: '-' between version core and any
          # identifier (per semver.org §9). Build metadata ('+...')
          # alone does NOT make it a pre-release.
          if echo "$tag" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+-'; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "Resolved tag: $tag"

  # Build every binary for every (os, arch) combo we ship. Matrix
  # keeps each combo independent — a single arch failure doesn't
  # block the others; the release job aggregates whatever succeeded.
  build:
    name: Build ${{ matrix.binary }} (${{ matrix.goos }}/${{ matrix.goarch }})
    needs: resolve-tag
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        binary:
          - ratesengine-indexer
          - ratesengine-aggregator
          - ratesengine-api
          - ratesengine-ops
          - ratesengine-migrate
          - ratesengine-sla-probe
        goos: [linux]
        # arm64 dropped 2026-05-08 — every region (R1/R2/R3 plan) is
        # amd64. Re-add when an arm64 host is provisioned. See memory:
        # feedback_release_cadence.md.
        goarch: [amd64]
    steps:
      - name: Checkout at tag
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          ref: ${{ needs.resolve-tag.outputs.tag }}
          fetch-depth: 0   # need tag + history for `git describe`

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff  # v5
        with:
          go-version-file: go.mod
          cache: true

      # The Makefile already uses git describe + ldflags. Build the
      # binary via direct go build so we can target a specific
      # GOOS/GOARCH per matrix entry without forking the Makefile.
      - name: Build
        env:
          CGO_ENABLED: '0'
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          set -euo pipefail
          MODULE=$(go list -m)
          VERSION="${{ needs.resolve-tag.outputs.tag }}"
          BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          OUT="${{ matrix.binary }}-${{ matrix.goos }}-${{ matrix.goarch }}"
          mkdir -p dist
          go build -trimpath -buildvcs=true \
            -ldflags="-s -w \
              -X ${MODULE}/internal/version.Version=${VERSION} \
              -X ${MODULE}/internal/version.BuildDate=${BUILD_DATE}" \
            -o "dist/${OUT}" \
            "./cmd/${{ matrix.binary }}"
          ls -la "dist/${OUT}"
          file "dist/${OUT}"

      - name: Upload binary artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: ${{ matrix.binary }}-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/${{ matrix.binary }}-${{ matrix.goos }}-${{ matrix.goarch }}
          retention-days: 7
          if-no-files-found: error

  # Pull all matrix artifacts into one job, compute SHA256SUMS,
  # extract the CHANGELOG section for the tag, and create the
  # GitHub Release.
  release:
    name: Publish GitHub Release
    needs: [resolve-tag, build]
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout at tag
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          ref: ${{ needs.resolve-tag.outputs.tag }}
          fetch-depth: 1

      - name: Download all binaries
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          path: dist
          merge-multiple: true

      - name: List downloaded artifacts
        run: ls -la dist/

      - name: Compute SHA256SUMS
        working-directory: dist
        run: |
          sha256sum * > SHA256SUMS
          cat SHA256SUMS

      # Pull just this version's CHANGELOG block. The release-notes
      # workflow assumes the CHANGELOG section header matches
      # `## [vX.Y.Z]` exactly (per docs/operations/release-process.md
      # step 2), and that the section ends at the next `## [` line.
      - name: Extract release notes from CHANGELOG
        id: notes
        run: |
          set -euo pipefail
          TAG="${{ needs.resolve-tag.outputs.tag }}"
          NOTES=/tmp/release-notes.md
          # awk-bracket-class trap: passing ver as `[v0.5.0-rc.N]`
          # turned the literal brackets into a character class
          # `[v0.5.0-rc.N]` (matches a single char from that set)
          # so the regex never anchored to a real heading. Use a
          # literal-string match (`==` on the slice we want) by
          # checking for the prefix `## [<TAG>]` directly.
          awk -v hdr="## [$TAG]" '
            substr($0, 1, length(hdr)) == hdr { capture = 1; print; next }
            capture && /^## \[/ { exit }
            capture { print }
          ' CHANGELOG.md > "$NOTES"
          if [ ! -s "$NOTES" ]; then
            echo "::warning::No CHANGELOG section found for ${TAG}; falling back to commit summary"
            echo "# Rates Engine ${TAG}" > "$NOTES"
            echo "" >> "$NOTES"
            echo "_Auto-generated notes — no CHANGELOG entry found for this tag._" >> "$NOTES"
            echo "" >> "$NOTES"
            echo "## Commits since previous release" >> "$NOTES"
            PREV=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | grep -v "^${TAG}$" | head -1 || true)
            if [ -n "$PREV" ]; then
              git log --oneline "${PREV}..${TAG}" >> "$NOTES"
            else
              git log --oneline -20 >> "$NOTES"
            fi
          fi
          echo "notes_file=$NOTES" >> "$GITHUB_OUTPUT"
          echo "----- release notes preview -----"
          head -40 "$NOTES"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${{ needs.resolve-tag.outputs.tag }}"
          PRE=""
          if [ "${{ needs.resolve-tag.outputs.is_prerelease }}" = "true" ]; then
            PRE="--prerelease"
          fi
          # If a release already exists for this tag (manual re-run),
          # delete it first so we can re-upload assets cleanly.
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG exists — deleting before re-creating"
            gh release delete "$TAG" --yes
          fi
          gh release create "$TAG" \
            --title "Rates Engine $TAG" \
            --notes-file "${{ steps.notes.outputs.notes_file }}" \
            --verify-tag $PRE \
            dist/*
