---
# Weekly production crawl guard (site audit 2026-07-03, Wave E).
#
# The July audit found silent site rot: pages 404ing from the site's
# own links, canonicals pointing at dead URLs, doubled titles, a
# curated sliver presented as the asset universe. Each incident is
# pinned as a check in scripts/ci/site-crawl-check.sh; this runs the
# battery weekly against production and on demand.
#
# Read-only: ~80 GETs against the public site + API, no secrets.

name: site-crawl

on:
  schedule:
    - cron: '20 6 * * 1' # Mondays 06:20 UTC
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Run the site crawl battery
        run: bash scripts/ci/site-crawl-check.sh
