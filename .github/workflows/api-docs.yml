---
# Publish the generated API reference to GitHub Pages.
#
# Runs on every push to main that affects either the OpenAPI source
# or the generated output. The CI drift check in ci.yml has already
# verified the two are in sync at PR-merge time, so this workflow
# trusts what's in main and just publishes.
#
# DNS: docs.ratesengine.net is wired to the project's GitHub Pages
# domain (set via repository CNAME after the public-flip per
# docs/operations/public-flip.md).

name: api-docs

on:
  # GitHub Pages is configured AFTER the public-flip per
  # docs/operations/public-flip.md §"Post-flip" — until then this
  # workflow's `actions/deploy-pages` step fails on every run
  # because Pages isn't enabled on the private repo. Run manually
  # via workflow_dispatch when needed (and re-enable the push
  # trigger as part of the public-flip cutover, Task #78).
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Single-deploy queue: avoid two runs racing the Pages deploy.
concurrency:
  group: api-docs
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6

      # The generated index.html is committed; we don't regenerate
      # here (CI drift check guards correctness). Just stage what's
      # in the tree.
      - name: Stage Pages artefact
        run: |
          mkdir -p _site
          cp -r docs/reference/api/index.html _site/index.html
          cp -r docs/reference/api/README.md _site/README.md
          cp -r docs/reference/api/rates-engine.v1.yaml _site/rates-engine.v1.yaml

      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: _site

      - id: deploy
        uses: actions/deploy-pages@v5
