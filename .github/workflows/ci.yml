name: ci

on:
  pull_request:
    # Skip docs-only PRs — a CHANGELOG bump or markdown edit
    # doesn't need to spin up 11 runners. Code-touching PRs
    # still hit the full matrix via the doc-code consistency job.
    paths-ignore:
      - 'CHANGELOG.md'
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE.md'
  # Push-to-main now also fires CI. F-1231 (codex audit-2026-05-12):
  # hosted GitHub reports `main.protected=false`, so the PR-only
  # assumption isn't actually enforced — direct pushes (live-in-
  # development sessions, hot-fix commits, the /loop workflow) can
  # land code without the canonical suite running. Re-enabling the
  # push trigger doubles CI burn but covers the gap branch
  # protection currently doesn't. When main IS protection-enforced,
  # this trigger becomes redundant and can be removed again.
  push:
    branches: [main]
    paths-ignore:
      - 'CHANGELOG.md'
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE.md'

# N2-01: scope the GITHUB_TOKEN to read-only at the workflow level.
# No job here writes to the repo (tests, lint, build, artifact upload all
# work with contents: read), and main is not branch-protection-enforced,
# so a compromised transitive dep running in a job must not be able to
# push. Jobs that need more must opt in explicitly.
permissions:
  contents: read

env:
  GOFUMPT_VERSION: v0.8.0
  GOIMPORTS_VERSION: v0.42.0
  GOLANGCI_LINT_VERSION: v2.11.4
  GOVULNCHECK_VERSION: v1.1.4
  GITLEAKS_VERSION: 8.21.2

  # F-1294 (codex audit-2026-05-13): SHA-256 of upstream tool
  # tarballs that the install steps verify before unpacking.
  # Sourced from GitHub repo secrets (Settings → Secrets and
  # variables → Actions) so a SHA bump alongside a version bump
  # doesn't require touching this workflow file. Empty values
  # cause the install steps to fail-fast with a clear error
  # rather than silently installing unverified binaries.
  #
  # Pre-wave-123 the install steps were `curl | tar -xz` with
  # no checksum — a compromised upstream tarball could have
  # made the `monitoring-rules` job accept broken PromQL or the
  # `vuln` job miss leaked secrets.
  #
  # Bump procedure: bump the VERSION above; copy the matching
  # SHA from the upstream release page (Prometheus publishes a
  # SHA256SUMS file alongside the release; gitleaks ships
  # `*.sha256` per asset); update the repo secret. CI fails
  # loudly on a stale SHA — the failure message names the
  # tarball and shows expected-vs-actual.
  PROM_TARBALL_SHA256: ${{ secrets.PROM_TARBALL_SHA256 }}
  GITLEAKS_TARBALL_SHA256: ${{ secrets.GITLEAKS_TARBALL_SHA256 }}

# Cancel old runs on the same ref when a new one starts.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ────────────────────────────────────────────────────────────────
  # Fast path — runs on every commit. < 2 min target.
  # Path filters below skip unneeded jobs when only docs changed.
  # ────────────────────────────────────────────────────────────────

  lint:
    name: lint
    runs-on: ubuntu-latest
    if: "!contains(github.event.pull_request.labels.*.name, 'skip-ci')"
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16  # v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Install tools
        run: |
          go install mvdan.cc/gofumpt@${GOFUMPT_VERSION}
          go install golang.org/x/tools/cmd/goimports@${GOIMPORTS_VERSION}
      - name: gofmt / gofumpt
        run: |
          if [ -n "$(gofumpt -l .)" ]; then
            echo "::error::gofumpt found unformatted files:"
            gofumpt -l .
            exit 1
          fi
      - name: golangci-lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20  # v9
        with:
          version: ${{ env.GOLANGCI_LINT_VERSION }}
          args: --timeout=5m
      - name: go vet
        run: go vet ./...

  test:
    name: unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16  # v6
        with:
          go-version-file: go.mod
          cache: true
      - run: go mod download
      - name: Test with race detector
        run: go test -race -timeout 2m -coverprofile=coverage.txt -covermode=atomic ./...
      - name: Compile integration-tagged tests (no Docker)
        # F-1334: catches build-tag breakage (an interface change that
        # doesn't update an `//go:build integration` test) without
        # spinning testcontainers. The full Docker suite stays
        # operator-/local-invoked.
        run: make test-integration-build
      - name: Upload coverage
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: coverage
          path: coverage.txt

  # ────────────────────────────────────────────────────────────────
  # Policy checks — keep the repo enterprise-grade per
  # docs/discovery/engineering-standards.md.
  # ────────────────────────────────────────────────────────────────

  doc-checks:
    name: doc-code consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - name: lint-docs
        # Single script covers: doc freshness (90-day warn, 180-day
        # fail on frontmatter-dated docs), config/API/metrics
        # round-trip between code + reference, TODO-issue-link
        # discipline, generated-file banner integrity, ADR status
        # + superseded-by validity.
        run: ./scripts/ci/lint-docs.sh

  import-checks:
    name: import-boundary lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - name: lint-imports
        # Enforces architectural import rules:
        # - No stellar-rpc in production ingest (removed from r1
        #   2026-04-23; see docs/architecture/ingest-pipeline.md).
        # - go-stellar-sdk/xdr scoped to internal/scval (ADR-0013).
        # - No Horizon anywhere (ADR-0001).
        # Grandfathered legacy violations live in
        # scripts/ci/lint-imports.baseline; the lint fails on NEW
        # violations or on stale baseline entries, forcing the
        # baseline to shrink monotonically.
        run: ./scripts/ci/lint-imports.sh

  actions-pinning:
    name: github-actions SHA-pinning lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          fetch-depth: 0
      - name: lint-actions-pinning
        # F-1216 (codex audit-2026-05-12): warns on existing
        # tag-pinned third-party actions and HARD-FAILS when a
        # PR introduces a new tag-pinned third-party use. Existing
        # tag pins are bumped to SHA via Dependabot PRs over time.
        env:
          PR_DIFF: "1"
        run: bash scripts/ci/lint-actions-pinning.sh

  monitoring-rules:
    name: prometheus rule validation
    runs-on: ubuntu-latest
    # Validates BOTH deploy/monitoring/rules/*.yml (multi-host) and
    # configs/prometheus/rules.r1/*.yml (R1 single-host overlay)
    # with promtool. Catches YAML syntax errors, broken PromQL, and
    # undefined recording-rule references at PR time rather than at
    # Prometheus reload on a production node. Pre-wave-96 only the
    # multi-host files were validated; the R1 overlay shipped
    # unchecked.
    env:
      PROM_VERSION: "2.55.1"
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - name: install promtool
        run: |
          # F-1294 (codex audit-2026-05-13): SHA-verified install.
          # Pre-fix this was `curl | tar -xz` straight, no
          # checksum. Now we download, verify, then unpack.
          if [ -z "$PROM_TARBALL_SHA256" ]; then
            echo "::error::PROM_TARBALL_SHA256 secret is not set in repo. Set it to the SHA-256 of prometheus-${PROM_VERSION}.linux-amd64.tar.gz from the upstream SHA256SUMS file." >&2
            exit 1
          fi
          curl -fsSL "https://github.com/prometheus/prometheus/releases/download/v${PROM_VERSION}/prometheus-${PROM_VERSION}.linux-amd64.tar.gz" -o /tmp/prom.tar.gz
          echo "${PROM_TARBALL_SHA256}  /tmp/prom.tar.gz" | sha256sum -c -
          tar -xzf /tmp/prom.tar.gz
          sudo install -m 0755 "prometheus-${PROM_VERSION}.linux-amd64/promtool" /usr/local/bin/promtool
      - name: validate rules
        run: make monitoring-check

  # ────────────────────────────────────────────────────────────────
  # Security — fast scans on every PR: govulncheck + gitleaks (below).
  # NOTE (N2-02): heavier scans (trivy image scan, SBOM) are NOT yet
  # implemented — there is no security.yml. The previous comment claimed
  # one existed on a schedule; it never did. Add a scheduled security.yml
  # before the public flip if container/SBOM scanning is required.
  # ────────────────────────────────────────────────────────────────

  vuln:
    name: govulncheck + gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16  # v6
        with:
          go-version-file: go.mod
          cache: true
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@${GOVULNCHECK_VERSION}
          govulncheck ./...
      - name: gitleaks
        # gitleaks/gitleaks-action@v2 changed to a paid-license model
        # in late 2022 — fails every run without a GITLEAKS_LICENSE
        # secret. We invoke the OSS CLI directly instead (same scan,
        # MIT licensed, no key).
        run: |
          # F-1294 (codex audit-2026-05-13): SHA-verified install.
          # Pre-fix this was `curl | tar -xz` straight, no
          # checksum. Now we download, verify, then unpack.
          if [ -z "$GITLEAKS_TARBALL_SHA256" ]; then
            echo "::error::GITLEAKS_TARBALL_SHA256 secret is not set in repo. Set it to the SHA-256 of gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz from the upstream release page." >&2
            exit 1
          fi
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" -o /tmp/gitleaks.tar.gz
          echo "${GITLEAKS_TARBALL_SHA256}  /tmp/gitleaks.tar.gz" | sha256sum -c -
          tar -xzf /tmp/gitleaks.tar.gz -C /usr/local/bin gitleaks
          gitleaks detect --redact --verbose --no-banner

  # ────────────────────────────────────────────────────────────────
  # Build — the binaries must compile on every PR.
  # ────────────────────────────────────────────────────────────────

  build:
    name: build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16  # v6
        with:
          go-version-file: go.mod
          cache: true
      - run: make build
      - name: Upload binaries (short retention)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: binaries-${{ github.sha }}
          path: bin/
          retention-days: 7

  # ────────────────────────────────────────────────────────────────
  # API contract check — OpenAPI lint + docs-regen drift detection.
  # ────────────────────────────────────────────────────────────────

  openapi:
    name: openapi lint
    runs-on: ubuntu-latest
    # N2-04: runs on push-to-main too — a direct push (the live-in-dev
    # norm) that edits openapi/ or the handlers previously skipped Spectral
    # + the generated-reference drift check, the exact bypass the push
    # trigger above exists to close. The job is cheap.
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - name: Spectral lint
        uses: stoplightio/spectral-action@6416fd018ae38e60136775066eb3e98172143141  # v0.8.13
        with:
          file_glob: openapi/*.yaml
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16  # v6
        with:
          go-version-file: go.mod
          cache: true
      - name: ADR-0018 URL-discipline check
        run: go run ./scripts/ci/lint-openapi-urls openapi/stellar-index.v1.yaml
      - name: ADR-0033 PK-discriminator check (coarse-PK data-loss guard)
        run: go run ./scripts/ci/lint-pk-discriminators
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: "22"
      - name: Generated API reference is in sync
        run: |
          ./scripts/dev/docs-api.sh
          if ! git diff --exit-code -- docs/reference/api/index.html docs/reference/api/README.md docs/reference/api/stellar-index.v1.yaml; then
            echo "::error::Generated API reference is stale. Run 'make docs-api' locally and commit the result."
            exit 1
          fi

  # ────────────────────────────────────────────────────────────────
  # Showcase site — typecheck, lint, build the Next.js app at
  # web/explorer/. Static-export build is fast (~30s).
  # Also verifies the OpenAPI → TypeScript codegen is in sync; if
  # the OpenAPI spec changed and someone forgot to regen the types,
  # this fails with a clear error.
  # ────────────────────────────────────────────────────────────────

  web-explorer:
    name: web/explorer
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web/explorer
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093  # v6
        with:
          version: "10"
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: web/explorer/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - name: Generated API types are in sync
        run: |
          pnpm generate:api
          if ! git diff --exit-code -- src/api/types.ts; then
            echo "::error::Generated TS API types are stale. Run 'make web-generate-api' locally and commit src/api/types.ts."
            exit 1
          fi
      - run: pnpm typecheck
      - run: pnpm lint
      # Build covers what typecheck/lint don't: Next.js static-export
      # constraints (e.g. `dynamic = 'force-static'` requirement on
      # sitemap/robots routes), generateStaticParams behaviour at
      # build time, and any runtime-vs-build divergence in the
      # output: 'export' pipeline. The build-time API fetch falls
      # through to the seed-only path when CI can't reach the
      # production API — that's expected and not a CI failure.
      #
      # We deliberately run the build ONLY against the CI stub URL.
      # A second build against the real API used to live here, but
      # Next.js's per-page-render 60s worker timeout is too tight
      # for /assets/native — XLM has 5,553 markets and the build
      # serialises the response into the static HTML, which trips
      # the timeout on busy build hosts. CF Pages does the real-API
      # build at deploy time with its own retry policy, so the CI
      # second-pass was redundant. Keep the stub-URL build — it
      # exercises every code path that doesn't depend on API shape.
      - run: pnpm build
        env:
          # Force a deterministic api-base URL so the build doesn't
          # try to contact production from CI. The fallback in
          # generateStaticParams kicks in when the fetch fails, so
          # the build still succeeds with seed-only slugs.
          NEXT_PUBLIC_API_BASE_URL: http://api.ci-stub.invalid
      # F-1207 (codex audit-2026-05-12): pnpm advisory gate.
      - run: pnpm audit --audit-level high

  # ────────────────────────────────────────────────────────────────
  # Status page — the status.stellarindex.io project is now redirect-only
  # (the page lives at stellarindex.io/status). Replaces
  # the cstate Hugo build with a custom Next.js static-export.
  # ────────────────────────────────────────────────────────────────
  web-status:
    name: web/status
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web/status
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093  # v6
        with:
          version: "10"
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: web/status/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm build
        env:
          NEXT_PUBLIC_API_BASE_URL: http://api.ci-stub.invalid
      # F-1207 (codex audit-2026-05-12): pnpm advisory gate.
      - run: pnpm audit --audit-level high
