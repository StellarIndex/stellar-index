---
# Manual-trigger Cloudflare Pages deploy for the explorer.
#
# **The recommended publish path is Cloudflare's git integration**
# (see docs/operations/explorer-deployment.md §Recommended). It
# auto-deploys on every push to main without consuming GitHub
# Actions minutes. This workflow exists for two cases:
#
#   1. **Hotfix** — push a fixed version of an arbitrary commit
#      (workflow_dispatch supports `ref:` selection).
#   2. **CF git integration paused** — fall back to publishing
#      from CI when the Pages project's git connection is
#      disabled (e.g. mid-rotation of the CF GitHub app token).
#
# Only fires on workflow_dispatch — never on push. Operators
# trigger via the Actions tab or:
#
#     gh workflow run explorer-deploy.yml --ref main \
#         -f environment=production
#
# Required secrets (set once in repo settings):
#   - CLOUDFLARE_API_TOKEN  — token with Pages:Edit on the
#                             stellarindex-explorer project (renamed
#                             from stellarindex-showcase 2026-07-04,
#                             task #23; the old project is retained
#                             briefly as rollback, then deleted)
#   - CLOUDFLARE_ACCOUNT_ID — the CF account UUID

name: explorer-deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "production or preview"
        required: true
        default: "production"
        type: choice
        options:
          - production
          - preview
      api_base_url:
        description: "NEXT_PUBLIC_API_BASE_URL bake-in (default https://api.stellarindex.io)"
        required: false
        default: "https://api.stellarindex.io"

permissions:
  contents: read
  deployments: write

# One deploy at a time. Mid-deploy cancellation is fine — the
# new run takes over before traffic shifts.
concurrency:
  group: explorer-deploy-${{ github.event.inputs.environment }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: explorer-${{ github.event.inputs.environment }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271  # v6
        with:
          version: 10
          run_install: false

      - name: Set up Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v6
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: web/explorer/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: web/explorer
        run: pnpm install --frozen-lockfile

      - name: Build
        working-directory: web/explorer
        env:
          NEXT_PUBLIC_API_BASE_URL: ${{ github.event.inputs.api_base_url }}
        run: pnpm build

      - name: Verify build artefact
        working-directory: web/explorer
        run: |
          test -d out || { echo "out/ missing — Next.js build produced no static export"; exit 1; }
          test -f out/index.html || { echo "out/index.html missing — sitemap or routing broken"; exit 1; }
          ls -la out/ | head

      # TRIAGE (site-audit S-024, 2026-07-03): Next 16 emits ~8 per-segment
      # RSC prefetch files per page (__next.*.txt) for its client segment
      # cache — 36k files at our page count, past Cloudflare Pages' hard
      # 20,000-file cap. Every deploy since the Next 15→16 bump silently
      # failed here and the site froze on a June-24 build. The segment
      # files are prefetch-only: the client treats a missing segment as a
      # cache miss and falls back to the standard index.txt RSC fetch
      # (verified by browsing a pruned build). Pruning restores deploys
      # while ADR-0044 (edge SSR) replaces static export as the real fix.
      - name: Prune Next 16 segment-cache prefetch files
        run: |
          BEFORE=$(find web/explorer/out -type f | wc -l)
          find web/explorer/out -type f -name "__next.*" -delete
          AFTER=$(find web/explorer/out -type f | wc -l)
          echo "pruned segment files: $BEFORE -> $AFTER"

      # Fail BEFORE the CF upload if the static export approaches Cloudflare
      # Pages' 20,000-file-per-deployment cap (Spike A 2026-06-24; SEO plan R1).
      # Exceeding it makes `wrangler pages deploy` fail opaquely; this surfaces
      # it early with the fix (lower the curated pre-render caps / shard).
      - name: Cloudflare file-budget guard
        run: bash scripts/ci/explorer-file-budget.sh web/explorer/out

      # Assert every indexable page has title + description + canonical
      # (noindex pages exempt). SEO plan WS15.
      - name: SEO metadata lint
        run: bash scripts/ci/explorer-seo-lint.sh web/explorer/out

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0  # v4.0.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: web/explorer
          command: >-
            pages deploy out
            --project-name stellarindex-explorer
            --branch ${{ github.event.inputs.environment == 'production' && 'main' || github.ref_name }}
