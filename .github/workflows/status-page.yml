---
# Manual-trigger Cloudflare Pages deploy for status.ratesengine.net.
#
# **The recommended publish path is Cloudflare's git integration**
# — it auto-deploys on every push to main without consuming GitHub
# Actions minutes. This workflow is the same hotfix / git-paused
# fallback as docs-deploy.yml + explorer-deploy.yml.
#
# Builds the Next.js static-export status page at web/status/
# and pushes it to the `ratesengine-status` Pages project.
#
# Required secrets (set once in repo settings):
#   - CLOUDFLARE_API_TOKEN  — token with Pages:Edit on
#                             ratesengine-status
#   - CLOUDFLARE_ACCOUNT_ID — the CF account UUID

name: status-page

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "production or preview"
        required: true
        default: "production"
        type: choice
        options:
          - production
          - preview
      api_base_url:
        description: "NEXT_PUBLIC_API_BASE_URL bake-in (default https://api.ratesengine.net)"
        required: false
        default: "https://api.ratesengine.net"

permissions:
  contents: read
  deployments: write

concurrency:
  group: status-deploy-${{ github.event.inputs.environment }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: status-${{ github.event.inputs.environment }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10
          run_install: false

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: web/status/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: web/status
        run: pnpm install --frozen-lockfile

      - name: Build
        working-directory: web/status
        env:
          NEXT_PUBLIC_API_BASE_URL: ${{ github.event.inputs.api_base_url }}
        run: pnpm build

      - name: Verify build artefact
        working-directory: web/status
        run: |
          test -d out || { echo "out/ missing"; exit 1; }
          test -f out/index.html || { echo "out/index.html missing"; exit 1; }
          ls -la out/ | head

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: web/status
          command: >-
            pages deploy out
            --project-name ratesengine-status
            --branch ${{ github.event.inputs.environment == 'production' && 'main' || github.ref_name }}
